<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover">
    <meta name="theme-color" content="#0c1929">
    <title>Frozen / Refrigerated Pet Planograms</title>
    <link rel="stylesheet" href="css/pet-pog.css">
</head>
<body>
    <!-- Pick planogram -->
    <div id="view-type-select" class="view active">
        <div class="container safe-bottom">
            <div class="hero-icon" aria-hidden="true">&#128054;</div>
            <h1 class="type-heading">Pet cooler / freezer POGs</h1>
            <p class="brand-line">P02 W04 Y2026 &middot; Effective 3/22/2026</p>
            <p class="type-subtitle">Choose a fixture. Images load from <code style="font-size:0.85em;color:var(--gold-light)">images_placeholder/&lt;UPC&gt;.png</code></p>
            <div id="type-cards" class="type-cards"></div>
        </div>
    </div>

    <!-- Bay view -->
    <div id="view-bay" class="view">
        <div class="bay-view-container">
            <div class="bay-top-bar">
                <div class="bay-top-bar-main">
                    <button type="button" id="back-to-type" class="btn-icon" aria-label="Back">&larr;</button>
                    <div class="bay-top-info">
                        <span id="bay-pog-name" class="pog-badge-sm"></span>
                        <span id="bay-indicator" class="bay-indicator">Bay 1 of 1</span>
                    </div>
                </div>
                <div class="bay-top-search">
                    <input type="text" id="bay-upc-input" inputmode="numeric" placeholder="Last digits of UPC"
                           maxlength="13" autocomplete="off" enterkeyhint="search"
                           autocorrect="off" autocapitalize="none" spellcheck="false">
                    <button type="button" id="bay-upc-search" class="btn btn-primary bay-search-go">Search</button>
                </div>
            </div>

            <div id="bay-shelf-container" class="bay-shelf-container"></div>

            <div class="bay-bottom-nav">
                <button type="button" id="bay-prev-arrow" class="bay-nav-arrow" aria-label="Previous bay">&lsaquo;</button>
                <div id="bay-dots" class="bay-numbers"></div>
                <button type="button" id="bay-next-arrow" class="bay-nav-arrow" aria-label="Next bay">&rsaquo;</button>
            </div>
        </div>
    </div>

    <!-- Multi-match search -->
    <div id="view-search" class="view">
        <div class="container safe-bottom">
            <div class="top-bar">
                <button type="button" id="back-from-search" class="btn-icon" aria-label="Back">&larr;</button>
                <div class="top-bar-brand">
                    <span class="top-bar-title">Pick a match</span>
                </div>
            </div>
            <h2 class="view-heading">Search results</h2>
            <div id="search-results-list" class="search-results-list"></div>
        </div>
    </div>

    <!-- Product detail -->
    <div id="product-overlay" class="overlay hidden">
        <div class="overlay-content safe-bottom">
            <button type="button" id="close-overlay" class="btn-icon close-btn" aria-label="Close">&times;</button>
            <div class="overlay-product-header">
                <div id="overlay-image" class="overlay-image"></div>
                <div class="overlay-title-group">
                    <h3 id="overlay-name"></h3>
                    <span id="overlay-badge" class="badge" style="display:none"></span>
                </div>
            </div>
            <div class="overlay-details">
                <div class="detail-row">
                    <span class="label">UPC</span>
                    <span id="overlay-upc" class="value"></span>
                </div>
                <div class="detail-row">
                    <span class="label">Size</span>
                    <span id="overlay-size" class="value"></span>
                </div>
                <div class="detail-row">
                    <span class="label">Position</span>
                    <span id="overlay-pos-detail" class="value"></span>
                </div>
                <div class="detail-row">
                    <span class="label">Facings</span>
                    <span id="overlay-facings" class="value"></span>
                </div>
                <div class="detail-row">
                    <span class="label">Dimensions</span>
                    <span id="overlay-dims" class="value"></span>
                </div>
            </div>
            <div class="overlay-nav-footer">
                <div class="overlay-nav-header">
                    <button type="button" id="overlay-prev" class="btn-icon btn-icon-sm" aria-label="Previous">&larr;</button>
                    <span id="overlay-position-label" class="overlay-pos-label"></span>
                    <button type="button" id="overlay-next" class="btn-icon btn-icon-sm" aria-label="Next">&rarr;</button>
                </div>
                <div id="overlay-nav-hints" class="overlay-nav-hints"></div>
            </div>
        </div>
    </div>

    <div id="image-lightbox" class="image-lightbox hidden" role="dialog" aria-label="Product image">
        <button type="button" id="lightbox-close" class="lightbox-close" aria-label="Close">&times;</button>
        <img id="lightbox-img" src="" alt="">
    </div>

    <script src="js/planograms-data.js"></script>
    <script src="js/gestures.js"></script>
    <script src="js/planogram.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
