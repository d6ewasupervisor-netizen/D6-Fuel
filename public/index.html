// ── Photos (before/after) ─────────────────────────────────────────────────────
function getStorePhotos(storeId, phase) {
  if (!photoState[storeId]) photoState[storeId] = { before: {}, after: {} };
  if (!photoState[storeId][phase]) photoState[storeId][phase] = {};
  return photoState[storeId][phase];
}

function getCoolerPhotos(storeId, coolerId, phase) {
  const photos = getStorePhotos(storeId, phase);
  if (!photos[coolerId]) photos[coolerId] = [];
  if (!Array.isArray(photos[coolerId])) photos[coolerId] = [photos[coolerId]];
  return photos[coolerId];
}

function triggerCapture(storeId, coolerId, phase, source) {
  const input = document.getElementById(`photo-input-${source}-${phase}-${coolerId}`);
  if (input) { input.value = ''; input.click(); }
}

function handleCapture(input, storeId, coolerId, phase) {
  const file = input.files[0];
  if (!file) return;
  resizeImage(file, 1024, 0.50).then(dataUrl => {
    if (!photoState[storeId]) photoState[storeId] = { before: {}, after: {} };
    if (!photoState[storeId][phase]) photoState[storeId][phase] = {};
    if (!photoState[storeId][phase][coolerId]) photoState[storeId][phase][coolerId] = [];
    if (!Array.isArray(photoState[storeId][phase][coolerId])) photoState[storeId][phase][coolerId] = [photoState[storeId][phase][coolerId]];
    photoState[storeId][phase][coolerId].push(dataUrl);
    sendResult = null;
    render();
  });
}

function removePhoto(storeId, coolerId, phase, idx) {
  const arr = getCoolerPhotos(storeId, coolerId, phase);
  if (idx >= 0 && idx < arr.length) arr.splice(idx, 1);
  sendResult = null;
  render();
}

function resizeImage(file, maxDim, quality) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > maxDim || h > maxDim) {
          if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
          else { w = Math.round(w * maxDim / h); h = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function sendAndAdvance(storeId, phase, nextStep) {
  const s = STORES.find(x => x.id === storeId);
  if (!s) return;
  const photos = getStorePhotos(storeId, phase);
  sendingPhotos = true;
  sendResult = null;
  render();

  const phaseLabel = phase === 'before' ? 'Before' : 'After';
  const coolerPhotos = [];
  PHOTO_COOLERS.forEach(c => {
    const arr = getCoolerPhotos(storeId, c.id, phase);
    arr.forEach((dataUrl, idx) => {
      const suffix = arr.length > 1 ? `_${idx + 1}` : '';
      coolerPhotos.push({
        name: `${c.label}${arr.length > 1 ? ` (#${idx + 1})` : ''}`,
        fileName: `FM${storeId}_${phase}_${c.fileName}${suffix}.jpg`,
        base64: dataUrl.split(',')[1]
      });
    });
  });

  try {
    const res = await fetch('/api/send-photos', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        storeId: s.id,
        city: s.city,
        state: s.state,
        address: s.address,
        energySet: s.energySet,
        resetDate: kompassDisplay(s),
        phase,
        coolerPhotos,
        userName: currentUser ? currentUser.name : null,
        userEmail: currentUser ? currentUser.email : null
      })
    });
    const data = await res.json();
    if (res.ok && data.success) {
      sendResult = { ok: true, message: `✓ ${phaseLabel} photos emailed to April!` };
      sendingPhotos = false;
      render();
      setTimeout(() => {
        sendResult = null;
        advanceWorkflow(storeId, nextStep);
      }, 1500);
      return;
    } else {
      sendResult = { ok: false, message: data.error || 'Failed to send email. Please try again.' };
    }
  } catch (err) {
    sendResult = { ok: false, message: 'Network error. Make sure the server is running.' };
  }
  sendingPhotos = false;
  render();
}

// ── PDF Viewer ────────────────────────────────────────────────────────────────
let pdfDoc = null;
let pdfPageNum = 1;
let pdfScale = 1.5;
let pdfBaseScale = 1.5;
let pdfTextContent = {};
let pdfSearchTerm = '';
let pdfSearchMatches = [];
let pdfSearchIdx = -1;
let _pdfScrollTarget = null;

pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

function openPdfViewer(url, title) {
  pdfPageNum = 1;
  pdfScale = 1.5;
  pdfBaseScale = 1.5;
  pdfDoc = null;
  pdfTextContent = {};
  pdfSearchTerm = '';
  pdfSearchMatches = [];
  pdfSearchIdx = -1;
  _pdfScrollTarget = null;

  const overlay = document.createElement('div');
  overlay.className = 'pdf-viewer-overlay';
  overlay.id = 'pdf-viewer';
  overlay.innerHTML = `
    <div class="pdf-viewer-toolbar">
      <button class="pdf-close-btn" onclick="closePdfViewer()">&times;</button>
      <span class="pdf-title">${title}</span>
      <div class="pdf-toolbar-actions">
        <button class="pdf-action-btn" id="pdf-search-toggle" onclick="togglePdfSearch()" title="Search">🔍</button>
      </div>
    </div>
    <div class="pdf-search-bar" id="pdf-search-bar">
      <input class="pdf-search-input" id="pdf-search-input" type="text" placeholder="Search in document…" autocomplete="off" inputmode="search" oninput="onPdfSearchInput(this.value)" onkeydown="if(event.key==='Enter'){event.preventDefault();event.shiftKey?pdfSearchPrev():pdfSearchNext()}">
      <span class="pdf-search-count" id="pdf-search-count"></span>
      <div class="pdf-search-nav">
        <button class="pdf-search-nav-btn" id="pdf-search-prev" onclick="pdfSearchPrev()" disabled>‹</button>
        <button class="pdf-search-nav-btn" id="pdf-search-next" onclick="pdfSearchNext()" disabled>›</button>
      </div>
    </div>
    <div class="pdf-controls-row" id="pdf-controls-row" style="display:none">
      <div class="pdf-page-controls">
        <button class="pdf-page-btn" id="pdf-prev" onclick="pdfPrev()">‹</button>
        <span class="pdf-page-info" id="pdf-page-info"></span>
        <button class="pdf-page-btn" id="pdf-next" onclick="pdfNext()">›</button>
      </div>
      <div class="pdf-zoom-controls">
        <button class="pdf-zoom-btn" onclick="pdfZoomBtn(-0.25)">−</button>
        <span class="pdf-zoom-pct" id="pdf-zoom-pct"></span>
        <button class="pdf-zoom-btn" onclick="pdfZoomBtn(0.25)">+</button>
      </div>
    </div>
    <div class="pdf-canvas-wrap" id="pdf-canvas-wrap">
      <div class="pdf-loading">Loading PDF…</div>
    </div>
  `;
  document.body.appendChild(overlay);
  initPdfGestures();

  pdfjsLib.getDocument(url).promise.then(doc => {
    pdfDoc = doc;
    const row = document.getElementById('pdf-controls-row');
    if (row) row.style.display = 'flex';
    renderPdfPage();
    extractAllPdfText(doc);
  }).catch(() => {
    const wrap = document.getElementById('pdf-canvas-wrap');
    if (wrap) wrap.innerHTML = `<div class="pdf-loading" style="color:var(--red)">Failed to load PDF</div>`;
  });
}

function closePdfViewer() {
  const el = document.getElementById('pdf-viewer');
  if (el) el.remove();
  pdfDoc = null;
  pdfTextContent = {};
  pdfSearchMatches = [];
}

function renderPdfPage() {
  if (!pdfDoc) return;
  pdfDoc.getPage(pdfPageNum).then(page => {
    const viewport = page.getViewport({ scale: pdfScale });
    const canvas = document.createElement('canvas');
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    const ctx = canvas.getContext('2d');

    const container = document.createElement('div');
    container.className = 'pdf-page-container';
    container.id = 'pdf-page-container';
    container.style.width = viewport.width + 'px';
    container.style.height = viewport.height + 'px';
    container.appendChild(canvas);

    page.render({ canvasContext: ctx, viewport }).promise.then(() => {
      const wrap = document.getElementById('pdf-canvas-wrap');
      if (!wrap) return;
      wrap.innerHTML = '';
      wrap.appendChild(container);
      renderPdfTextLayer(page, viewport, container);

      if (_pdfScrollTarget) {
        const st = _pdfScrollTarget;
        wrap.scrollLeft = st.docX * pdfScale - st.viewX;
        wrap.scrollTop  = st.docY * pdfScale - st.viewY;
        _pdfScrollTarget = null;
      }
    });

    updatePdfControls();
  });
}

function renderPdfTextLayer(page, viewport, container) {
  page.getTextContent().then(textContent => {
    const textDiv = document.createElement('div');
    textDiv.className = 'pdf-text-layer';
    textDiv.style.width = viewport.width + 'px';
    textDiv.style.height = viewport.height + 'px';
    container.appendChild(textDiv);

    const textItems = textContent.items;
    textItems.forEach(item => {
      const tx = pdfjsLib.Util.transform(viewport.transform, item.transform);
      const span = document.createElement('span');
      span.textContent = item.str;
      const fontHeight = Math.sqrt(tx[2] * tx[2] + tx[3] * tx[3]);
      span.style.fontSize = fontHeight + 'px';
      span.style.left = tx[4] + 'px';
      span.style.top = (tx[5] - fontHeight) + 'px';
      if (item.width > 0) {
        const measuredWidth = item.str.length * fontHeight * 0.5;
        if (measuredWidth > 0) {
          span.style.transform = `scaleX(${(item.width * pdfScale) / measuredWidth})`;
        }
      }
      textDiv.appendChild(span);
    });

    if (pdfSearchTerm) highlightPdfSearchOnPage(textDiv);
  });
}

function updatePdfControls() {
  const info = document.getElementById('pdf-page-info');
  if (info && pdfDoc) info.textContent = `${pdfPageNum} / ${pdfDoc.numPages}`;
  const prev = document.getElementById('pdf-prev');
  const next = document.getElementById('pdf-next');
  if (prev) prev.disabled = pdfPageNum <= 1;
  if (next) next.disabled = pdfPageNum >= (pdfDoc ? pdfDoc.numPages : 1);
  const pct = document.getElementById('pdf-zoom-pct');
  if (pct) pct.textContent = Math.round(pdfScale * 100) + '%';
}

function pdfPrev() {
  if (pdfPageNum > 1) { pdfPageNum--; _pdfScrollTarget = null; renderPdfPage(); }
}
function pdfNext() {
  if (pdfDoc && pdfPageNum < pdfDoc.numPages) { pdfPageNum++; _pdfScrollTarget = null; renderPdfPage(); }
}
function pdfZoomBtn(delta) {
  const wrap = document.getElementById('pdf-canvas-wrap');
  if (wrap) {
    const cx = wrap.clientWidth / 2;
    const cy = wrap.clientHeight / 2;
    const docX = (wrap.scrollLeft + cx) / pdfScale;
    const docY = (wrap.scrollTop + cy) / pdfScale;
    pdfScale = Math.max(0.5, Math.min(5, pdfScale + delta));
    _pdfScrollTarget = { docX, docY, viewX: cx, viewY: cy };
  } else {
    pdfScale = Math.max(0.5, Math.min(5, pdfScale + delta));
  }
  renderPdfPage();
}

// ── Touch gestures: pinch-to-zoom + swipe page navigation + pan ──────────────
function initPdfGestures() {
  const wrap = document.getElementById('pdf-canvas-wrap');
  if (!wrap) return;

  let pinchActive = false;
  let pinchStartDist = 0;
  let pinchStartScale = 0;
  let pinchFocalX = 0;
  let pinchFocalY = 0;
  let pinchOriginDocX = 0;
  let pinchOriginDocY = 0;

  let panActive = false;
  let panStartX = 0;
  let panStartY = 0;
  let panScrollX = 0;
  let panScrollY = 0;
  let panStartTime = 0;
  let panDeltaX = 0;
  let swipeLocked = false;

  function touchDist(a, b) {
    const dx = a.clientX - b.clientX, dy = a.clientY - b.clientY;
    return Math.sqrt(dx * dx + dy * dy);
  }
  function touchMid(a, b) {
    return { x: (a.clientX + b.clientX) / 2, y: (a.clientY + b.clientY) / 2 };
  }

  wrap.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      e.preventDefault();
      panActive = false;
      swipeLocked = false;
      pinchActive = true;
      pinchStartDist = touchDist(e.touches[0], e.touches[1]);
      pinchStartScale = pdfScale;

      const mid = touchMid(e.touches[0], e.touches[1]);
      const rect = wrap.getBoundingClientRect();
      pinchFocalX = mid.x - rect.left;
      pinchFocalY = mid.y - rect.top;
      pinchOriginDocX = (wrap.scrollLeft + pinchFocalX) / pdfScale;
      pinchOriginDocY = (wrap.scrollTop + pinchFocalY) / pdfScale;

    } else if (e.touches.length === 1) {
      pinchActive = false;
      panActive = true;
      swipeLocked = false;
      panStartX = e.touches[0].clientX;
      panStartY = e.touches[0].clientY;
      panScrollX = wrap.scrollLeft;
      panScrollY = wrap.scrollTop;
      panStartTime = Date.now();
      panDeltaX = 0;
    }
  }, { passive: false });

  wrap.addEventListener('touchmove', e => {
    if (pinchActive && e.touches.length === 2) {
      e.preventDefault();
      const dist = touchDist(e.touches[0], e.touches[1]);
      const ratio = dist / pinchStartDist;
      const newScale = Math.max(0.5, Math.min(5, pinchStartScale * ratio));
      const visualRatio = newScale / pdfScale;

      const container = document.getElementById('pdf-page-container');
      if (container) {
        const mid = touchMid(e.touches[0], e.touches[1]);
        const rect = wrap.getBoundingClientRect();
        const focalX = mid.x - rect.left;
        const focalY = mid.y - rect.top;

        const ox = (wrap.scrollLeft + pinchFocalX) / pdfScale;
        const oy = (wrap.scrollTop + pinchFocalY) / pdfScale;

        container.style.transformOrigin = `${ox * pdfScale}px ${oy * pdfScale}px`;
        container.style.transform = `scale(${visualRatio})`;
      }

    } else if (panActive && e.touches.length === 1) {
      const dx = e.touches[0].clientX - panStartX;
      const dy = e.touches[0].clientY - panStartY;
      panDeltaX = dx;

      const contentW = wrap.scrollWidth;
      const viewW = wrap.clientWidth;
      const isZoomed = contentW > viewW + 2;

      if (isZoomed) {
        e.preventDefault();
        wrap.scrollLeft = panScrollX - dx;
        wrap.scrollTop = panScrollY - dy;
      } else {
        if (!swipeLocked && Math.abs(dy) > Math.abs(dx) * 1.2 && Math.abs(dy) > 10) {
          swipeLocked = true;
        }
        if (!swipeLocked && Math.abs(dx) > 10) {
          e.preventDefault();
          const container = document.getElementById('pdf-page-container');
          if (container) {
            const clamp = Math.max(-80, Math.min(80, dx * 0.4));
            container.style.transition = 'none';
            container.style.transform = `translateX(${clamp}px)`;
          }
        }
      }
    }
  }, { passive: false });

  wrap.addEventListener('touchend', e => {
    if (pinchActive && e.touches.length < 2) {
      pinchActive = false;
      const container = document.getElementById('pdf-page-container');
      const cStyle = container ? container.style.transform : '';
      const match = cStyle.match(/scale\(([\d.]+)\)/);
      const visualRatio = match ? parseFloat(match[1]) : 1;
      const finalScale = Math.max(0.5, Math.min(5, pdfScale * visualRatio));

      if (container) { container.style.transform = ''; container.style.transformOrigin = ''; }

      if (Math.abs(finalScale - pdfScale) > 0.02) {
        _pdfScrollTarget = { docX: pinchOriginDocX, docY: pinchOriginDocY, viewX: pinchFocalX, viewY: pinchFocalY };
        pdfScale = Math.round(finalScale * 20) / 20;
        renderPdfPage();
      }
      return;
    }

    if (panActive) {
      panActive = false;
      const container = document.getElementById('pdf-page-container');
      if (container) { container.style.transition = ''; container.style.transform = ''; }

      const contentW = wrap.scrollWidth;
      const viewW = wrap.clientWidth;
      const isZoomed = contentW > viewW + 2;

      if (!isZoomed && !swipeLocked) {
        const elapsed = Date.now() - panStartTime;
        const velocity = Math.abs(panDeltaX) / Math.max(elapsed, 1) * 1000;
        const threshold = Math.min(viewW * 0.25, 80);

        if ((Math.abs(panDeltaX) > threshold || velocity > 400)) {
          if (panDeltaX < 0 && pdfDoc && pdfPageNum < pdfDoc.numPages) {
            pdfPageNum++;
            _pdfScrollTarget = null;
            renderPdfPage();
            return;
          } else if (panDeltaX > 0 && pdfPageNum > 1) {
            pdfPageNum--;
            _pdfScrollTarget = null;
            renderPdfPage();
            return;
          }
        }
      }
    }
    swipeLocked = false;
  }, { passive: true });
}

// ── PDF Text Search ──────────────────────────────────────────────────────────
function extractAllPdfText(doc) {
  const promises = [];
  for (let i = 1; i <= doc.numPages; i++) {
    promises.push(
      doc.getPage(i).then(page => page.getTextContent()).then(tc => {
        pdfTextContent[i] = tc.items.map(item => item.str).join(' ');
      })
    );
  }
  Promise.all(promises).catch(() => {});
}

function togglePdfSearch() {
  const bar = document.getElementById('pdf-search-bar');
  const btn = document.getElementById('pdf-search-toggle');
  if (!bar) return;
  const isOpen = bar.classList.toggle('open');
  if (btn) btn.classList.toggle('active', isOpen);
  if (isOpen) {
    const input = document.getElementById('pdf-search-input');
    if (input) { input.focus(); input.select(); }
  } else {
    clearPdfSearch();
  }
}

function onPdfSearchInput(term) {
  pdfSearchTerm = term.trim();
  if (!pdfSearchTerm || pdfSearchTerm.length < 2) {
    pdfSearchMatches = [];
    pdfSearchIdx = -1;
    updateSearchUI();
    clearPageHighlights();
    return;
  }
  const termLower = pdfSearchTerm.toLowerCase();
  pdfSearchMatches = [];
  for (let p = 1; p <= (pdfDoc ? pdfDoc.numPages : 0); p++) {
    const text = (pdfTextContent[p] || '').toLowerCase();
    let idx = 0;
    while ((idx = text.indexOf(termLower, idx)) !== -1) {
      pdfSearchMatches.push({ page: p, index: idx });
      idx += termLower.length;
    }
  }
  pdfSearchIdx = pdfSearchMatches.length > 0 ? 0 : -1;
  updateSearchUI();
  navigateToCurrentMatch();
}

function pdfSearchNext() {
  if (pdfSearchMatches.length === 0) return;
  pdfSearchIdx = (pdfSearchIdx + 1) % pdfSearchMatches.length;
  updateSearchUI();
  navigateToCurrentMatch();
}

function pdfSearchPrev() {
  if (pdfSearchMatches.length === 0) return;
  pdfSearchIdx = (pdfSearchIdx - 1 + pdfSearchMatches.length) % pdfSearchMatches.length;
  updateSearchUI();
  navigateToCurrentMatch();
}

function navigateToCurrentMatch() {
  if (pdfSearchIdx < 0 || !pdfSearchMatches.length) return;
  const match = pdfSearchMatches[pdfSearchIdx];
  if (match.page !== pdfPageNum) {
    pdfPageNum = match.page;
    renderPdfPage();
  } else {
    const textLayer = document.querySelector('.pdf-text-layer');
    if (textLayer) highlightPdfSearchOnPage(textLayer);
  }
}

function highlightPdfSearchOnPage(textLayer) {
  if (!pdfSearchTerm || !textLayer) return;
  const spans = textLayer.querySelectorAll('span');
  const termLower = pdfSearchTerm.toLowerCase();
  const pageMatches = pdfSearchMatches.filter(m => m.page === pdfPageNum);
  let firstActive = null;

  spans.forEach(span => {
    const original = span.textContent;
    const lower = original.toLowerCase();
    if (lower.includes(termLower)) {
      span.classList.add('highlight');
      const isActiveMatch = pageMatches.some((m, mi) => {
        const globalIdx = pdfSearchMatches.indexOf(m);
        return globalIdx === pdfSearchIdx;
      });
      if (isActiveMatch && !firstActive) {
        span.classList.add('active');
        firstActive = span;
      }
    }
  });

  if (firstActive) {
    firstActive.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

function clearPageHighlights() {
  const spans = document.querySelectorAll('.pdf-text-layer .highlight');
  spans.forEach(s => { s.classList.remove('highlight', 'active'); });
}

function clearPdfSearch() {
  pdfSearchTerm = '';
  pdfSearchMatches = [];
  pdfSearchIdx = -1;
  const input = document.getElementById('pdf-search-input');
  if (input) input.value = '';
  updateSearchUI();
  clearPageHighlights();
}

function updateSearchUI() {
  const count = document.getElementById('pdf-search-count');
  const prevBtn = document.getElementById('pdf-search-prev');
  const nextBtn = document.getElementById('pdf-search-next');
  if (count) {
    if (!pdfSearchTerm || pdfSearchTerm.length < 2) count.textContent = '';
    else if (pdfSearchMatches.length === 0) count.textContent = '0 / 0';
    else count.textContent = `${pdfSearchIdx + 1} / ${pdfSearchMatches.length}`;
  }
  if (prevBtn) prevBtn.disabled = pdfSearchMatches.length === 0;
  if (nextBtn) nextBtn.disabled = pdfSearchMatches.length === 0;
}

// ── Swipe gesture for bay navigation ──────────────────────────────────────────
let _touchStartX = 0;
document.addEventListener('touchstart', e => {
  const frame = e.target.closest('.cooler-frame');
  if (frame) _touchStartX = e.touches[0].clientX;
}, { passive: true });
document.addEventListener('touchend', e => {
  if (!_touchStartX || !selectedCooler) return;
  const dx = e.changedTouches[0].clientX - _touchStartX;
  _touchStartX = 0;
  if (Math.abs(dx) < 50) return;
  const pog = PLANOGRAMS[selectedCooler];
  if (!pog || pog.bays.length < 2) return;
  if (dx < 0 && currentBayIdx < pog.bays.length - 1) switchBay(currentBayIdx + 1);
  else if (dx > 0 && currentBayIdx > 0) switchBay(currentBayIdx - 1);
}, { passive: true });

// ── Version polling + state persistence + hotfix overlay ──────────────────────
const _STATE_KEY = 'd6fuel_state';
const _HOTFIX_KEY = 'd6fuel_hotfix';
const _SEEN_VER_KEY = 'd6fuel_seen_version';
let _appVersion = null;

function saveAppState() {
  try {
    const state = {
      photoState,
      workflowStep,
      selectedStore,
      activeTab,
      selectedCooler,
      currentBayIdx
    };
    sessionStorage.setItem(_STATE_KEY, JSON.stringify(state));
  } catch (e) {
    console.warn('Could not save state to sessionStorage:', e.message);
  }
}

function restoreAppState() {
  try {
    const raw = sessionStorage.getItem(_STATE_KEY);
    if (!raw) return false;
    const state = JSON.parse(raw);
    if (state.photoState && typeof state.photoState === 'object') photoState = state.photoState;
    if (state.workflowStep && typeof state.workflowStep === 'object') workflowStep = state.workflowStep;
    if (state.selectedStore) selectedStore = state.selectedStore;
    if (state.activeTab) activeTab = state.activeTab;
    if (state.selectedCooler) selectedCooler = state.selectedCooler;
    if (typeof state.currentBayIdx === 'number') currentBayIdx = state.currentBayIdx;
    sessionStorage.removeItem(_STATE_KEY);
    return true;
  } catch (e) {
    return false;
  }
}

function renderHotfixOverlay(info) {
  if (!info || !info.hotfix) return;
  if (document.getElementById('hotfix-overlay')) return;

  const lines = info.hotfix.split(/\.\s+/).filter(s => s.trim()).map(s => s.trim().replace(/\.$/, ''));
  const listHtml = lines.map(l => '<li>' + l + '</li>').join('');

  const overlay = document.createElement('div');
  overlay.className = 'hotfix-overlay';
  overlay.id = 'hotfix-overlay';
  overlay.innerHTML = `
    <div class="hotfix-card">
      <div class="hotfix-icon">&#x1F680;</div>
      <div class="hotfix-title">${info.hotfixTitle || 'App Updated'}</div>
      <div class="hotfix-version">v${info.version || '?'}</div>
      <div class="hotfix-body"><ul style="padding-left:18px;margin:0">${listHtml}</ul></div>
      <div class="hotfix-safe">&#x2705; All your photos and progress have been preserved.</div>
      <button class="hotfix-dismiss" onclick="dismissHotfix()">Got it</button>
    </div>
  `;
  document.body.appendChild(overlay);
}

function dismissHotfix() {
  const el = document.getElementById('hotfix-overlay');
  if (el) el.remove();
  if (_appVersion) {
    try { localStorage.setItem(_SEEN_VER_KEY, _appVersion); } catch (e) {}
  }
}

function showHotfixFromSession() {
  try {
    const raw = sessionStorage.getItem(_HOTFIX_KEY);
    if (!raw) return;
    const info = JSON.parse(raw);
    sessionStorage.removeItem(_HOTFIX_KEY);
    renderHotfixOverlay(info);
  } catch (e) {}
}

function checkVersionAndShowHotfix(data) {
  const serverVersion = data.version || '1.0.0';
  const seenVersion = localStorage.getItem(_SEEN_VER_KEY);
  if (serverVersion !== seenVersion && data.hotfix) {
    renderHotfixOverlay(data);
  }
}

function startVersionPolling() {
  fetch('/api/version').then(r => r.json()).then(data => {
    _appVersion = data.version || '1.0.0';
    checkVersionAndShowHotfix(data);
  }).catch(() => { _appVersion = '1.0.0'; });

  setInterval(() => {
    fetch('/api/version').then(r => r.json()).then(data => {
      const serverVersion = data.version || '1.0.0';
      if (_appVersion && serverVersion !== _appVersion) {
        saveAppState();
        try {
          sessionStorage.setItem(_HOTFIX_KEY, JSON.stringify(data));
        } catch (e) {}
        location.reload();
      }
    }).catch(() => {});
  }, 30000);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
restoreAppState();

if (currentUser) {
  render();
  showHotfixFromSession();
} else {
  renderLoginOverlay();
}

startVersionPolling();
</script>
