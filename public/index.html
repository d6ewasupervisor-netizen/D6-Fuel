<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e13">
<title>D6 Fuel Cooler Reset Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root {
  --bg: #0a0e13;
  --bg-elevated: #0f141c;
  --card: #151d2b;
  --card-border: #243044;
  --card-hover: #1c2840;
  --text: #ffffff;
  --text-secondary: #c8d6e5;
  --muted: #8fa4b8;
  --dim: #5a7088;
  --accent: #4da6ff;
  --accent-hover: #6bb8ff;
  --accent-bg: rgba(77,166,255,0.12);
  --green: #00e87a;
  --green-bg: rgba(0,232,122,0.12);
  --amber: #ffcc00;
  --amber-bg: rgba(255,204,0,0.12);
  --red: #ff4757;
  --red-bg: rgba(255,71,87,0.12);
  --orange: #ff8c42;
  --orange-bg: rgba(255,140,66,0.12);
  --radius: 14px;
  --radius-sm: 10px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.5);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }
body {
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bottom);
  overscroll-behavior-y: contain;
}

.container { max-width: 640px; margin: 0 auto; padding: 16px; }

/* ── Sticky top nav ── */
.top-nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10,14,19,0.92);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--card-border);
  padding: 12px 16px;
  margin: -16px -16px 16px -16px;
}
.top-nav-inner { display: flex; align-items: center; gap: 12px; max-width: 640px; margin: 0 auto; }
.nav-back-btn {
  display: flex; align-items: center; gap: 6px;
  background: var(--card); border: 1px solid var(--card-border); border-radius: var(--radius-sm);
  color: var(--accent); font-size: 14px; font-weight: 600; cursor: pointer;
  padding: 10px 16px; font-family: inherit; min-height: 44px; transition: all 0.15s;
  white-space: nowrap; flex-shrink: 0;
}
.nav-back-btn:active { background: var(--card-hover); transform: scale(0.97); }
.nav-breadcrumb { font-size: 13px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.nav-breadcrumb strong { color: var(--text); font-weight: 700; }

/* ── Header / Hero ── */
.header {
  background: linear-gradient(135deg, #162438 0%, #1e3350 50%, #152030 100%);
  border-radius: var(--radius); padding: 28px 22px; margin-bottom: 20px;
  border: 1px solid var(--card-border); box-shadow: var(--shadow);
}
.header .badge {
  display: inline-flex; align-items: center; gap: 8px; font-size: 12px;
  font-weight: 700; color: var(--green); letter-spacing: 1.5px;
  text-transform: uppercase; margin-bottom: 10px;
}
.header .badge::before {
  content: ''; width: 10px; height: 10px; border-radius: 50%;
  background: var(--green); box-shadow: 0 0 12px rgba(0,232,122,0.5);
  animation: pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
.header h1 { font-size: 26px; font-weight: 800; color: #fff; margin-bottom: 6px; line-height: 1.2; }
.header p { font-size: 15px; color: var(--text-secondary); }
.header .code { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--muted); margin-top: 6px; }

/* ── Rules box ── */
.rules-box {
  background: var(--card); border-radius: var(--radius); padding: 18px 20px;
  margin-bottom: 20px; border: 1px solid #4a3a00; box-shadow: 0 0 20px rgba(255,204,0,0.06);
}
.rules-box .label {
  display: flex; align-items: center; gap: 8px; font-size: 14px;
  font-weight: 700; color: var(--amber); margin-bottom: 10px;
}
.rules-box .items { font-size: 14px; color: var(--text-secondary); line-height: 1.8; }

/* ── Store grid ── */
.store-grid { display: grid; gap: 12px; margin-bottom: 24px; }
.store-btn {
  display: block; width: 100%; text-align: left; background: var(--card);
  border: 1px solid var(--card-border); border-radius: var(--radius);
  padding: 18px 20px; cursor: pointer; transition: all 0.15s ease;
  font-family: inherit; color: var(--text); min-height: 80px;
}
.store-btn:active { background: var(--card-hover); transform: scale(0.98); border-color: var(--accent); }
.store-btn .fm { font-size: 20px; font-weight: 800; color: #fff; font-family: 'JetBrains Mono', monospace; }
.store-btn .city { font-size: 15px; color: var(--text-secondary); margin-top: 4px; }
.store-btn .date { font-size: 13px; color: var(--muted); margin-top: 4px; font-weight: 500; }
.store-btn .meta { font-size: 13px; color: var(--dim); margin-top: 4px; }
.store-btn .swap-badge {
  font-size: 11px; font-weight: 700; color: var(--orange);
  background: var(--orange-bg); padding: 3px 10px; border-radius: 12px; margin-left: 10px;
  border: 1px solid rgba(255,140,66,0.3);
}
.store-card { display: flex; flex-direction: column; gap: 0; }
.store-card .store-btn { border-radius: var(--radius) var(--radius) 0 0; }
.store-photo-actions {
  display: grid; grid-template-columns: 1fr 1fr; border: 1px solid var(--card-border);
  border-top: none; border-radius: 0 0 var(--radius) var(--radius); overflow: hidden;
}
.store-photo-btn {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  padding: 12px 8px; background: var(--bg-elevated); border: none;
  font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit;
  transition: all 0.15s; color: var(--text-secondary);
}
.store-photo-btn:first-child { border-right: 1px solid var(--card-border); }
.store-photo-btn:active { background: var(--card-hover); }
.store-photo-btn .photo-count {
  font-size: 11px; font-weight: 800; padding: 2px 7px; border-radius: 10px;
  background: var(--accent-bg); color: var(--accent);
}
.store-photo-btn .photo-count.complete {
  background: rgba(0,232,122,0.15); color: var(--green);
}
.store-photo-btn .photo-count.sent {
  background: rgba(0,232,122,0.15); color: var(--green);
}

/* ── Store header ── */
.store-header {
  background: linear-gradient(135deg, #162438 0%, #1e3350 50%, #152030 100%);
  border-radius: var(--radius); padding: 24px 22px; margin-bottom: 20px;
  border: 1px solid var(--card-border); box-shadow: var(--shadow);
}
.store-header h2 { font-size: 28px; font-weight: 800; font-family: 'JetBrains Mono', monospace; color: #fff; margin-bottom: 6px; }
.store-header .addr { font-size: 15px; color: var(--text-secondary); }
.store-header .detail { font-size: 13px; color: var(--muted); margin-top: 6px; font-weight: 500; }

/* ── Store nav tabs ── */
.store-tabs {
  display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto;
  padding: 4px 0; scrollbar-width: none; -webkit-overflow-scrolling: touch;
}
.store-tabs::-webkit-scrollbar { display: none; }
.tab-btn {
  flex-shrink: 0; padding: 12px 18px; border-radius: var(--radius-sm);
  border: 1px solid var(--card-border); background: var(--card);
  color: var(--muted); font-size: 14px; font-weight: 600;
  cursor: pointer; font-family: inherit; transition: all 0.15s ease;
  min-height: 48px; white-space: nowrap;
}
.tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; box-shadow: 0 2px 12px rgba(77,166,255,0.3); }
.tab-btn:active:not(.active) { background: var(--card-hover); border-color: var(--accent); }

/* ── Tab panels ── */
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── Section ── */
.section { margin-bottom: 20px; }
.section-label { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.section-label .bar { width: 4px; height: 20px; border-radius: 2px; }
.section-label h3 { font-size: 13px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; }

/* ── Card ── */
.card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--card-border); overflow: hidden; }
.card-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 18px; border-bottom: 1px solid #1c2a3a; font-size: 14px;
}
.card-row:last-child { border-bottom: none; }
.card-row .label { color: var(--muted); font-weight: 500; }
.card-row .value { font-weight: 600; color: var(--text); }
.card-row .value.highlight { color: var(--red); font-weight: 800; font-size: 15px; }

/* ── Cooler rows ── */
.cooler-row { padding: 14px 18px; border-bottom: 1px solid #1c2a3a; }
.cooler-row:last-child { border-bottom: none; }
.cooler-row .name { font-size: 14px; font-weight: 600; }
.cooler-row .name.new { color: var(--orange); }
.cooler-row .pog { font-size: 12px; color: var(--dim); font-family: 'JetBrains Mono', monospace; margin-top: 3px; }
.cooler-row .size-badge { font-size: 12px; color: var(--muted); float: right; }

/* ── Warnings ── */
.warning {
  background: var(--amber-bg); border: 1px solid rgba(255,204,0,0.3);
  border-radius: var(--radius-sm); padding: 16px 18px; margin-bottom: 20px;
  font-size: 14px; color: var(--amber); line-height: 1.6; font-weight: 500;
}
.warning.discrepancy { border-color: rgba(255,140,66,0.3); color: var(--orange); background: var(--orange-bg); }

/* ── POG links ── */
.pog-section { margin-bottom: 20px; }
.pog-link {
  display: flex; align-items: center; gap: 14px; padding: 16px 18px;
  background: var(--card); border: 1px solid var(--card-border);
  border-radius: var(--radius-sm); margin-bottom: 10px; text-decoration: none;
  color: var(--text); transition: all 0.15s ease; min-height: 60px;
}
.pog-link:active { border-color: var(--accent); background: var(--card-hover); }
.pog-link .icon {
  width: 44px; height: 44px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0;
}
.pog-link .icon.csd { background: rgba(77,166,255,0.15); }
.pog-link .icon.bev { background: rgba(0,232,122,0.15); }
.pog-link .icon.monster { background: rgba(255,140,66,0.15); }
.pog-link .icon.rb { background: rgba(255,71,87,0.15); }
.pog-link .info { flex: 1; }
.pog-link .info .title { font-size: 14px; font-weight: 600; }
.pog-link .info .sub { font-size: 12px; color: var(--dim); font-family: 'JetBrains Mono', monospace; margin-top: 2px; }
.pog-link .dl { font-size: 13px; color: var(--accent); font-weight: 700; }

/* ── Checklist ── */
.checklist { margin-bottom: 20px; }
.check-group-label { font-size: 14px; font-weight: 700; color: var(--text); margin: 12px 0 8px 0; }
.check-item {
  display: flex; align-items: flex-start; gap: 12px; padding: 12px 0;
  font-size: 15px; color: var(--text-secondary); line-height: 1.5;
}
.check-item .box {
  width: 22px; height: 22px; border: 2px solid #3a5068;
  border-radius: 6px; flex-shrink: 0; margin-top: 2px;
}

/* ── Product accordion ── */
.pog-accordion { margin-bottom: 12px; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--card-border); }
.pog-accordion-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 18px; background: var(--card); cursor: pointer; user-select: none;
  transition: background 0.15s; min-height: 60px;
}
.pog-accordion-header:active { background: var(--card-hover); }
.pog-accordion-header .pog-title { display: flex; align-items: center; gap: 12px; }
.pog-accordion-header .pog-icon {
  width: 36px; height: 36px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0;
}
.pog-accordion-header .pog-name { font-size: 15px; font-weight: 700; color: var(--text); }
.pog-accordion-header .pog-count { font-size: 12px; color: var(--muted); margin-top: 2px; }
.pog-accordion-header .chevron { font-size: 14px; color: var(--muted); transition: transform 0.2s; }
.pog-accordion-header.open .chevron { transform: rotate(180deg); }
.pog-accordion-body { display: none; background: var(--bg-elevated); border-top: 1px solid var(--card-border); }
.pog-accordion-body.open { display: block; }

/* ── Product grid ── */
.product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #1a2636; }
.product-card { background: var(--bg-elevated); padding: 14px; display: flex; flex-direction: column; gap: 10px; }
.product-card:active { background: #182030; }
.product-img-wrap {
  aspect-ratio: 1; border-radius: 10px; background: #fff;
  overflow: hidden; display: flex; align-items: center; justify-content: center;
}
.product-img-wrap img { width: 100%; height: 100%; object-fit: contain; padding: 6px; }
.product-img-placeholder {
  width: 100%; height: 100%; display: flex; align-items: center;
  justify-content: center; font-size: 32px; background: #1e2c3e; border-radius: 10px;
}
.product-name { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.4; }
.product-meta { display: flex; flex-direction: column; gap: 3px; }
.product-upc { font-size: 12px; font-family: 'JetBrains Mono', monospace; color: var(--muted); }
.product-size { font-size: 12px; color: var(--muted); }

/* ── Footer ── */
.footer { text-align: center; font-size: 12px; color: #445566; margin-top: 28px; padding-top: 20px; border-top: 1px solid #1a2332; }

/* ── Planogram: Cooler selector ── */
.cooler-select-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
.cooler-select-btn {
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  padding: 22px 12px; background: var(--card); border: 2px solid var(--card-border);
  border-radius: var(--radius); cursor: pointer; font-family: inherit;
  color: var(--text); transition: all 0.15s ease;
}
.cooler-select-btn:active { border-color: var(--accent); background: var(--card-hover); transform: scale(0.97); }
.cooler-select-btn .cs-icon {
  width: 52px; height: 52px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center; font-size: 24px;
}
.cooler-select-btn .cs-name { font-size: 14px; font-weight: 700; text-align: center; line-height: 1.3; }
.cooler-select-btn .cs-count { font-size: 12px; color: var(--muted); font-weight: 500; }
.cooler-select-btn.backup { opacity: 0.6; }
.cooler-select-btn.backup .cs-name::after { content: ' (Backup)'; font-weight: 400; color: var(--dim); font-size: 11px; }

/* ── Planogram: Bay viewer ── */
.pog-viewer { position: relative; }
.pog-viewer-back {
  background: var(--card); border: 1px solid var(--card-border); border-radius: var(--radius-sm);
  color: var(--accent); font-size: 14px; font-weight: 600; cursor: pointer;
  padding: 10px 16px; margin-bottom: 14px; font-family: inherit; min-height: 44px;
}
.pog-viewer-back:active { background: var(--card-hover); }
.pog-viewer-title { font-size: 18px; font-weight: 800; color: #fff; margin-bottom: 4px; }
.pog-viewer-sub { font-size: 12px; color: var(--muted); margin-bottom: 14px; font-weight: 500; }

/* Bay navigation */
.bay-nav { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 14px; }
.bay-nav-btn {
  width: 44px; height: 44px; border-radius: var(--radius-sm);
  border: 1px solid var(--card-border); background: var(--card);
  color: var(--text-secondary); font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-family: inherit; transition: all 0.15s;
}
.bay-nav-btn:active { border-color: var(--accent); background: var(--card-hover); }
.bay-nav-btn:disabled { opacity: 0.3; cursor: default; }
.bay-dot { width: 12px; height: 12px; border-radius: 50%; background: #2a3a4a; transition: background 0.2s; }
.bay-dot.active { background: var(--accent); box-shadow: 0 0 8px rgba(77,166,255,0.5); }
.bay-label { font-size: 14px; font-weight: 700; color: var(--text-secondary); margin: 0 6px; }

/* Cooler frame */
.cooler-frame {
  background: linear-gradient(180deg, #0c1420 0%, #101a28 100%);
  border: 2px solid #2a3a4a; border-radius: var(--radius); padding: 8px 6px;
  overflow: hidden; position: relative; box-shadow: var(--shadow);
}
.cooler-frame::before {
  content: ''; position: absolute; inset: 0; border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.04); pointer-events: none;
}

/* Shelf row */
.shelf-row {
  display: flex; align-items: stretch; position: relative;
  border-bottom: 2px solid #2a3a4a;
  background: linear-gradient(180deg, transparent 0%, rgba(42,58,74,0.15) 100%);
}
.shelf-row:last-child { border-bottom: none; }
.shelf-label-tag {
  position: absolute; left: 3px; top: 3px; font-size: 10px; font-weight: 700;
  color: #5a7088; font-family: 'JetBrains Mono', monospace; z-index: 2;
}

/* Products container */
.shelf-products { display: flex; align-items: flex-end; width: 100%; min-height: 40px; }

/* Product slot */
.product-slot {
  position: relative; display: flex; align-items: center; justify-content: center;
  overflow: hidden; cursor: pointer; transition: background 0.1s;
  border-right: 1px solid rgba(42,58,74,0.4);
}
.product-slot:last-child { border-right: none; }
.product-slot:active { background: rgba(77,166,255,0.12); }
.product-slot img.slot-thumb { width: 100%; height: 100%; object-fit: contain; padding: 1px; }
.product-slot .slot-fallback {
  font-size: 10px; color: #5a7088; text-align: center; line-height: 1.2;
  padding: 2px; word-break: break-word; overflow: hidden;
}

/* Multi-facing group */
.multi-facing-group {
  position: relative; display: flex; align-items: stretch; flex-shrink: 0;
  border: 1px solid rgba(255,204,0,0.3); border-radius: 3px;
}
.facing-badge {
  position: absolute; top: 1px; right: 1px; font-size: 9px; font-weight: 700;
  color: #ffcc00; background: rgba(0,0,0,0.7); padding: 2px 4px;
  border-radius: 4px; z-index: 2; line-height: 1;
}

/* NEW / CHANGED badges */
.new-badge, .changed-badge {
  position: absolute; bottom: 1px; left: 1px; font-size: 8px; font-weight: 800;
  padding: 2px 4px; border-radius: 4px; z-index: 2; line-height: 1;
}
.new-badge { color: #000; background: var(--green); }
.changed-badge { color: #fff; background: var(--accent); }

/* ── Product detail overlay ── */
.pog-detail-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.75);
  z-index: 1000; display: flex; align-items: flex-end;
  justify-content: center; animation: fadeIn 0.15s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.pog-detail-sheet {
  width: 100%; max-width: 640px; background: #151d2b;
  border-radius: 24px 24px 0 0; padding: 24px 20px;
  max-height: 85vh; overflow-y: auto; animation: slideUp 0.2s ease;
}
@keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.pog-detail-sheet .handle { width: 40px; height: 5px; border-radius: 3px; background: #3a4a5a; margin: 0 auto 20px; }
.pog-detail-sheet .detail-img {
  width: 160px; height: 160px; margin: 0 auto 16px;
  background: #fff; border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; cursor: zoom-in; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.pog-detail-sheet .detail-img img { width: 100%; height: 100%; object-fit: contain; padding: 10px; }
.pog-full-img-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.95);
  z-index: 1100; display: flex; align-items: center; justify-content: center;
  padding: 16px; animation: fadeIn 0.15s ease; cursor: zoom-out;
}
.pog-full-img-overlay img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 8px; pointer-events: none; }
.pog-full-img-hint { position: absolute; bottom: 24px; left: 0; right: 0; text-align: center; font-size: 14px; color: #8fa4b8; }

/* Product scan */
.scan-panel { background: var(--card); border: 1px solid var(--card-border); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; }
.scan-panel .scan-title { font-size: 16px; font-weight: 700; margin-bottom: 10px; color: var(--text); }
.scan-panel .scan-desc { font-size: 13px; color: var(--muted); line-height: 1.5; margin-bottom: 16px; }
.scan-video-wrap {
  position: relative; width: 100%; border-radius: var(--radius-sm);
  overflow: hidden; background: #0a0f14; aspect-ratio: 4/3; margin-bottom: 12px; display: none;
}
.scan-video-wrap.active { display: block; }
.scan-video-wrap video { width: 100%; height: 100%; object-fit: cover; }
.scan-controls { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 12px; }
.scan-btn {
  padding: 12px 18px; border-radius: var(--radius-sm);
  border: 1px solid var(--card-border); background: var(--card-hover);
  color: var(--text); font-size: 14px; font-weight: 600;
  cursor: pointer; font-family: inherit; min-height: 48px;
}
.scan-btn:active { border-color: var(--accent); }
.scan-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.scan-manual { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
.scan-manual input {
  flex: 1; min-width: 140px; padding: 12px 14px; border-radius: var(--radius-sm);
  border: 1px solid var(--card-border); background: var(--bg-elevated);
  color: var(--text); font-size: 16px; font-family: 'JetBrains Mono', monospace;
  min-height: 48px;
}
.scan-result {
  font-size: 14px; line-height: 1.6; margin-top: 12px; padding: 14px;
  border-radius: var(--radius-sm); background: var(--bg-elevated); border: 1px solid var(--card-border);
}
.scan-result.empty { color: var(--dim); }
.scan-loc {
  margin-top: 10px; padding: 12px; border-radius: var(--radius-sm);
  background: var(--bg); border-left: 4px solid var(--accent);
}
.scan-loc .loc-title { font-weight: 700; color: var(--accent); font-size: 14px; margin-bottom: 6px; }
.scan-loc .loc-meta { font-size: 13px; color: var(--muted); }
.scan-open-btn {
  margin-top: 8px; padding: 10px 16px; font-size: 13px; font-weight: 700;
  border-radius: var(--radius-sm); border: 1px solid var(--accent);
  background: var(--accent-bg); color: var(--accent); cursor: pointer;
  font-family: inherit; min-height: 40px;
}
.scan-open-btn:active { background: rgba(77,166,255,0.25); }
.scan-delete-alert {
  border-left: 4px solid var(--orange); background: var(--orange-bg);
  padding: 14px; border-radius: var(--radius-sm); margin-top: 10px;
}
.scan-delete-alert .sd-title { font-weight: 800; color: var(--orange); margin-bottom: 8px; font-size: 15px; }
.scan-delete-alert .sd-row { font-size: 13px; color: var(--text-secondary); margin-top: 6px; line-height: 1.5; }
.scan-moved-note {
  border-left: 4px solid var(--accent); background: var(--accent-bg);
  padding: 14px; border-radius: var(--radius-sm); margin-top: 10px;
  font-size: 13px; color: var(--text-secondary); line-height: 1.5;
}
.pog-detail-sheet .detail-name { font-size: 18px; font-weight: 800; color: #fff; text-align: center; margin-bottom: 6px; }
.pog-detail-sheet .detail-desc { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 16px; }
.pog-detail-sheet .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.pog-detail-sheet .detail-cell { background: var(--bg-elevated); border-radius: var(--radius-sm); padding: 14px; }
.pog-detail-sheet .detail-cell .dl { font-size: 11px; color: var(--dim); margin-bottom: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.pog-detail-sheet .detail-cell .dv { font-size: 15px; font-weight: 700; color: var(--text); font-family: 'JetBrains Mono', monospace; }

/* ── UPC overlay on product slots ── */
.slot-upc {
  position: absolute; top: 0; left: 0; right: 0; font-size: 7px;
  font-family: 'JetBrains Mono', monospace; color: #fff;
  background: rgba(0,0,0,0.8); text-align: center; padding: 1px 0;
  line-height: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
  pointer-events: none; z-index: 3;
}
.group-upc {
  position: absolute; top: 0; left: 0; right: 0; font-size: 8px;
  font-family: 'JetBrains Mono', monospace; color: #fff;
  background: rgba(0,0,0,0.8); text-align: center; padding: 2px 0;
  line-height: 1; white-space: nowrap; pointer-events: none; z-index: 3; letter-spacing: 0.3px;
}

/* ── UPC list view toggle ── */
.upc-toggle-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 10px 16px; border-radius: var(--radius-sm);
  border: 1px solid var(--card-border); background: var(--card);
  color: var(--muted); font-size: 14px; font-weight: 600;
  cursor: pointer; font-family: inherit; transition: all 0.15s;
  margin-bottom: 14px; min-height: 44px;
}
.upc-toggle-btn:active { border-color: var(--accent); }
.upc-toggle-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* ── UPC list ── */
.upc-list-shelf { margin-bottom: 16px; }
.upc-list-shelf-label {
  font-size: 12px; font-weight: 700; color: var(--muted); letter-spacing: 1px;
  text-transform: uppercase; padding: 10px 14px; background: var(--bg-elevated);
  border-radius: var(--radius-sm) var(--radius-sm) 0 0;
  border: 1px solid var(--card-border); border-bottom: none;
}
.upc-list-item {
  display: flex; align-items: center; gap: 14px; padding: 12px 14px;
  background: var(--card); border: 1px solid var(--card-border); border-top: none;
}
.upc-list-item:last-child { border-radius: 0 0 var(--radius-sm) var(--radius-sm); }
.upc-list-pos {
  width: 32px; height: 32px; border-radius: 8px; background: var(--bg-elevated);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: var(--text-secondary);
  font-family: 'JetBrains Mono', monospace; flex-shrink: 0;
}
.upc-list-info { flex: 1; min-width: 0; }
.upc-list-code { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 700; color: #fff; letter-spacing: 0.5px; }
.upc-list-name { font-size: 12px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.upc-list-badges { display: flex; gap: 6px; flex-shrink: 0; }

/* ── Photo capture ── */
.photo-grid { display: grid; gap: 14px; margin-bottom: 20px; }
.photo-card {
  background: var(--card); border: 2px solid var(--card-border);
  border-radius: var(--radius); padding: 18px; transition: border-color 0.15s;
}
.photo-card.captured { border-color: var(--green); box-shadow: 0 0 16px rgba(0,232,122,0.1); }
.photo-card-header { display: flex; align-items: center; gap: 14px; }
.photo-card-icon {
  width: 48px; height: 48px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0;
}
.photo-card-info { flex: 1; }
.photo-card-info .pc-name { font-size: 16px; font-weight: 700; color: var(--text); }
.photo-card-info .pc-status { font-size: 13px; color: var(--dim); margin-top: 4px; font-weight: 500; }
.photo-card-info .pc-status.done { color: var(--green); font-weight: 700; }
.capture-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
.capture-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 14px 10px; border-radius: var(--radius-sm);
  border: 2px dashed #3a5068; background: var(--bg-elevated);
  color: var(--accent); font-size: 14px; font-weight: 700;
  cursor: pointer; font-family: inherit; transition: all 0.15s; min-height: 52px;
}
.capture-btn:active { border-color: var(--accent); background: var(--accent-bg); }
.capture-btn.gallery-btn { color: var(--text-secondary); border-color: #2e4054; }
.photo-gallery { display: flex; gap: 10px; overflow-x: auto; margin-top: 14px; padding-bottom: 6px; -webkit-overflow-scrolling: touch; scroll-snap-type: x mandatory; }
.photo-gallery::-webkit-scrollbar { height: 4px; }
.photo-gallery::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 2px; }
.photo-thumb {
  position: relative; flex-shrink: 0; width: 140px; height: 140px;
  border-radius: var(--radius-sm); overflow: hidden; scroll-snap-align: start;
  border: 2px solid var(--card-border);
}
.photo-thumb img { width: 100%; height: 100%; object-fit: cover; }
.photo-thumb .remove-btn {
  position: absolute; top: 6px; right: 6px; width: 28px; height: 28px;
  border-radius: 50%; border: none; background: rgba(0,0,0,0.75);
  color: #fff; font-size: 14px; font-weight: 700; cursor: pointer;
  display: flex; align-items: center; justify-content: center; line-height: 1;
}
.photo-thumb .remove-btn:active { background: var(--red); }
.photo-thumb .photo-idx {
  position: absolute; bottom: 6px; left: 6px; font-size: 11px; font-weight: 700;
  background: rgba(0,0,0,0.7); color: #fff; padding: 2px 7px; border-radius: 4px;
  font-family: 'JetBrains Mono', monospace;
}
.photo-count-badge {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 22px; height: 22px; border-radius: 11px; background: var(--green);
  color: #000; font-size: 12px; font-weight: 800; padding: 0 6px; margin-left: 8px;
}
.photo-progress {
  display: flex; align-items: center; gap: 12px; padding: 16px 18px;
  background: var(--card); border: 1px solid var(--card-border);
  border-radius: var(--radius-sm); margin-bottom: 20px;
}
.photo-progress-bar { flex: 1; height: 8px; background: var(--bg-elevated); border-radius: 4px; overflow: hidden; }
.photo-progress-fill { height: 100%; background: var(--green); border-radius: 4px; transition: width 0.3s ease; }
.photo-progress-text { font-size: 15px; font-weight: 700; color: var(--text-secondary); white-space: nowrap; }
.send-photos-btn {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 18px; border-radius: var(--radius);
  border: none; font-size: 16px; font-weight: 800; cursor: pointer;
  font-family: inherit; transition: all 0.15s; min-height: 56px;
}
.send-photos-btn.ready { background: var(--green); color: #000; box-shadow: 0 4px 20px rgba(0,232,122,0.25); }
.send-photos-btn.ready:active { background: #00ff8c; transform: scale(0.98); }
.send-photos-btn.disabled { background: #1e2c3e; color: #5a7088; cursor: not-allowed; }
.send-photos-btn.sending { background: var(--accent); color: #fff; }
.send-result { text-align: center; padding: 16px; border-radius: var(--radius-sm); font-size: 15px; font-weight: 600; margin-top: 14px; }
.send-result.success { background: var(--green-bg); color: var(--green); border: 1px solid rgba(0,232,122,0.3); }
.send-result.error { background: var(--red-bg); color: var(--red); border: 1px solid rgba(255,71,87,0.3); }

/* ── Workflow step indicator ── */
.workflow-steps { display: flex; align-items: center; justify-content: center; gap: 0; margin-bottom: 24px; padding: 0 8px; }
.wf-step { display: flex; align-items: center; gap: 0; }
.wf-dot {
  width: 42px; height: 42px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 800; border: 3px solid var(--card-border);
  background: var(--card); color: var(--dim); transition: all 0.2s; flex-shrink: 0;
}
.wf-dot.active { border-color: var(--accent); background: var(--accent); color: #fff; box-shadow: 0 0 16px rgba(77,166,255,0.4); }
.wf-dot.done { border-color: var(--green); background: var(--green); color: #000; }
.wf-line { width: 36px; height: 3px; background: var(--card-border); flex-shrink: 0; }
.wf-line.done { background: var(--green); }
.wf-label { font-size: 10px; font-weight: 700; color: var(--dim); text-align: center; margin-top: 6px; letter-spacing: 0.5px; text-transform: uppercase; }
.wf-label.active { color: var(--accent); }
.wf-label.done { color: var(--green); }
.wf-step-col { display: flex; flex-direction: column; align-items: center; }
.wf-line-wrap { display: flex; align-items: center; padding-bottom: 22px; }

/* ── Workflow cards ── */
.wf-hero { text-align: center; padding: 24px 18px; margin-bottom: 20px; }
.wf-hero-icon { font-size: 48px; margin-bottom: 12px; }
.wf-hero-title { font-size: 22px; font-weight: 800; color: #fff; margin-bottom: 6px; }
.wf-hero-sub { font-size: 15px; color: var(--text-secondary); line-height: 1.6; }
.wf-next-btn {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 18px; border-radius: var(--radius);
  border: none; font-size: 17px; font-weight: 800; cursor: pointer;
  font-family: inherit; transition: all 0.15s; margin-top: 20px;
  min-height: 60px; letter-spacing: 0.3px;
}
.wf-next-btn.primary { background: var(--accent); color: #fff; box-shadow: 0 4px 20px rgba(77,166,255,0.25); }
.wf-next-btn.primary:active { background: var(--accent-hover); transform: scale(0.98); }
.wf-next-btn.success { background: var(--green); color: #000; box-shadow: 0 4px 20px rgba(0,232,122,0.25); }
.wf-next-btn.success:active { background: #00ff8c; transform: scale(0.98); }
.wf-next-btn:disabled { background: #1e2c3e; color: #5a7088; cursor: not-allowed; transform: none; box-shadow: none; }
.wf-skip {
  display: block; text-align: center; font-size: 14px; color: var(--muted);
  margin-top: 16px; cursor: pointer; background: none; border: none;
  font-family: inherit; text-decoration: underline; padding: 12px;
  min-height: 44px; font-weight: 500;
}
.wf-skip:active { color: var(--text-secondary); }

/* ── Requirements briefing ── */
.req-briefing { margin-bottom: 24px; }
.req-section {
  background: var(--card); border: 1px solid var(--card-border);
  border-radius: var(--radius); padding: 20px; margin-bottom: 14px;
}
.req-section-title {
  display: flex; align-items: center; gap: 10px;
  font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 12px;
}
.req-section-title .req-icon {
  width: 36px; height: 36px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0;
}
.req-rule-list { list-style: none; padding: 0; }
.req-rule-list li {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 0; font-size: 15px; color: var(--text-secondary);
  line-height: 1.5; border-bottom: 1px solid rgba(36,48,68,0.5);
}
.req-rule-list li:last-child { border-bottom: none; padding-bottom: 0; }
.req-rule-list li .bullet {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 7px;
}
.req-rule-list li.critical { color: var(--amber); font-weight: 600; }
.req-rule-list li.critical .bullet { background: var(--amber); box-shadow: 0 0 8px rgba(255,204,0,0.4); }
.req-rule-list li .bullet { background: var(--muted); }
.req-timeline-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 0; border-bottom: 1px solid rgba(36,48,68,0.5);
  font-size: 14px;
}
.req-timeline-row:last-child { border-bottom: none; }
.req-timeline-row .tl-label { color: var(--muted); font-weight: 500; }
.req-timeline-row .tl-value { font-weight: 700; color: var(--text); }
.req-timeline-row .tl-value.highlight { color: var(--green); font-size: 15px; }
.req-cooler-chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px; border-radius: var(--radius-sm);
  background: var(--bg-elevated); border: 1px solid var(--card-border);
  font-size: 13px; font-weight: 600; color: var(--text-secondary); margin: 4px;
}
.req-start-btn {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 20px; border-radius: var(--radius);
  border: none; font-size: 18px; font-weight: 800; cursor: pointer;
  font-family: inherit; background: var(--green); color: #000;
  box-shadow: 0 4px 24px rgba(0,232,122,0.3); min-height: 64px;
  transition: all 0.15s; letter-spacing: 0.3px;
}
.req-start-btn:active { background: #00ff8c; transform: scale(0.97); }

/* ── Fuel Briefing ── */
.briefing-card {
  background: linear-gradient(135deg, #1a2a40 0%, #1e3350 100%);
  border: 1px solid var(--accent);
  border-radius: var(--radius); padding: 20px; margin-bottom: 16px;
  cursor: pointer; transition: all 0.15s; position: relative; overflow: hidden;
}
.briefing-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--green));
}
.briefing-card:active { transform: scale(0.98); border-color: var(--accent-hover); }
.briefing-card-inner { display: flex; align-items: center; gap: 14px; }
.briefing-card-icon {
  width: 48px; height: 48px; border-radius: 12px; background: var(--accent-bg);
  display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0;
}
.briefing-card-text { flex: 1; }
.briefing-card-title { font-size: 15px; font-weight: 700; color: var(--text); }
.briefing-card-sub { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
.briefing-card-action { font-size: 13px; color: var(--accent); font-weight: 700; white-space: nowrap; }
.briefing-card .new-tag {
  display: inline-block; font-size: 10px; font-weight: 800; text-transform: uppercase;
  letter-spacing: 1px; background: var(--accent); color: #000; padding: 2px 6px;
  border-radius: 4px; margin-left: 8px; vertical-align: middle;
}

.nav-briefing-btn {
  display: flex; align-items: center; gap: 6px;
  background: var(--accent-bg); border: 1px solid rgba(77,166,255,0.3); border-radius: var(--radius-sm);
  color: var(--accent); font-size: 13px; font-weight: 600; cursor: pointer;
  padding: 8px 12px; font-family: inherit; min-height: 40px; transition: all 0.15s;
  white-space: nowrap; flex-shrink: 0; margin-left: auto;
}
.nav-briefing-btn:active { background: rgba(77,166,255,0.2); transform: scale(0.97); }
.nav-briefing-btn .btn-icon { font-size: 15px; }

.briefing-float-banner {
  display: flex; align-items: center; gap: 10px;
  background: var(--card); border: 1px solid var(--card-border);
  border-radius: var(--radius-sm); padding: 10px 14px; margin-bottom: 14px;
  cursor: pointer; transition: all 0.15s;
}
.briefing-float-banner:active { border-color: var(--accent); background: var(--card-hover); }
.briefing-float-banner .bf-icon {
  width: 32px; height: 32px; border-radius: 8px; background: var(--accent-bg);
  display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0;
}
.briefing-float-banner .bf-label { flex: 1; font-size: 13px; font-weight: 600; color: var(--text-secondary); }
.briefing-float-banner .bf-action { font-size: 12px; color: var(--accent); font-weight: 700; }

/* ── PDF Viewer overlay ── */
.pdf-viewer-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; }
.pdf-viewer-toolbar {
  display: flex; align-items: center;
  padding: 10px 12px; background: var(--card); border-bottom: 1px solid var(--card-border);
  flex-shrink: 0; gap: 8px; min-height: 52px;
}
.pdf-viewer-toolbar .pdf-title {
  font-size: 13px; font-weight: 700; color: var(--text); white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0;
}
.pdf-viewer-toolbar .pdf-close-btn {
  background: none; border: none; color: var(--muted); font-size: 26px;
  cursor: pointer; padding: 4px 8px; line-height: 1; flex-shrink: 0; min-width: 44px; min-height: 44px;
  display: flex; align-items: center; justify-content: center;
}
.pdf-viewer-toolbar .pdf-close-btn:active { color: #fff; }
.pdf-toolbar-actions { display: flex; gap: 6px; flex-shrink: 0; }
.pdf-action-btn {
  width: 40px; height: 40px; border-radius: 8px; border: 1px solid var(--card-border);
  background: var(--card); color: var(--text-secondary); font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-family: inherit; flex-shrink: 0;
}
.pdf-action-btn:active { border-color: var(--accent); background: var(--card-hover); }
.pdf-action-btn.active { border-color: var(--accent); background: var(--accent-bg); color: var(--accent); }
.pdf-controls-row {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  padding: 8px 12px; background: var(--bg-elevated);
  border-bottom: 1px solid var(--card-border); flex-shrink: 0;
}
.pdf-page-controls { display: flex; align-items: center; gap: 10px; }
.pdf-page-btn {
  width: 40px; height: 40px; border-radius: var(--radius-sm);
  border: 1px solid var(--card-border); background: var(--card);
  color: var(--text-secondary); font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-family: inherit;
}
.pdf-page-btn:active { border-color: var(--accent); }
.pdf-page-btn:disabled { opacity: 0.3; cursor: default; }
.pdf-page-info {
  font-size: 14px; font-weight: 700; color: var(--text-secondary);
  font-family: 'JetBrains Mono', monospace; min-width: 60px; text-align: center;
}
.pdf-zoom-controls { display: flex; gap: 6px; margin-left: auto; }
.pdf-zoom-btn {
  padding: 6px 12px; border-radius: 8px; border: 1px solid var(--card-border);
  background: var(--card); color: var(--text-secondary); font-size: 15px;
  font-weight: 700; cursor: pointer; font-family: inherit; min-width: 40px; min-height: 40px;
  display: flex; align-items: center; justify-content: center;
}
.pdf-zoom-btn:active { border-color: var(--accent); }
.pdf-zoom-pct {
  font-size: 12px; font-weight: 600; color: var(--dim); min-width: 40px; text-align: center;
  font-family: 'JetBrains Mono', monospace; display: flex; align-items: center; justify-content: center;
}

/* ── PDF Search bar ── */
.pdf-search-bar {
  display: none; align-items: center; gap: 8px;

const POGS = {

  rb8:   { file:"D701_L00000_D58_C142_V707_D002_MX - HABCO- RED BULL COOLER 8 FT ASSORTMENT.pdf", label:"HABCO Red Bull Cooler — 8 FT (Backup)", icon:"rb", sub:"V707_D002 — 8 FT" },

  { key:"GDM 9 - CSD",                 label:"GDM 9 — CSD",                    icon:"🥤", iconClass:"csd",     color:"#4da6ff" },
  { key:"GDM 9 - All Beverage",        label:"GDM 9 — All Beverage",           icon:"🧃", iconClass:"bev",     color:"#00e87a" },
  { key:"HABCO Monster Cooler 12 FT",  label:"HABCO Monster — 12 FT",          icon:"⚡", iconClass:"monster", color:"#ff8c42" },
  { key:"HABCO Red Bull Cooler 12 FT", label:"HABCO Red Bull — 12 FT",         icon:"🐂", iconClass:"rb",      color:"#ff4757" },
  { key:"HABCO Monster Cooler 8 FT",   label:"HABCO Monster — 8 FT (Backup)",  icon:"⚡", iconClass:"monster", color:"#ff8c42", backup:true },

];

  return `fuel_briefing/FM${padded}_Fuel_Cooler_Reset_Briefing.pdf`;

  const padded = storeId.padStart(3, '0');
  openPdfViewer(url, `FM ${padded} — Fuel Briefing`);
}

const PHOTO_COOLERS = [
  { id:'gdm-csd',  label:'GDM 9 — CSD',              icon:'🥤', color:'#4da6ff', fileName:'GDM9-CSD' },
  { id:'gdm-bev',  label:'GDM 9 — All Beverage',     icon:'🧃', color:'#00e87a', fileName:'GDM9-AllBev' },
  { id:'monster',   label:'HABCO Monster Cooler',      icon:'⚡', color:'#ff8c42', fileName:'Monster' },
  { id:'redbull',   label:'HABCO Red Bull Cooler',     icon:'🐂', color:'#ff4757', fileName:'RedBull' },
];

// ── State ─────────────────────────────────────────────────────────────────────
let selectedStore  = null;
let activeTab      = 'info';
let PRODUCTS       = null;
let PLANOGRAMS     = null;
let selectedCooler = null;
let currentBayIdx  = 0;
let showUpcList    = false;
let photoState     = {};
let sendingPhotos  = false;
let sendResult     = null;
let workflowStep   = {};
let UPC_INDEX      = null;
let PLAN_DELETES   = null;
let ACTIVE_UPC_SET = null;
let scanStream     = null;
let scanAnimationId = null;

// ── User identity (persisted in localStorage) ──
let currentUser = JSON.parse(localStorage.getItem('d6fuel_user') || 'null');

function saveUser(name, email) {
  currentUser = { name: name.trim(), email: email.trim() };
  localStorage.setItem('d6fuel_user', JSON.stringify(currentUser));
}

function clearUser() {
  currentUser = null;
  localStorage.removeItem('d6fuel_user');
  renderLoginOverlay();
}

function getUserInitials(name) {
  return name.split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0, 2);
}

function renderLoginOverlay() {
  let overlay = document.getElementById('login-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'login-overlay';
    overlay.className = 'login-overlay';
    document.body.appendChild(overlay);
  }
  overlay.style.display = 'flex';
  overlay.innerHTML = `
    <div class="login-card">
      <div class="badge" style="margin-bottom:10px">District 6 — Active Project</div>
      <h1>Welcome</h1>
      <p class="login-sub">Enter your name and email to get started. You'll be CC'd on all photo submissions.</p>
      <label for="login-name">Full Name</label>
      <input type="text" id="login-name" placeholder="Jane Smith" autocomplete="name" />
      <label for="login-email">Email Address</label>
      <input type="email" id="login-email" placeholder="jane.smith@retailodyssey.com" autocomplete="email" />
      <button class="login-submit" id="login-btn" disabled onclick="handleLogin()">Continue</button>
    </div>
  `;
  const nameInput = document.getElementById('login-name');
  const emailInput = document.getElementById('login-email');
  const btn = document.getElementById('login-btn');

  function validate() {
    const nameOk = nameInput.value.trim().length >= 2;
    const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailInput.value.trim());
    btn.disabled = !(nameOk && emailOk);
  }
  nameInput.addEventListener('input', validate);
  emailInput.addEventListener('input', validate);
  emailInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !btn.disabled) handleLogin(); });
  nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') emailInput.focus(); });
  setTimeout(() => nameInput.focus(), 100);
}

function handleLogin() {
  const name = document.getElementById('login-name').value;
  const email = document.getElementById('login-email').value;
  saveUser(name, email);
  const overlay = document.getElementById('login-overlay');
  if (overlay) overlay.style.display = 'none';
  render();
}

// Load data on start

  .then(r => r.json())
  .then(data => { PRODUCTS = data; })
  .catch(() => { PRODUCTS = {}; });

fetch('planograms.json')
  .then(r => r.json())
  .then(data => { PLANOGRAMS = data; buildUpcIndex(); buildActiveUpcSet(); })
  .catch(() => { PLANOGRAMS = {}; UPC_INDEX = {}; ACTIVE_UPC_SET = new Set(); });

fetch('planogram-deletes.json')
  .then(r => r.json())
  .then(data => { PLAN_DELETES = data; })
  .catch(() => { PLAN_DELETES = null; });

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  if (scanAnimationId != null) {
    cancelAnimationFrame(scanAnimationId);
    scanAnimationId = null;
  }
  if (scanStream) {
    scanStream.getTracks().forEach(t => t.stop());
    scanStream = null;
  }

  const app = document.getElementById('app');
  if (selectedStore) {
    const s = STORES.find(x => x.id === selectedStore);
    app.innerHTML = renderStore(s);
  } else {
    app.innerHTML = renderDashboard();
    activeTab = 'info';
    selectedCooler = null;
    currentBayIdx = 0;
  }
}

function switchTab(tab) {
  if (activeTab === 'scan' && tab !== 'scan') stopBarcodeScan();
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.dataset.panel === tab));
}

function toggleAccordion(el) {
  el.classList.toggle('open');

}

}

function getWfStep(storeId) { return workflowStep[storeId] || 'requirements'; }

function advanceWorkflow(storeId, to) {
  workflowStep[storeId] = to;
  activeTab = 'workflow';

  currentBayIdx = 0;

  const inWorkflow = step !== 'done';

  const navHtml = `

        <button class="nav-briefing-btn" onclick="openStoreBriefing('${s.id}')"><span class="btn-icon">📄</span> Briefing</button>

  return `

    <div class="store-header fade-in-up">
      <h2>FM ${s.id}</h2>
      <div class="addr">${s.city}, ${s.state} ${s.zip} — ${s.address}</div>
      <div class="detail">${s.energySet} energy set — Kompass: ${kompassDisplay(s)}${s.swap ? ' — ONSITE SWAP' : ''}</div>

function renderWorkflowSteps(s) {
  const step = getWfStep(s.id);

  if (step === 'requirements') {
    return renderRequirementsBriefing(s);
  }

  const steps = [
    { id:'before', num:1, label:'Before' },
    { id:'reset',  num:2, label:'Reset' },
    { id:'after',  num:3, label:'After' },
  ];
  const stepOrder = ['before','reset','after'];
  const currentIdx = stepOrder.indexOf(step);

  const indicator = `
    <div class="workflow-steps fade-in-up">
      ${steps.map((st, i) => {
        const isDone = i < currentIdx;
        const isActive = i === currentIdx;
        const dotClass = isDone ? 'done' : isActive ? 'active' : '';
        const labelClass = isDone ? 'done' : isActive ? 'active' : '';
        const line = i < steps.length - 1
          ? `<div class="wf-line-wrap"><div class="wf-line ${i < currentIdx ? 'done' : ''}"></div></div>` : '';
        return `
          <div class="wf-step-col">
            <div class="wf-dot ${dotClass}">${isDone ? '✓' : st.num}</div>
            <div class="wf-label ${labelClass}">${st.label}</div>
          </div>${line}`;
      }).join('')}
    </div>`;

  let content = '';
  if (step === 'before') content = renderWorkflowPhotos(s, 'before');
  else if (step === 'reset') content = renderWorkflowReset(s);
  else if (step === 'after') content = renderWorkflowPhotos(s, 'after');

  const briefingBanner = `
    <div class="briefing-float-banner" onclick="openStoreBriefing('${s.id}')">
      <div class="bf-icon">📄</div>
      <div class="bf-label">FM ${s.id} Fuel Briefing</div>
      <div class="bf-action">View →</div>
    </div>`;

  return `
    ${indicator}
    ${briefingBanner}
    ${content}
    <button class="wf-skip" onclick="skipToFullView('${s.id}')">Skip to full store view</button>
    <div class="footer">Generated by TacTag for Retail Odyssey / Advantage Solutions — District 6</div>
  `;
}

// ── Workflow photos (before/after) ────────────────────────────────────────────
function renderWorkflowPhotos(s, phase) {
  const photos = getStorePhotos(s.id, phase);
  const capturedCount = PHOTO_COOLERS.filter(c => {
    const arr = getCoolerPhotos(s.id, c.id, phase);
    return arr.length > 0;
  }).length;
  const totalPhotos = PHOTO_COOLERS.reduce((sum, c) => sum + getCoolerPhotos(s.id, c.id, phase).length, 0);
  const total = PHOTO_COOLERS.length;
  const allCaptured = capturedCount === total;
  const pct = Math.round(capturedCount / total * 100);
  const isBefore = phase === 'before';
  const phaseLabel = isBefore ? 'Before' : 'After';

  const heroIcon = isBefore ? '📸' : '📷';
  const heroTitle = isBefore ? 'Take Before Photos' : 'Take After Photos';
  const heroSub = isBefore
    ? 'Photograph each cooler before starting the reset. Take as many photos as needed per cooler.'
    : 'Photograph each cooler after the reset is complete. Take as many photos as needed per cooler.';
  const nextStep = isBefore ? 'reset' : 'done';
  const nextLabel = isBefore ? `Send ${totalPhotos} Photo${totalPhotos !== 1 ? 's' : ''} & Continue →` : `Send ${totalPhotos} Photo${totalPhotos !== 1 ? 's' : ''} & Finish →`;

  return `
    <div class="wf-hero fade-in-up">
      <div class="wf-hero-icon">${heroIcon}</div>
      <div class="wf-hero-title">${heroTitle}</div>
      <div class="wf-hero-sub">${heroSub}</div>
    </div>

    <div class="photo-progress fade-in-up">
      <div class="photo-progress-bar"><div class="photo-progress-fill" style="width:${pct}%"></div></div>
      <div class="photo-progress-text">${capturedCount} / ${total} coolers · ${totalPhotos} photo${totalPhotos !== 1 ? 's' : ''}</div>
    </div>

    <div class="photo-grid fade-in-up">
      ${PHOTO_COOLERS.map(c => {
        const coolerPhotos = getCoolerPhotos(s.id, c.id, phase);
        const hasPhotos = coolerPhotos.length > 0;
        return `
          <div class="photo-card ${hasPhotos ? 'captured' : ''}">
            <div class="photo-card-header">
              <div class="photo-card-icon" style="background:${c.color}20">${c.icon}</div>
              <div class="photo-card-info">
                <div class="pc-name">${c.label}${hasPhotos ? `<span class="photo-count-badge">${coolerPhotos.length}</span>` : ''}</div>
                <div class="pc-status ${hasPhotos ? 'done' : ''}">${hasPhotos ? `✓ ${coolerPhotos.length} photo${coolerPhotos.length !== 1 ? 's' : ''} captured` : 'Waiting for photo'}</div>
              </div>
            </div>
            ${hasPhotos ? `
              <div class="photo-gallery">
                ${coolerPhotos.map((dataUrl, idx) => `
                  <div class="photo-thumb">
                    <img src="${dataUrl}" alt="${c.label} #${idx + 1}">
                    <button class="remove-btn" onclick="removePhoto('${s.id}','${c.id}','${phase}',${idx})">✕</button>
                    <span class="photo-idx">${idx + 1}</span>
                  </div>
                `).join('')}
              </div>
            ` : ''}
            <div class="capture-options">
              <button class="capture-btn camera-btn" onclick="triggerCapture('${s.id}','${c.id}','${phase}','camera')">📷 ${hasPhotos ? 'Add Photo' : 'Take Photo'}</button>
              <button class="capture-btn gallery-btn" onclick="triggerCapture('${s.id}','${c.id}','${phase}','gallery')">🖼️ From Gallery</button>
            </div>
            <input type="file" accept="image/*" capture="environment" id="photo-input-camera-${phase}-${c.id}" style="display:none" onchange="handleCapture(this,'${s.id}','${c.id}','${phase}')">
            <input type="file" accept="image/*" id="photo-input-gallery-${phase}-${c.id}" style="display:none" onchange="handleCapture(this,'${s.id}','${c.id}','${phase}')">
          </div>`;
      }).join('')}
    </div>

    ${isBefore ? `
      <button class="wf-next-btn ${allCaptured ? 'primary' : ''}" onclick="${allCaptured ? `sendAndAdvance('${s.id}','before','reset')` : ''}" ${!allCaptured || sendingPhotos ? 'disabled' : ''}>
        ${sendingPhotos ? '⏳ Sending before photos...' : allCaptured ? nextLabel : `📷 ${total - capturedCount} cooler${total - capturedCount === 1 ? '' : 's'} remaining`}
      </button>
    ` : `
      <button class="wf-next-btn ${allCaptured ? 'success' : ''}" onclick="${allCaptured ? `sendAndAdvance('${s.id}','after','done')` : ''}" ${!allCaptured || sendingPhotos ? 'disabled' : ''}>
        ${sendingPhotos ? '⏳ Sending after photos...' : allCaptured ? nextLabel : `📷 ${total - capturedCount} cooler${total - capturedCount === 1 ? '' : 's'} remaining`}
      </button>
    `}

    ${sendResult ? `<div class="send-result ${sendResult.ok ? 'success' : 'error'}">${sendResult.message}</div>` : ''}
  `;
}

function renderPlanogramViewer(s) {
  const pog = PLANOGRAMS[selectedCooler];
  if (!pog || !pog.bays.length) {

  }

  let bayNav = '';

    bayNav = `

  return `

      <button class="pog-viewer-back" onclick="closeCooler()">← All Coolers</button>

        <button class="upc-toggle-btn ${showUpcList?'active':''}" onclick="toggleUpcList()">🏷️ UPC List</button>
      </div>
      ${bayNav}
      ${showUpcList ? renderUpcList(bay) : `<div class="cooler-frame">${renderBayShelves(bay, sec)}</div>`}
    </div>`;
}

function renderBayShelves(bay, sec) {
  if (!bay || !bay.shelves || !bay.shelves.length) return '';

  const bayWidthInches = bay.width_inches || 22;
  const shelves = [...bay.shelves].sort((a, b) => a.shelf - b.shelf);

  const availableHeight = window.innerHeight - 280;
  const totalProductHeight = shelves.reduce((sum, sh) => {
    const maxH = sh.products.length ? Math.max(...sh.products.map(p => p.height_inches || 6)) : 6;
    return sum + maxH;
  }, 0);
  const pixelsPerInch = Math.min(14, Math.max(5, availableHeight / totalProductHeight));

  const reversed = [...shelves].reverse();
  return reversed.map(shelf => {
    const maxH = shelf.products.length ? Math.max(...shelf.products.map(p => p.height_inches || 6)) : 6;
    const rowHeight = Math.max(40, maxH * pixelsPerInch);

    const productsHtml = renderShelfProducts(shelf, bayWidthInches, rowHeight, sec);
    return `
      <div class="shelf-row" style="height:${rowHeight}px">
        <span class="shelf-label-tag">S${shelf.shelf}</span>
        <div class="shelf-products">${productsHtml}</div>
      </div>`;
  }).join('');
}

function renderShelfProducts(shelf, bayWidthInches, rowHeight, sec) {
  if (!shelf.products || !shelf.products.length) return '';

  const totalRawWidth = shelf.products.reduce((sum, p) =>
    sum + (p.width_inches || 2.5) * (p.facings || 1), 0);
  const scale = totalRawWidth > 0 ? bayWidthInches / totalRawWidth : 1;

  return shelf.products.map(p => {
    const facings = p.facings || 1;
    const rawW = (p.width_inches || 2.5) * facings;
    const pct = (rawW * scale / bayWidthInches * 100).toFixed(2);
    const imgSrc = p.image || `images/${p.upc}.png`;
    const name = p.full_name || p.description || '';
    const displayName = p.description || '';

    const imgTag = `<img class="slot-thumb" src="${imgSrc}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`;
    const fallback = `<div class="slot-fallback" style="display:none">${displayName.substring(0, 20)}</div>`;
    const upcLabel = `<span class="slot-upc">${p.upc}</span>`;
    const newBadge = p.is_new ? '<span class="new-badge">NEW</span>' : '';
    const chgBadge = p.is_changed ? '<span class="changed-badge">CHG</span>' : '';

    const dataAttrs = `data-upc="${p.upc}" data-name="${name.replace(/"/g, '&quot;')}" data-desc="${displayName.replace(/"/g, '&quot;')}" data-size="${p.size || ''}" data-pos="${p.position}" data-fac="${facings}" data-h="${p.height_inches}" data-w="${p.width_inches}" data-img="${imgSrc}" data-shelf="${shelf.shelf}" data-bay="${selectedCooler}" data-new="${p.is_new?1:0}" data-chg="${p.is_changed?1:0}"`;

    if (facings > 1) {
      const slotPct = (100 / facings).toFixed(2);
      const groupUpc = `<span class="group-upc">${p.upc}</span>`;
      let slots = '';
      for (let f = 0; f < facings; f++) {
        slots += `<div class="product-slot" style="width:${slotPct}%;height:100%" onclick="showProductDetail(this.parentElement)" ${f === 0 ? dataAttrs : ''}>${imgTag}${fallback}${f === 0 ? newBadge + chgBadge : ''}</div>`;
      }
      return `<div class="multi-facing-group" style="width:${pct}%;height:100%;flex-shrink:0" ${dataAttrs}>
        ${groupUpc}
        <span class="facing-badge">\u00d7${facings}</span>
        ${slots}
      </div>`;
    }

    return `<div class="product-slot" style="width:${pct}%;height:100%;flex-shrink:0" onclick="showProductDetail(this)" ${dataAttrs}>${imgTag}${fallback}${upcLabel}${newBadge}${chgBadge}</div>`;
  }).join('');
}

// ── UPC location index & product scan ─────────────────────────────────────────
function buildActiveUpcSet() {
  ACTIVE_UPC_SET = new Set();
  if (!PLANOGRAMS) return ACTIVE_UPC_SET;
  Object.keys(PLANOGRAMS).forEach(coolerKey => {
    const pog = PLANOGRAMS[coolerKey];
    if (!pog || !pog.bays) return;
    pog.bays.forEach(bay => {
      (bay.shelves || []).forEach(sh => {
        (sh.products || []).forEach(p => {
          const k = normalizeUpcKey(p.upc);
          if (k) ACTIVE_UPC_SET.add(k);
        });
      });
    });
  });
  return ACTIVE_UPC_SET;
}

function buildUpcIndex() {
  UPC_INDEX = {};
  if (!PLANOGRAMS) return;
  Object.keys(PLANOGRAMS).forEach(coolerKey => {
    const pog = PLANOGRAMS[coolerKey];
    if (!pog || !pog.bays) return;
    const sec = COOLER_SECTIONS.find(c => c.key === coolerKey);
    const label = sec ? sec.label : coolerKey;
    pog.bays.forEach(bay => {
      (bay.shelves || []).forEach(sh => {
        (sh.products || []).forEach(p => {
          const k = normalizeUpcKey(p.upc);
          if (!k) return;
          const entry = {
            coolerKey,
            coolerLabel: label,
            bayNum: bay.bay,
            shelf: sh.shelf,
            position: p.position,
            name: (p.full_name || p.description || '')
          };
          if (!UPC_INDEX[k]) UPC_INDEX[k] = [];
          UPC_INDEX[k].push(entry);
        });
      });
    });
  });
}

function upcCheckDigit11(eleven) {
  let sum = 0;
  for (let i = 0; i < 11; i++) {
    const n = parseInt(eleven[i], 10);
    if (Number.isNaN(n)) return null;
    sum += (i % 2 === 0) ? n * 3 : n;
  }
  return (10 - (sum % 10)) % 10;
}

function expandUpcEto12(upc8) {
  const d = String(upc8 || '').replace(/\D/g, '');
  if (d.length !== 8 || d[0] !== '0') return null;
  const ns = d[0];
  const d1 = d[1], d2 = d[2], d3 = d[3], d4 = d[4], d5 = d[5], d6 = d[6];
  let eleven;
  if (d6 <= '2') {
    eleven = ns + d1 + d2 + d6 + '0000' + d3 + d4 + d5;
  } else if (d6 === '3') {
    eleven = ns + d1 + d2 + d3 + '00000' + d4 + d5;
  } else if (d6 === '4') {
    eleven = ns + d1 + d2 + d3 + d4 + '00000' + d5;
  } else {
    eleven = ns + d1 + d2 + d3 + d4 + d5 + '0000' + d6;
  }
  if (eleven.length !== 11) return null;
  const chk = upcCheckDigit11(eleven);
  if (chk === null) return null;
  return eleven + String(chk);
}

function normalizeUpcKey(str) {
  let d = String(str || '').replace(/\D/g, '');
  if (!d) return '';
  if (d.length === 8 && d[0] === '0') {
    const expanded = expandUpcEto12(d);
    if (!expanded) return '';
    d = expanded;
  }
  if (d.length === 13 && d[0] === '0') d = d.slice(1);
  while (d.length < 12) d = '0' + d;
  if (d.length > 12) d = d.slice(-12);
  return d;
}

function findLocationsForUpc(raw) {
  if (!UPC_INDEX) buildUpcIndex();
  const k = normalizeUpcKey(raw);
  if (!k) return null;
  const list = UPC_INDEX[k];
  if (list && list.length) return { key: k, list: list.slice() };
  return null;
}

function scanEscapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/"/g, '&quot;');
}

function showUpcLookupResult(raw, container) {
  if (!container) return;
  const rawDigits = String(raw).replace(/\D/g, '');
  const displayUpc = normalizeUpcKey(raw) || rawDigits;
  const found = findLocationsForUpc(raw);
  const upcENote = (rawDigits.length === 8 && rawDigits[0] === '0' && expandUpcEto12(rawDigits) === displayUpc)
    ? ' <span style="color:var(--dim);font-size:12px;font-weight:500">(UPC-E ' + scanEscapeHtml(rawDigits) + ')</span>'
    : '';

  if (found && found.list.length) {
    const rows = found.list.map(loc => {
      const ck = JSON.stringify(loc.coolerKey);
      return '<div class="scan-loc"><div class="loc-title">' + scanEscapeHtml(loc.coolerLabel) + '</div>'
        + '<div class="loc-meta">Bay ' + loc.bayNum + ' · Shelf ' + loc.shelf + ' · Position ' + loc.position + '</div>'
        + '<div class="loc-meta" style="margin-top:6px">' + scanEscapeHtml(loc.name) + '</div>'
        + '<button type="button" class="scan-open-btn" onclick="goToPlanogramLocation(' + ck + ', ' + loc.bayNum + ')">Open planogram</button></div>';
    }).join('');
    const multi = found.list.length > 1 ? ' (multiple placements)' : '';
    container.innerHTML = '<div class="scan-result">UPC <strong>' + scanEscapeHtml(displayUpc) + '</strong>' + upcENote + multi + '</div>' + rows;
    return;
  }

  const k = displayUpc;
  const active = ACTIVE_UPC_SET || buildActiveUpcSet();
  const delList = (PLAN_DELETES && PLAN_DELETES.byUpc && k) ? PLAN_DELETES.byUpc[k] : null;

  if (delList && delList.length) {
    if (active.has(k)) {
      const sources = delList.map(d => scanEscapeHtml(d.fromPlanogram)).join('; ');
      container.innerHTML = '<div class="scan-result">UPC <strong>' + scanEscapeHtml(displayUpc) + '</strong>' + upcENote + '</div>'
        + '<div class="scan-moved-note">PDF lists this item as removed from: ' + sources
        + '. It still appears in the <strong>current digital planogram</strong> (often because it moved to another cooler). Use the planogram view to place it — do <strong>not</strong> treat as a pull based on the delete list alone.</div>';
      return;
    }
    let rows = '';
    for (let i = 0; i < delList.length; i++) {
      const d = delList[i];
      rows += '<div class="sd-row">• ' + scanEscapeHtml(d.fromPlanogram)
        + (d.description ? ' — ' + scanEscapeHtml(d.description) : '')
        + (d.size ? ' (' + scanEscapeHtml(d.size) + ')' : '')
        + '</div>';
    }
    container.innerHTML = '<div class="scan-result">UPC <strong>' + scanEscapeHtml(displayUpc) + '</strong>' + upcENote + '</div>'
      + '<div class="scan-delete-alert"><div class="sd-title">Removed from planogram (DELETE)</div>'
      + '<div class="sd-row">Not on the current digital assortment for any fuel cooler — pull per reset rules.</div>'
      + rows + '</div>';
    return;
  }

  container.innerHTML = '<div class="scan-result">No match for <strong>' + scanEscapeHtml(String(raw)) + '</strong>'
    + (displayUpc && displayUpc !== rawDigits ? ' → ' + scanEscapeHtml(displayUpc) : '')
    + ' in the fuel cooler planograms. Check the UPC or confirm the item is on this project.</div>';
}

function goToPlanogramLocation(coolerKey, bayNum) {
  selectedCooler = coolerKey;
  const pog = PLANOGRAMS[coolerKey];
  if (pog && pog.bays && pog.bays.length) {
    const idx = pog.bays.findIndex(b => b.bay === bayNum);
    currentBayIdx = idx >= 0 ? idx : 0;
  } else {
    currentBayIdx = 0;
  }
  showUpcList = false;
  activeTab = 'planograms';
  render();
  switchTab('planograms');
}

// ── Global scan (accessible from any screen) ─────────────────────────────────
let _gscanStream = null;
let _gscanAnimId = null;

function openGlobalScan() {
  if (document.getElementById('gscan-overlay')) return;
  const overlay = document.createElement('div');
  overlay.className = 'gscan-overlay';
  overlay.id = 'gscan-overlay';
  overlay.innerHTML = `
    <div class="gscan-toolbar">
      <button class="gscan-close" onclick="closeGlobalScan()">&times;</button>
      <div class="gscan-title">Scan Barcode</div>
    </div>
    <div class="gscan-body">
      <div class="gscan-video-wrap" id="gscan-video-wrap"><video id="gscan-video" playsinline muted></video></div>
      <div class="gscan-actions">
        <button type="button" class="scan-btn primary" id="gscan-start-btn" onclick="startGlobalScan()">📷 Start Camera</button>
        <button type="button" class="scan-btn" id="gscan-stop-btn" onclick="stopGlobalScan()" style="display:none">Stop Camera</button>
      </div>
      <div class="gscan-manual">
        <input type="text" id="gscan-input" placeholder="Enter UPC…" inputmode="numeric" autocomplete="off" onkeydown="if(event.key==='Enter')lookupGlobalScan()">
        <button type="button" class="scan-btn primary" onclick="lookupGlobalScan()">Look Up</button>
      </div>
      <div id="gscan-result"></div>
    </div>
  `;
  document.body.appendChild(overlay);
  const input = document.getElementById('gscan-input');
  if (input) setTimeout(() => input.focus(), 100);
}

function closeGlobalScan() {
  stopGlobalScan();
  const el = document.getElementById('gscan-overlay');
  if (el) el.remove();
}

function stopGlobalScan() {
  if (_gscanAnimId != null) { cancelAnimationFrame(_gscanAnimId); _gscanAnimId = null; }
  const video = document.getElementById('gscan-video');
  if (video && video.srcObject) { video.srcObject.getTracks().forEach(t => t.stop()); video.srcObject = null; }
  if (_gscanStream) { _gscanStream.getTracks().forEach(t => t.stop()); }
  _gscanStream = null;
  const wrap = document.getElementById('gscan-video-wrap');
  if (wrap) wrap.classList.remove('active');
  const startBtn = document.getElementById('gscan-start-btn');
  const stopBtn = document.getElementById('gscan-stop-btn');
  if (startBtn) startBtn.style.display = 'inline-block';
  if (stopBtn) stopBtn.style.display = 'none';
}

async function startGlobalScan() {
  const wrap = document.getElementById('gscan-video-wrap');
  const video = document.getElementById('gscan-video');
  const startBtn = document.getElementById('gscan-start-btn');
  const stopBtn = document.getElementById('gscan-stop-btn');
  const result = document.getElementById('gscan-result');
  if (!video || !wrap) return;

  if (typeof BarcodeDetector === 'undefined') {
    if (result) result.innerHTML = '<div class="scan-result">BarcodeDetector not available — use Look Up instead.</div>';
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' } } });
    _gscanStream = stream;
    video.srcObject = stream;
    await video.play();
    wrap.classList.add('active');
    if (startBtn) startBtn.style.display = 'none';
    if (stopBtn) stopBtn.style.display = 'inline-block';

    const detector = new BarcodeDetector({ formats: ['upc_a','upc_e','ean_13','ean_8','code_128','code_39'] });
    function loop() {
      if (!_gscanStream) return;
      detector.detect(video).then(codes => {
        if (!_gscanStream) return;
        if (codes && codes.length) {
          const raw = codes[0].rawValue;
          stopGlobalScan();
          const inp = document.getElementById('gscan-input');
          if (inp) inp.value = raw;
          processGlobalScanResult(raw);
          return;
        }
        _gscanAnimId = requestAnimationFrame(loop);
      }).catch(() => { if (_gscanStream) _gscanAnimId = requestAnimationFrame(loop); });
    }
    _gscanAnimId = requestAnimationFrame(loop);
  } catch (e) {
    if (result) result.innerHTML = '<div class="scan-result">Camera error: ' + scanEscapeHtml(e.message) + '</div>';
  }
}

function lookupGlobalScan() {
  const inp = document.getElementById('gscan-input');
  const raw = inp && inp.value.trim();
  if (!raw) return;
  processGlobalScanResult(raw);
}

function processGlobalScanResult(raw) {
  if (!UPC_INDEX) buildUpcIndex();
  const k = normalizeUpcKey(raw);
  const found = findLocationsForUpc(raw);
  const active = ACTIVE_UPC_SET || buildActiveUpcSet();
  const delList = (PLAN_DELETES && PLAN_DELETES.byUpc && k) ? PLAN_DELETES.byUpc[k] : null;

  if (found && found.list.length) {
    closeGlobalScan();
    const loc = found.list[0];
    showLocationReveal(found.list, k);
    return;
  }

  if (delList && delList.length) {
    if (active.has(k)) {
      const result = document.getElementById('gscan-result');
      if (result) {
        const sources = delList.map(d => scanEscapeHtml(d.fromPlanogram)).join('; ');
        result.innerHTML = '<div class="scan-result">UPC <strong>' + scanEscapeHtml(k) + '</strong></div>'
          + '<div class="scan-moved-note">Removed from: ' + sources
          + '. Still appears in the current planogram (may have moved). Use the planogram view to verify.</div>';
      }
    } else {
      closeGlobalScan();
      showDeleteReveal(k, delList);
    }
    return;
  }

  const result = document.getElementById('gscan-result');
  if (result) {
    result.innerHTML = '<div class="scan-result">No match for <strong>' + scanEscapeHtml(String(raw))
      + '</strong> in fuel cooler planograms.</div>';
  }
}

// ── Animated location reveal ──────────────────────────────────────────────────
function showLocationReveal(locations, upc) {
  const loc = locations[0];
  const sec = COOLER_SECTIONS.find(c => c.key === loc.coolerKey);
  const coolerLabel = sec ? sec.label : loc.coolerKey;
  const pog = PLANOGRAMS[loc.coolerKey];
  const hasBays = pog && pog.bays && pog.bays.length > 1;

  const overlay = document.createElement('div');
  overlay.className = 'loc-reveal-overlay';
  overlay.id = 'loc-reveal';
  overlay.innerHTML = `
    <div class="loc-reveal-line cooler" id="reveal-cooler">${sec ? sec.icon + ' ' : ''}${coolerLabel}</div>
    ${hasBays ? `<div class="loc-reveal-line bay" id="reveal-bay">Bay ${loc.bayNum}</div>` : ''}
    <div class="loc-reveal-line shelf" id="reveal-shelf">Shelf ${loc.shelf}</div>
    <div class="loc-reveal-line position" id="reveal-pos">Position ${loc.position}${loc.name ? ' — ' + loc.name : ''}</div>
  `;
  document.body.appendChild(overlay);

  const steps = ['reveal-cooler'];
  if (hasBays) steps.push('reveal-bay');
  steps.push('reveal-shelf', 'reveal-pos');

  const stepDelay = Math.min(500, 2000 / steps.length);
  steps.forEach((id, i) => {
    setTimeout(() => {
      const el = document.getElementById(id);
      if (el) { el.classList.add('show', 'flash'); }
    }, i * stepDelay);
  });

  setTimeout(() => {
    overlay.remove();
    navigateAndHighlight(locations, upc);
  }, steps.length * stepDelay + 600);
}

function navigateAndHighlight(locations, upc) {
  const loc = locations[0];

  if (!selectedStore) {
    const storeForCooler = STORES[0];
    if (storeForCooler) {
      selectedStore = storeForCooler.id;
      workflowStep[storeForCooler.id] = 'done';
    }
  } else {
    workflowStep[selectedStore] = 'done';
  }

  selectedCooler = loc.coolerKey;
  const pog = PLANOGRAMS[loc.coolerKey];
  if (pog && pog.bays) {
    const idx = pog.bays.findIndex(b => b.bay === loc.bayNum);
    currentBayIdx = idx >= 0 ? idx : 0;
  }
  showUpcList = false;
  activeTab = 'planograms';
  render();
  switchTab('planograms');

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      highlightProductSlots(upc);
    });
  });
}

function highlightProductSlots(upc) {
  const normalizedUpc = normalizeUpcKey(upc);
  const allSlots = document.querySelectorAll('.product-slot, .multi-facing-group');
  allSlots.forEach(el => {
    const slotUpc = normalizeUpcKey(el.dataset.upc);
    if (slotUpc === normalizedUpc) {
      el.classList.add('scan-highlight');
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  });

  setTimeout(() => {
    document.querySelectorAll('.scan-highlight').forEach(el => el.classList.remove('scan-highlight'));
  }, 4000);
}

function stopBarcodeScan() {
  if (scanAnimationId != null) {
    cancelAnimationFrame(scanAnimationId);
    scanAnimationId = null;
  }
  const video = document.getElementById('scan-video');
  if (video && video.srcObject) {
    video.srcObject.getTracks().forEach(t => t.stop());
    video.srcObject = null;
  } else if (scanStream) {
    scanStream.getTracks().forEach(t => t.stop());
  }
  scanStream = null;
  const wrap = document.getElementById('scan-video-wrap');
  if (wrap) wrap.classList.remove('active');
  const startBtn = document.getElementById('scan-start-btn');
  const stopBtn = document.getElementById('scan-stop-btn');
  if (startBtn) startBtn.style.display = 'inline-block';
  if (stopBtn) stopBtn.style.display = 'none';
}

async function startBarcodeScan() {
  const resultEl = document.getElementById('scan-result-area');
  const wrap = document.getElementById('scan-video-wrap');
  const video = document.getElementById('scan-video');
  const startBtn = document.getElementById('scan-start-btn');
  const stopBtn = document.getElementById('scan-stop-btn');
  if (!video || !wrap) return;

  if (typeof BarcodeDetector === 'undefined') {
    if (resultEl) {
      resultEl.innerHTML = '<div class="scan-result">Live barcode scanning needs Chrome or Edge (BarcodeDetector API). Use <strong>Look Up</strong> with the UPC typed in — that works in every browser.</div>';
    }
    return;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' } } });
    scanStream = stream;
    video.srcObject = stream;
    await video.play();
    wrap.classList.add('active');
    if (startBtn) startBtn.style.display = 'none';
    if (stopBtn) stopBtn.style.display = 'inline-block';

    const detector = new BarcodeDetector({ formats: ['upc_a', 'upc_e', 'ean_13', 'ean_8', 'code_128', 'code_39'] });

    function loop() {
      if (!scanStream) return;
      detector.detect(video).then(codes => {
        if (!scanStream) return;
        if (codes && codes.length) {
          const raw = codes[0].rawValue;
          stopBarcodeScan();
          const inp = document.getElementById('scan-manual-input');
          if (inp) inp.value = raw;
          showUpcLookupResult(raw, document.getElementById('scan-result-area'));
          return;
        }
        scanAnimationId = requestAnimationFrame(loop);
      }).catch(() => {
        if (scanStream) scanAnimationId = requestAnimationFrame(loop);
      });
    }
    scanAnimationId = requestAnimationFrame(loop);
  } catch (e) {
    if (resultEl) {
      resultEl.innerHTML = '<div class="scan-result">Could not open camera: ' + scanEscapeHtml(e.message || 'permission denied') + '</div>';
    }
  }
}
