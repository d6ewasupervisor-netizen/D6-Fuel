<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D6 Fuel Cooler Reset Guide</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root {
  --bg: #0f1419;
  --card: #1a2332;
  --card-border: #2a3a4a;
  --text: #e1e8ed;
  --muted: #8899aa;
  --dim: #556677;
  --accent: #3a8fd4;
  --green: #00d084;
  --amber: #ffc107;
  --red: #e74c3c;
  --orange: #e67e22;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.container { max-width: 600px; margin: 0 auto; padding: 20px 16px; }

/* ── Header ── */
.header { background: linear-gradient(135deg, #1a2332 0%, #243447 100%); border-radius: 16px; padding: 24px 20px; margin-bottom: 20px; border: 1px solid var(--card-border); }
.header .badge { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; color: var(--green); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; }
.header .badge::before { content: ''; width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px #00d08466; }
.header h1 { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 4px; }
.header p { font-size: 13px; color: var(--muted); }
.header .code { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--dim); margin-top: 4px; }

/* ── Rules box ── */
.rules-box { background: var(--card); border-radius: 12px; padding: 14px 16px; margin-bottom: 20px; border: 1px solid var(--card-border); }
.rules-box .label { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600; color: var(--amber); margin-bottom: 6px; }
.rules-box .items { font-size: 11px; color: #99aabb; line-height: 1.7; }

/* ── Store grid ── */
.store-grid { display: grid; gap: 10px; margin-bottom: 20px; }
.store-btn { display: block; width: 100%; text-align: left; background: var(--card); border: 1px solid var(--card-border); border-radius: 12px; padding: 16px; cursor: pointer; transition: all 0.15s ease; font-family: inherit; color: var(--text); }
.store-btn:hover { border-color: #3a5a7a; transform: translateY(-1px); }
.store-btn .fm { font-size: 17px; font-weight: 700; color: #fff; font-family: 'JetBrains Mono', monospace; }
.store-btn .city { font-size: 13px; color: var(--muted); margin-top: 2px; }
.store-btn .date { font-size: 11px; color: #778899; margin-top: 2px; }
.store-btn .meta { font-size: 11px; color: var(--dim); margin-top: 2px; }
.store-btn .swap-badge { font-size: 10px; font-weight: 600; color: var(--orange); background: #e67e2220; padding: 2px 8px; border-radius: 10px; margin-left: 8px; }

/* ── Nav ── */
.back-btn { background: none; border: none; color: #5588aa; font-size: 13px; cursor: pointer; padding: 0; margin-bottom: 16px; font-family: inherit; }
.back-btn:hover { color: #77aacc; }

/* ── Store header ── */
.store-header { background: linear-gradient(135deg, #1a2332 0%, #243447 100%); border-radius: 16px; padding: 20px; margin-bottom: 16px; border: 1px solid var(--card-border); }
.store-header h2 { font-size: 24px; font-weight: 700; font-family: 'JetBrains Mono', monospace; color: #fff; margin-bottom: 4px; }
.store-header .addr { font-size: 14px; color: var(--muted); }
.store-header .detail { font-size: 12px; color: var(--dim); margin-top: 4px; }

/* ── Store nav tabs ── */
.store-tabs { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
.store-tabs::-webkit-scrollbar { display: none; }
.tab-btn { flex-shrink: 0; padding: 8px 14px; border-radius: 8px; border: 1px solid var(--card-border); background: var(--card); color: var(--muted); font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.15s ease; }
.tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.tab-btn:hover:not(.active) { border-color: #3a5a7a; color: var(--text); }

/* ── Tab panels ── */
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── Section ── */
.section { margin-bottom: 16px; }
.section-label { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.section-label .bar { width: 3px; height: 16px; border-radius: 2px; }
.section-label h3 { font-size: 11px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; }

/* ── Card ── */
.card { background: var(--card); border-radius: 12px; border: 1px solid var(--card-border); overflow: hidden; }
.card-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; border-bottom: 1px solid #222d3a; font-size: 13px; }
.card-row:last-child { border-bottom: none; }
.card-row .label { color: var(--muted); }
.card-row .value { font-weight: 500; color: var(--text); }
.card-row .value.highlight { color: var(--red); font-weight: 700; }

/* ── Cooler rows ── */
.cooler-row { padding: 10px 14px; border-bottom: 1px solid #222d3a; }
.cooler-row:last-child { border-bottom: none; }
.cooler-row .name { font-size: 13px; font-weight: 500; }
.cooler-row .name.new { color: var(--orange); }
.cooler-row .pog { font-size: 11px; color: var(--dim); font-family: 'JetBrains Mono', monospace; margin-top: 2px; }
.cooler-row .size-badge { font-size: 11px; color: var(--muted); float: right; }

/* ── Warnings ── */
.warning { background: #fff3cd20; border: 1px solid #ffc10744; border-radius: 10px; padding: 12px 14px; margin-bottom: 16px; font-size: 12px; color: #ffc107; line-height: 1.5; }
.warning.discrepancy { border-color: #e67e2244; color: var(--orange); background: #e67e2210; }

/* ── POG links ── */
.pog-section { margin-bottom: 16px; }
.pog-link { display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: var(--card); border: 1px solid var(--card-border); border-radius: 10px; margin-bottom: 8px; text-decoration: none; color: var(--text); transition: all 0.15s ease; }
.pog-link:hover { border-color: var(--accent); background: #1a233280; }
.pog-link .icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.pog-link .icon.csd { background: #3a8fd420; }
.pog-link .icon.bev { background: #00d08420; }
.pog-link .icon.monster { background: #e67e2220; }
.pog-link .icon.rb { background: #e74c3c20; }
.pog-link .info { flex: 1; }
.pog-link .info .title { font-size: 13px; font-weight: 500; }
.pog-link .info .sub { font-size: 10px; color: var(--dim); font-family: 'JetBrains Mono', monospace; margin-top: 1px; }
.pog-link .dl { font-size: 11px; color: var(--accent); font-weight: 600; }

/* ── Checklist ── */
.checklist { margin-bottom: 16px; }
.check-group-label { font-size: 12px; font-weight: 600; color: var(--text); margin: 10px 0 6px 0; }
.check-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; font-size: 13px; color: #ccd6dd; line-height: 1.4; }
.check-item .box { width: 18px; height: 18px; border: 2px solid #3a4a5a; border-radius: 4px; flex-shrink: 0; margin-top: 1px; }

/* ── Product accordion ── */
.pog-accordion { margin-bottom: 10px; border-radius: 12px; overflow: hidden; border: 1px solid var(--card-border); }
.pog-accordion-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; background: var(--card); cursor: pointer; user-select: none; transition: background 0.15s; }
.pog-accordion-header:hover { background: #1e2c3e; }
.pog-accordion-header .pog-title { display: flex; align-items: center; gap: 10px; }
.pog-accordion-header .pog-icon { width: 30px; height: 30px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
.pog-accordion-header .pog-name { font-size: 13px; font-weight: 600; color: var(--text); }
.pog-accordion-header .pog-count { font-size: 11px; color: var(--dim); margin-top: 1px; }
.pog-accordion-header .chevron { font-size: 12px; color: var(--dim); transition: transform 0.2s; }
.pog-accordion-header.open .chevron { transform: rotate(180deg); }
.pog-accordion-body { display: none; background: #131c28; border-top: 1px solid var(--card-border); }
.pog-accordion-body.open { display: block; }

/* ── Product grid ── */
.product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #1f2e3e; }
.product-card { background: #131c28; padding: 12px; display: flex; flex-direction: column; gap: 8px; transition: background 0.1s; }
.product-card:hover { background: #192433; }
.product-img-wrap { aspect-ratio: 1; border-radius: 8px; background: #fff; overflow: hidden; display: flex; align-items: center; justify-content: center; }
.product-img-wrap img { width: 100%; height: 100%; object-fit: contain; padding: 4px; }
.product-img-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 28px; background: #1e2c3e; border-radius: 8px; }
.product-name { font-size: 11px; font-weight: 600; color: var(--text); line-height: 1.35; }
.product-meta { display: flex; flex-direction: column; gap: 2px; }
.product-upc { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--dim); }
.product-size { font-size: 10px; color: var(--muted); }

/* ── Footer ── */
.footer { text-align: center; font-size: 11px; color: #445566; margin-top: 24px; padding-top: 16px; border-top: 1px solid #1a2332; }

/* ── Planogram: Cooler selector ── */
.cooler-select-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.cooler-select-btn { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 18px 10px; background: var(--card); border: 1px solid var(--card-border); border-radius: 12px; cursor: pointer; font-family: inherit; color: var(--text); transition: all 0.15s ease; }
.cooler-select-btn:hover { border-color: #3a5a7a; transform: translateY(-1px); }
.cooler-select-btn .cs-icon { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
.cooler-select-btn .cs-name { font-size: 12px; font-weight: 600; text-align: center; line-height: 1.3; }
.cooler-select-btn .cs-count { font-size: 10px; color: var(--dim); }
.cooler-select-btn.backup { opacity: 0.65; }
.cooler-select-btn.backup .cs-name::after { content: ' (Backup)'; font-weight: 400; color: var(--dim); font-size: 10px; }

/* ── Planogram: Bay viewer ── */
.pog-viewer { position: relative; }
.pog-viewer-back { background: none; border: none; color: #5588aa; font-size: 13px; cursor: pointer; padding: 0; margin-bottom: 12px; font-family: inherit; }
.pog-viewer-back:hover { color: #77aacc; }
.pog-viewer-title { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 4px; }
.pog-viewer-sub { font-size: 11px; color: var(--dim); margin-bottom: 12px; }

/* Bay navigation */
.bay-nav { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 12px; }
.bay-nav-btn { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--card-border); background: var(--card); color: var(--muted); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-family: inherit; transition: all 0.15s; }
.bay-nav-btn:hover { border-color: var(--accent); color: #fff; }
.bay-nav-btn:disabled { opacity: 0.3; cursor: default; }
.bay-nav-btn:disabled:hover { border-color: var(--card-border); color: var(--muted); }
.bay-dot { width: 10px; height: 10px; border-radius: 50%; background: #2a3a4a; transition: background 0.2s; }
.bay-dot.active { background: var(--accent); box-shadow: 0 0 6px #3a8fd466; }
.bay-label { font-size: 12px; font-weight: 600; color: var(--muted); margin: 0 4px; }

/* Cooler frame */
.cooler-frame { background: linear-gradient(180deg, #0d1520 0%, #111b28 100%); border: 2px solid #2a3a4a; border-radius: 12px; padding: 8px 6px; overflow: hidden; position: relative; }
.cooler-frame::before { content: ''; position: absolute; inset: 0; border-radius: 10px; border: 1px solid rgba(255,255,255,0.03); pointer-events: none; }

/* Shelf row */
.shelf-row { display: flex; align-items: stretch; position: relative; border-bottom: 2px solid #2a3a4a; background: linear-gradient(180deg, transparent 0%, rgba(42,58,74,0.15) 100%); }
.shelf-row:last-child { border-bottom: none; }
.shelf-label-tag { position: absolute; left: 2px; top: 2px; font-size: 9px; font-weight: 600; color: #445566; font-family: 'JetBrains Mono', monospace; z-index: 2; }

/* Products container */
.shelf-products { display: flex; align-items: flex-end; width: 100%; min-height: 40px; }

/* Product slot */
.product-slot { position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; transition: background 0.1s; border-right: 1px solid rgba(42,58,74,0.4); }
.product-slot:last-child { border-right: none; }
.product-slot:hover { background: rgba(58,143,212,0.08); }
.product-slot img.slot-thumb { width: 100%; height: 100%; object-fit: contain; padding: 1px; }
.product-slot .slot-fallback { font-size: 10px; color: #445566; text-align: center; line-height: 1.2; padding: 2px; word-break: break-word; overflow: hidden; }

/* Multi-facing group */
.multi-facing-group { position: relative; display: flex; align-items: stretch; flex-shrink: 0; border: 1px solid rgba(212,175,55,0.25); border-radius: 2px; }
.facing-badge { position: absolute; top: 1px; right: 1px; font-size: 8px; font-weight: 700; color: #d4af37; background: rgba(0,0,0,0.6); padding: 1px 3px; border-radius: 3px; z-index: 2; line-height: 1; }

/* NEW / CHANGED badges */
.new-badge, .changed-badge { position: absolute; bottom: 1px; left: 1px; font-size: 7px; font-weight: 700; padding: 1px 3px; border-radius: 3px; z-index: 2; line-height: 1; }
.new-badge { color: #fff; background: #00d084; }
.changed-badge { color: #fff; background: #3a8fd4; }

/* ── Product detail overlay ── */
.pog-detail-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; display: flex; align-items: flex-end; justify-content: center; animation: fadeIn 0.15s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.pog-detail-sheet { width: 100%; max-width: 600px; background: #1a2332; border-radius: 20px 20px 0 0; padding: 20px; max-height: 80vh; overflow-y: auto; animation: slideUp 0.2s ease; }
@keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.pog-detail-sheet .handle { width: 36px; height: 4px; border-radius: 2px; background: #3a4a5a; margin: 0 auto 16px; }
.pog-detail-sheet .detail-img { width: 120px; height: 120px; margin: 0 auto 12px; background: #fff; border-radius: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: zoom-in; }
.pog-detail-sheet .detail-img img { width: 100%; height: 100%; object-fit: contain; padding: 8px; }
.pog-full-img-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 1100; display: flex; align-items: center; justify-content: center; padding: 16px; animation: fadeIn 0.15s ease; cursor: zoom-out; }
.pog-full-img-overlay img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 8px; pointer-events: none; }
.pog-full-img-hint { position: absolute; bottom: 20px; left: 0; right: 0; text-align: center; font-size: 12px; color: #8899aa; }

/* Product scan */
.scan-panel { background: var(--card); border: 1px solid var(--card-border); border-radius: 12px; padding: 14px; margin-bottom: 16px; }
.scan-panel .scan-title { font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--text); }
.scan-panel .scan-desc { font-size: 11px; color: var(--dim); line-height: 1.45; margin-bottom: 12px; }
.scan-video-wrap { position: relative; width: 100%; border-radius: 10px; overflow: hidden; background: #0a0f14; aspect-ratio: 4/3; margin-bottom: 10px; display: none; }
.scan-video-wrap.active { display: block; }
.scan-video-wrap video { width: 100%; height: 100%; object-fit: cover; }
.scan-controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 10px; }
.scan-btn { padding: 8px 14px; border-radius: 8px; border: 1px solid var(--card-border); background: #243447; color: var(--text); font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; }
.scan-btn:hover { border-color: var(--accent); }
.scan-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.scan-manual { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.scan-manual input { flex: 1; min-width: 140px; padding: 8px 10px; border-radius: 8px; border: 1px solid var(--card-border); background: #131c28; color: var(--text); font-size: 13px; font-family: 'JetBrains Mono', monospace; }
.scan-result { font-size: 12px; line-height: 1.5; margin-top: 10px; padding: 10px; border-radius: 8px; background: #131c28; border: 1px solid var(--card-border); }
.scan-result.empty { color: var(--dim); }
.scan-loc { margin-top: 8px; padding: 8px; border-radius: 8px; background: #0f1419; border-left: 3px solid var(--accent); }
.scan-loc .loc-title { font-weight: 600; color: var(--accent); font-size: 12px; margin-bottom: 4px; }
.scan-loc .loc-meta { font-size: 11px; color: var(--muted); }
.scan-open-btn { margin-top: 6px; padding: 6px 10px; font-size: 11px; border-radius: 6px; border: 1px solid var(--accent); background: transparent; color: var(--accent); cursor: pointer; font-family: inherit; font-weight: 600; }
.scan-open-btn:hover { background: rgba(58,143,212,0.15); }
.scan-delete-alert { border-left: 3px solid var(--orange); background: #e67e2218; padding: 12px; border-radius: 8px; margin-top: 8px; }
.scan-delete-alert .sd-title { font-weight: 700; color: var(--orange); margin-bottom: 6px; font-size: 13px; }
.scan-delete-alert .sd-row { font-size: 11px; color: var(--muted); margin-top: 4px; line-height: 1.4; }
.scan-moved-note { border-left: 3px solid var(--accent); background: rgba(58,143,212,0.12); padding: 10px 12px; border-radius: 8px; margin-top: 8px; font-size: 11px; color: var(--muted); line-height: 1.45; }
.pog-detail-sheet .detail-name { font-size: 16px; font-weight: 700; color: #fff; text-align: center; margin-bottom: 4px; }
.pog-detail-sheet .detail-desc { font-size: 12px; color: var(--muted); text-align: center; margin-bottom: 12px; }
.pog-detail-sheet .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.pog-detail-sheet .detail-cell { background: #131c28; border-radius: 8px; padding: 10px; }
.pog-detail-sheet .detail-cell .dl { font-size: 10px; color: var(--dim); margin-bottom: 2px; }
.pog-detail-sheet .detail-cell .dv { font-size: 13px; font-weight: 600; color: var(--text); font-family: 'JetBrains Mono', monospace; }

/* ── UPC overlay on product slots ── */
.slot-upc { position: absolute; top: 0; left: 0; right: 0; font-size: 7px; font-family: 'JetBrains Mono', monospace; color: #fff; background: rgba(0,0,0,0.75); text-align: center; padding: 1px 0; line-height: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; pointer-events: none; z-index: 3; }
.group-upc { position: absolute; top: 0; left: 0; right: 0; font-size: 8px; font-family: 'JetBrains Mono', monospace; color: #fff; background: rgba(0,0,0,0.75); text-align: center; padding: 2px 0; line-height: 1; white-space: nowrap; pointer-events: none; z-index: 3; letter-spacing: 0.3px; }

/* ── UPC list view toggle ── */
.upc-toggle-btn { display: inline-flex; align-items: center; gap: 4px; padding: 6px 12px; border-radius: 8px; border: 1px solid var(--card-border); background: var(--card); color: var(--muted); font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.15s; margin-bottom: 12px; }
.upc-toggle-btn:hover { border-color: var(--accent); color: #fff; }
.upc-toggle-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* ── UPC list ── */
.upc-list-shelf { margin-bottom: 14px; }
.upc-list-shelf-label { font-size: 11px; font-weight: 700; color: var(--dim); letter-spacing: 1px; text-transform: uppercase; padding: 6px 12px; background: #131c28; border-radius: 8px 8px 0 0; border: 1px solid var(--card-border); border-bottom: none; }
.upc-list-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; background: var(--card); border: 1px solid var(--card-border); border-top: none; }
.upc-list-item:last-child { border-radius: 0 0 8px 8px; }
.upc-list-pos { width: 28px; height: 28px; border-radius: 6px; background: #131c28; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--muted); font-family: 'JetBrains Mono', monospace; flex-shrink: 0; }
.upc-list-info { flex: 1; min-width: 0; }
.upc-list-code { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 700; color: #fff; letter-spacing: 0.5px; }
.upc-list-name { font-size: 11px; color: var(--muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.upc-list-badges { display: flex; gap: 4px; flex-shrink: 0; }

/* ── Photo capture tab ── */
.photo-grid { display: grid; gap: 12px; margin-bottom: 16px; }
.photo-card { background: var(--card); border: 1px solid var(--card-border); border-radius: 12px; padding: 16px; transition: border-color 0.15s; }
.photo-card.captured { border-color: var(--green); }

<script>
// ── Data ──────────────────────────────────────────────────────────────────────
const STORES = [

const POGS = {

  rb8:   { file:"D701_L00000_D58_C142_V707_D002_MX - HABCO- RED BULL COOLER 8 FT ASSORTMENT.pdf", label:"HABCO Red Bull Cooler — 8 FT (Backup)", icon:"rb", sub:"V707_D002 — 8 FT" },

  { key:"GDM 9 - CSD",                 label:"GDM 9 — CSD",                    icon:"🥤", iconClass:"csd",     color:"#3a8fd4" },
  { key:"GDM 9 - All Beverage",        label:"GDM 9 — All Beverage",           icon:"🧃", iconClass:"bev",     color:"#00d084" },
  { key:"HABCO Monster Cooler 12 FT",  label:"HABCO Monster — 12 FT",          icon:"⚡", iconClass:"monster", color:"#e67e22" },
  { key:"HABCO Red Bull Cooler 12 FT", label:"HABCO Red Bull — 12 FT",         icon:"🐂", iconClass:"rb",      color:"#e74c3c" },
  { key:"HABCO Monster Cooler 8 FT",   label:"HABCO Monster — 8 FT (Backup)",  icon:"⚡", iconClass:"monster", color:"#e67e22", backup:true },
  { key:"HABCO Red Bull Cooler 8 FT",  label:"HABCO Red Bull — 8 FT (Backup)", icon:"🐂", iconClass:"rb",      color:"#e74c3c", backup:true },
];

const ICONS = { csd:"🥤", bev:"🧃", monster:"⚡", rb:"🐂" };

const PHOTO_COOLERS = [
  { id:'gdm-csd',  label:'GDM 9 — CSD',              icon:'🥤', color:'#3a8fd4', fileName:'GDM9-CSD' },
  { id:'gdm-bev',  label:'GDM 9 — All Beverage',     icon:'🧃', color:'#00d084', fileName:'GDM9-AllBev' },
  { id:'monster',   label:'HABCO Monster Cooler',      icon:'⚡', color:'#e67e22', fileName:'Monster' },
  { id:'redbull',   label:'HABCO Red Bull Cooler',     icon:'🐂', color:'#e74c3c', fileName:'RedBull' },
];

// ── State ─────────────────────────────────────────────────────────────────────
let selectedStore  = null;
let activeTab      = 'info';
let PRODUCTS       = null;
let PLANOGRAMS     = null;
let selectedCooler = null;
let currentBayIdx  = 0;
let showUpcList    = false;
let photoState     = {};     // { storeId: { before: {coolerId: dataUrl}, after: {coolerId: dataUrl} } }
let sendingPhotos  = false;
let sendResult     = null;
let workflowStep   = {};     // { storeId: 'before' | 'reset' | 'after' | 'done' }
let UPC_INDEX      = null;   // normalized UPC -> location entries (from planograms)
let PLAN_DELETES   = null;   // from planogram-deletes.json (PDF DELETE sections)
let ACTIVE_UPC_SET = null;   // cached Set of UPCs on any shelf (recalc when PLANOGRAMS loads)
let scanStream     = null;
let scanAnimationId = null;

// Load data on start
fetch('products.json')
  .then(r => r.json())
  .then(data => { PRODUCTS = data; })
  .catch(() => { PRODUCTS = {}; });

fetch('planograms.json')
  .then(r => r.json())
  .then(data => { PLANOGRAMS = data; buildUpcIndex(); buildActiveUpcSet(); })
  .catch(() => { PLANOGRAMS = {}; UPC_INDEX = {}; ACTIVE_UPC_SET = new Set(); });

fetch('planogram-deletes.json')
  .then(r => r.json())
  .then(data => { PLAN_DELETES = data; })
  .catch(() => { PLAN_DELETES = null; });

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  if (scanAnimationId != null) {
    cancelAnimationFrame(scanAnimationId);
    scanAnimationId = null;
  }
  if (scanStream) {
    scanStream.getTracks().forEach(t => t.stop());
    scanStream = null;
  }

  const app = document.getElementById('app');
  if (selectedStore) {
    const s = STORES.find(x => x.id === selectedStore);
    app.innerHTML = renderStore(s);
  } else {
    app.innerHTML = renderDashboard();
    activeTab = 'info';
    selectedCooler = null;
    currentBayIdx = 0;
  }
}

function switchTab(tab) {
  if (activeTab === 'scan' && tab !== 'scan') stopBarcodeScan();
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.dataset.panel === tab));
}

function toggleAccordion(el) {
  el.classList.toggle('open');
  el.nextElementSibling.classList.toggle('open');
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
function renderDashboard() {
  return `
    <div class="header">
      <div class="badge">District 6 — Active Project</div>
      <h1>Fuel Cooler Reset Guide</h1>
      <p>Fred Meyer Energy Drink Remodel — Project #12440</p>
      <div class="code">Select a store for guide, checklist &amp; product lists</div>
    </div>
    <div class="rules-box">
      <div class="label">⚠️ Key Rules</div>
      <div class="items">
        • Absolutely NO product transported to or from the fuel center<br>
        • REZ tags wrapped separately from main tag run<br>
        • Red Bull cooler may not be installed — leave materials on-site<br>
        • Before + after photos of ALL coolers, even if RB missing
      </div>
    </div>
    <div class="store-grid">
      ${STORES.map(s => `
        <button class="store-btn" onclick="selectStore('${s.id}')">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div>
              <span class="fm">FM ${s.id}</span>
              ${s.swap ? '<span class="swap-badge">ONSITE SWAP</span>' : ''}
              <div class="city">${s.city}, ${s.state}</div>
              <div class="date">${kompassDisplay(s)}</div>
              <div class="meta">${s.energySet} energy set${s.addNote ? '' : ` — ${s.adds} adds / ${s.deletes} deletes`}</div>
            </div>
          </div>
        </button>
      `).join('')}
    </div>
    <div class="footer">Generated by Tyson Gauthier — Retail Odyssey / Advantage Solutions</div>
  `;
}

function selectStore(id) {
  selectedStore = id;
  selectedCooler = null;
  currentBayIdx = 0;
  if (!workflowStep[id]) workflowStep[id] = 'before';
  activeTab = 'workflow';
  render();
}

function getWfStep(storeId) { return workflowStep[storeId] || 'before'; }

function advanceWorkflow(storeId, to) {
  workflowStep[storeId] = to;
  activeTab = 'workflow';
  selectedCooler = null;
  currentBayIdx = 0;
  sendResult = null;
  render();
}

function skipToFullView(storeId) {
  workflowStep[storeId] = 'done';
  activeTab = 'info';
  render();
}

// ── Store view ────────────────────────────────────────────────────────────────
function renderStore(s) {
  const step = getWfStep(s.id);
  const inWorkflow = step !== 'done';

  return `
    <button class="back-btn" onclick="selectedStore=null;selectedCooler=null;currentBayIdx=0;render()">← All Stores</button>
    <div class="store-header">
      <h2>FM ${s.id}</h2>
      <div class="addr">${s.city}, ${s.state} ${s.zip} — ${s.address}</div>
      <div class="detail">${s.energySet} energy set — Kompass: ${kompassDisplay(s)}${s.swap ? ' — ONSITE SWAP' : ''}</div>
    </div>

    ${inWorkflow ? renderWorkflowSteps(s) : renderFullView(s)}
  `;
}

function renderWorkflowSteps(s) {
  const step = getWfStep(s.id);
  const steps = [
    { id:'before', num:1, label:'Before Photos' },
    { id:'reset',  num:2, label:'Reset Coolers' },
    { id:'after',  num:3, label:'After Photos' },
  ];
  const stepOrder = ['before','reset','after'];
  const currentIdx = stepOrder.indexOf(step);

  const indicator = `
    <div class="workflow-steps">
      ${steps.map((st, i) => {
        const isDone = i < currentIdx;
        const isActive = i === currentIdx;
        const dotClass = isDone ? 'done' : isActive ? 'active' : '';
        const labelClass = isDone ? 'done' : isActive ? 'active' : '';
        const line = i < steps.length - 1
          ? `<div class="wf-line-wrap"><div class="wf-line ${i < currentIdx ? 'done' : ''}"></div></div>` : '';
        return `
          <div class="wf-step-col">
            <div class="wf-dot ${dotClass}">${isDone ? '✓' : st.num}</div>
            <div class="wf-label ${labelClass}">${st.label}</div>
          </div>${line}`;
      }).join('')}
    </div>`;

  let content = '';
  if (step === 'before') content = renderWorkflowPhotos(s, 'before');
  else if (step === 'reset') content = renderWorkflowReset(s);
  else if (step === 'after') content = renderWorkflowPhotos(s, 'after');

  return `
    ${indicator}
    ${content}
    <button class="wf-skip" onclick="skipToFullView('${s.id}')">Skip to full store view</button>
    <div class="footer">Generated by TacTag for Retail Odyssey / Advantage Solutions — District 6</div>
  `;
}

function renderWorkflowPhotos(s, phase) {
  const photos = getStorePhotos(s.id, phase);
  const capturedCount = PHOTO_COOLERS.filter(c => photos[c.id]).length;
  const total = PHOTO_COOLERS.length;
  const allCaptured = capturedCount === total;
  const pct = Math.round(capturedCount / total * 100);
  const isBefore = phase === 'before';
  const phaseLabel = isBefore ? 'Before' : 'After';

  const heroIcon = isBefore ? '📸' : '📷';
  const heroTitle = isBefore ? 'Take Before Photos' : 'Take After Photos';
  const heroSub = isBefore
    ? 'Photograph each cooler before starting the reset.'
    : 'Photograph each cooler now that the reset is complete.';
  const nextStep = isBefore ? 'reset' : 'done';
  const nextLabel = isBefore ? 'Continue to Planograms →' : 'Finish & Email All Photos →';

  return `
    <div class="wf-hero">
      <div class="wf-hero-icon">${heroIcon}</div>
      <div class="wf-hero-title">${heroTitle}</div>
      <div class="wf-hero-sub">${heroSub}</div>
    </div>

    <div class="photo-progress">
      <div class="photo-progress-bar"><div class="photo-progress-fill" style="width:${pct}%"></div></div>
      <div class="photo-progress-text">${capturedCount} / ${total}</div>
    </div>

    <div class="photo-grid">
      ${PHOTO_COOLERS.map(c => {
        const hasPhoto = !!photos[c.id];
        return `
          <div class="photo-card ${hasPhoto ? 'captured' : ''}">
            <div class="photo-card-header">
              <div class="photo-card-icon" style="background:${c.color}22">${c.icon}</div>
              <div class="photo-card-info">
                <div class="pc-name">${c.label}</div>
                <div class="pc-status ${hasPhoto ? 'done' : ''}">${hasPhoto ? '✓ Photo captured' : 'Waiting for photo'}</div>
              </div>
            </div>
            ${hasPhoto ? `
              <div class="photo-preview">
                <img src="${photos[c.id]}" alt="${c.label}">
                <button class="retake-btn" onclick="removePhoto('${s.id}','${c.id}','${phase}')">✕ Retake</button>
              </div>
            ` : `
              <button class="capture-btn" onclick="triggerCapture('${s.id}','${c.id}','${phase}')">📷 Take ${phaseLabel} Photo</button>
              <input type="file" accept="image/*" capture="environment" id="photo-input-${phase}-${c.id}" style="display:none" onchange="handleCapture(this,'${s.id}','${c.id}','${phase}')">
            `}
          </div>`;
      }).join('')}
    </div>

    ${isBefore ? `
      <button class="wf-next-btn ${allCaptured ? 'primary' : ''}" onclick="${allCaptured ? `sendAndAdvance('${s.id}','before','reset')` : ''}" ${!allCaptured || sendingPhotos ? 'disabled' : ''}>
        ${sendingPhotos ? '⏳ Sending before photos...' : allCaptured ? nextLabel : `📷 ${total - capturedCount} photo${total - capturedCount === 1 ? '' : 's'} remaining`}
      </button>
    ` : `
      <button class="wf-next-btn ${allCaptured ? 'success' : ''}" onclick="${allCaptured ? `sendAndAdvance('${s.id}','after','done')` : ''}" ${!allCaptured || sendingPhotos ? 'disabled' : ''}>
        ${sendingPhotos ? '⏳ Sending after photos...' : allCaptured ? nextLabel : `📷 ${total - capturedCount} photo${total - capturedCount === 1 ? '' : 's'} remaining`}

function renderBayShelves(bay, sec) {
  if (!bay || !bay.shelves || !bay.shelves.length) return '';

  const bayWidthInches = bay.width_inches || 22;
  const shelves = [...bay.shelves].sort((a, b) => a.shelf - b.shelf);

  // Calculate scale to fit all shelves in viewport
  const availableHeight = window.innerHeight - 260;
  const totalProductHeight = shelves.reduce((sum, sh) => {
    const maxH = sh.products.length ? Math.max(...sh.products.map(p => p.height_inches || 6)) : 6;
    return sum + maxH;
  }, 0);
  const pixelsPerInch = Math.min(14, Math.max(5, availableHeight / totalProductHeight));

  // Render shelves from top to bottom (highest shelf number first)
  const reversed = [...shelves].reverse();
  return reversed.map(shelf => {
    const maxH = shelf.products.length ? Math.max(...shelf.products.map(p => p.height_inches || 6)) : 6;
    const rowHeight = Math.max(36, maxH * pixelsPerInch);

    const productsHtml = renderShelfProducts(shelf, bayWidthInches, rowHeight, sec);
    return `
      <div class="shelf-row" style="height:${rowHeight}px">
        <span class="shelf-label-tag">S${shelf.shelf}</span>
        <div class="shelf-products">${productsHtml}</div>
      </div>`;
  }).join('');
}

function renderShelfProducts(shelf, bayWidthInches, rowHeight, sec) {
  if (!shelf.products || !shelf.products.length) return '';

  // Total raw width across all products (width * facings)
  const totalRawWidth = shelf.products.reduce((sum, p) =>
    sum + (p.width_inches || 2.5) * (p.facings || 1), 0);
  const scale = totalRawWidth > 0 ? bayWidthInches / totalRawWidth : 1;

  return shelf.products.map(p => {
    const facings = p.facings || 1;
    const rawW = (p.width_inches || 2.5) * facings;
    const pct = (rawW * scale / bayWidthInches * 100).toFixed(2);
    const imgSrc = p.image || `images/${p.upc}.png`;
    const name = p.full_name || p.description || '';
    const displayName = p.description || '';

    // Build slot inner HTML
    const imgTag = `<img class="slot-thumb" src="${imgSrc}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`;
    const fallback = `<div class="slot-fallback" style="display:none">${displayName.substring(0, 20)}</div>`;
    const upcLabel = `<span class="slot-upc">${p.upc}</span>`;
    const newBadge = p.is_new ? '<span class="new-badge">NEW</span>' : '';
    const chgBadge = p.is_changed ? '<span class="changed-badge">CHG</span>' : '';

    const dataAttrs = `data-upc="${p.upc}" data-name="${name.replace(/"/g, '&quot;')}" data-desc="${displayName.replace(/"/g, '&quot;')}" data-size="${p.size || ''}" data-pos="${p.position}" data-fac="${facings}" data-h="${p.height_inches}" data-w="${p.width_inches}" data-img="${imgSrc}" data-shelf="${shelf.shelf}" data-bay="${selectedCooler}" data-new="${p.is_new?1:0}" data-chg="${p.is_changed?1:0}"`;

    if (facings > 1) {
      const slotPct = (100 / facings).toFixed(2);
      const groupUpc = `<span class="group-upc">${p.upc}</span>`;
      let slots = '';
      for (let f = 0; f < facings; f++) {
        slots += `<div class="product-slot" style="width:${slotPct}%;height:100%" onclick="showProductDetail(this.parentElement)" ${f === 0 ? dataAttrs : ''}>${imgTag}${fallback}${f === 0 ? newBadge + chgBadge : ''}</div>`;
      }
      return `<div class="multi-facing-group" style="width:${pct}%;height:100%;flex-shrink:0" ${dataAttrs}>
        ${groupUpc}
        <span class="facing-badge">\u00d7${facings}</span>
        ${slots}
      </div>`;
    }

    return `<div class="product-slot" style="width:${pct}%;height:100%;flex-shrink:0" onclick="showProductDetail(this)" ${dataAttrs}>${imgTag}${fallback}${upcLabel}${newBadge}${chgBadge}</div>`;
  }).join('');
}

// ── UPC location index & product scan ─────────────────────────────────────────
function buildActiveUpcSet() {
  ACTIVE_UPC_SET = new Set();
  if (!PLANOGRAMS) return ACTIVE_UPC_SET;
  Object.keys(PLANOGRAMS).forEach(coolerKey => {
    const pog = PLANOGRAMS[coolerKey];
    if (!pog || !pog.bays) return;
    pog.bays.forEach(bay => {
      (bay.shelves || []).forEach(sh => {
        (sh.products || []).forEach(p => {
          const k = normalizeUpcKey(p.upc);
          if (k) ACTIVE_UPC_SET.add(k);
        });
      });
    });
  });
  return ACTIVE_UPC_SET;
}

function buildUpcIndex() {
  UPC_INDEX = {};
  if (!PLANOGRAMS) return;
  Object.keys(PLANOGRAMS).forEach(coolerKey => {
    const pog = PLANOGRAMS[coolerKey];
    if (!pog || !pog.bays) return;
    const sec = COOLER_SECTIONS.find(c => c.key === coolerKey);
    const label = sec ? sec.label : coolerKey;
    pog.bays.forEach(bay => {
      (bay.shelves || []).forEach(sh => {
        (sh.products || []).forEach(p => {
          const k = normalizeUpcKey(p.upc);
          if (!k) return;
          const entry = {
            coolerKey,
            coolerLabel: label,
            bayNum: bay.bay,
            shelf: sh.shelf,
            position: p.position,
            name: (p.full_name || p.description || '')
          };
          if (!UPC_INDEX[k]) UPC_INDEX[k] = [];
          UPC_INDEX[k].push(entry);
        });
      });
    });
  });
}

/** UPC-A check digit for first 11 digits (odd positions from left ×3). */
function upcCheckDigit11(eleven) {
  let sum = 0;
  for (let i = 0; i < 11; i++) {
    const n = parseInt(eleven[i], 10);
    if (Number.isNaN(n)) return null;
    sum += (i % 2 === 0) ? n * 3 : n;
  }
  return (10 - (sum % 10)) % 10;
}

/**
 * Expand GS1 UPC-E (8 digits, number system 0) to 12-digit UPC-A for lookup.
 * Planograms store 12-digit UPCs; small packages often print UPC-E only.
 */
function expandUpcEto12(upc8) {
  const d = String(upc8 || '').replace(/\D/g, '');
  if (d.length !== 8 || d[0] !== '0') return null;
  const ns = d[0];
  const d1 = d[1], d2 = d[2], d3 = d[3], d4 = d[4], d5 = d[5], d6 = d[6];
  let eleven;
  if (d6 <= '2') {
    eleven = ns + d1 + d2 + d6 + '0000' + d3 + d4 + d5;
  } else if (d6 === '3') {
    eleven = ns + d1 + d2 + d3 + '00000' + d4 + d5;
  } else if (d6 === '4') {
    eleven = ns + d1 + d2 + d3 + d4 + '00000' + d5;
  } else {
    eleven = ns + d1 + d2 + d3 + d4 + d5 + '0000' + d6;
  }
  if (eleven.length !== 11) return null;
  const chk = upcCheckDigit11(eleven);
  if (chk === null) return null;
  return eleven + String(chk);
}

function normalizeUpcKey(str) {
  let d = String(str || '').replace(/\D/g, '');
  if (!d) return '';
  if (d.length === 8 && d[0] === '0') {
    const expanded = expandUpcEto12(d);
    if (!expanded) return '';
    d = expanded;
  }
  if (d.length === 13 && d[0] === '0') d = d.slice(1);
  while (d.length < 12) d = '0' + d;
  if (d.length > 12) d = d.slice(-12);
  return d;
}

function findLocationsForUpc(raw) {
  if (!UPC_INDEX) buildUpcIndex();
  const k = normalizeUpcKey(raw);
  if (!k) return null;
  const list = UPC_INDEX[k];
  if (list && list.length) return { key: k, list: list.slice() };
  return null;
}

function scanEscapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/"/g, '&quot;');
}

function showUpcLookupResult(raw, container) {
  if (!container) return;
  const rawDigits = String(raw).replace(/\D/g, '');
  const displayUpc = normalizeUpcKey(raw) || rawDigits;
  const found = findLocationsForUpc(raw);
  const upcENote = (rawDigits.length === 8 && rawDigits[0] === '0' && expandUpcEto12(rawDigits) === displayUpc)
    ? ' <span style="color:var(--dim);font-size:11px;font-weight:500">(UPC-E ' + scanEscapeHtml(rawDigits) + ')</span>'
    : '';

  if (found && found.list.length) {
    const rows = found.list.map(loc => {
      const ck = JSON.stringify(loc.coolerKey);
      return '<div class="scan-loc"><div class="loc-title">' + scanEscapeHtml(loc.coolerLabel) + '</div>'
        + '<div class="loc-meta">Bay ' + loc.bayNum + ' · Shelf ' + loc.shelf + ' · Position ' + loc.position + '</div>'
        + '<div class="loc-meta" style="margin-top:4px">' + scanEscapeHtml(loc.name) + '</div>'
        + '<button type="button" class="scan-open-btn" onclick="goToPlanogramLocation(' + ck + ', ' + loc.bayNum + ')">Open planogram</button></div>';
    }).join('');
    const multi = found.list.length > 1 ? ' (multiple placements)' : '';
    container.innerHTML = '<div class="scan-result">UPC <strong>' + scanEscapeHtml(displayUpc) + '</strong>' + upcENote + multi + '</div>' + rows;
    return;
  }

  const k = displayUpc;
  const active = ACTIVE_UPC_SET || buildActiveUpcSet();
  const delList = (PLAN_DELETES && PLAN_DELETES.byUpc && k) ? PLAN_DELETES.byUpc[k] : null;

  if (delList && delList.length) {
    if (active.has(k)) {
      const sources = delList.map(d => scanEscapeHtml(d.fromPlanogram)).join('; ');
      container.innerHTML = '<div class="scan-result">UPC <strong>' + scanEscapeHtml(displayUpc) + '</strong>' + upcENote + '</div>'
        + '<div class="scan-moved-note">PDF lists this item as removed from: ' + sources
        + '. It still appears in the <strong>current digital planogram</strong> (often because it moved to another cooler). Use the planogram view to place it — do <strong>not</strong> treat as a pull based on the delete list alone.</div>';
      return;
    }
    let rows = '';
    for (let i = 0; i < delList.length; i++) {
      const d = delList[i];
      rows += '<div class="sd-row">• ' + scanEscapeHtml(d.fromPlanogram)
        + (d.description ? ' — ' + scanEscapeHtml(d.description) : '')
        + (d.size ? ' (' + scanEscapeHtml(d.size) + ')' : '')
        + '</div>';
    }
    container.innerHTML = '<div class="scan-result">UPC <strong>' + scanEscapeHtml(displayUpc) + '</strong>' + upcENote + '</div>'
      + '<div class="scan-delete-alert"><div class="sd-title">Removed from planogram (DELETE)</div>'
      + '<div class="sd-row">Not on the current digital assortment for any fuel cooler — pull per reset rules.</div>'
      + rows + '</div>';
    return;
  }

  container.innerHTML = '<div class="scan-result">No match for <strong>' + scanEscapeHtml(String(raw)) + '</strong>'
    + (displayUpc && displayUpc !== rawDigits ? ' → ' + scanEscapeHtml(displayUpc) : '')
    + ' in the fuel cooler planograms. Check the UPC or confirm the item is on this project.</div>';
}

function goToPlanogramLocation(coolerKey, bayNum) {
  selectedCooler = coolerKey;
  const pog = PLANOGRAMS[coolerKey];
  if (pog && pog.bays && pog.bays.length) {
    const idx = pog.bays.findIndex(b => b.bay === bayNum);
    currentBayIdx = idx >= 0 ? idx : 0;
  } else {
    currentBayIdx = 0;
  }
  showUpcList = false;
  activeTab = 'planograms';
  render();
  switchTab('planograms');
}

function renderProductScanPanel(s) {
  if (!PLANOGRAMS || !Object.keys(PLANOGRAMS).length) {
    return '<div style="padding:20px;text-align:center;color:var(--dim);font-size:13px">Loading planogram data for scan…</div>';
  }
  return '<div class="scan-panel">'
    + '<div class="scan-title">Find product in coolers</div>'
    + '<div class="scan-desc">Scan a UPC with the camera (Chrome or Edge — use manual entry on Safari/iOS) or type the code below. Short <strong>UPC-E</strong> codes (8 digits on small packs) are converted to full UPC for lookup. Items listed as <strong>DELETE</strong> on the PDFs but still on the digital planogram in another cooler are not flagged as pulls.</div>'
    + '<div class="scan-video-wrap" id="scan-video-wrap"><video id="scan-video" playsinline muted></video></div>'
    + '<div class="scan-controls">'
    + '<button type="button" class="scan-btn primary" id="scan-start-btn" onclick="startBarcodeScan()">Start camera scan</button>'
    + '<button type="button" class="scan-btn" id="scan-stop-btn" onclick="stopBarcodeScan()" style="display:none">Stop camera</button>'
    + '</div>'
    + '<div class="scan-manual">'
    + '<input type="text" id="scan-manual-input" placeholder="Enter UPC (digits)" inputmode="numeric" autocomplete="off" onkeydown="if(event.key===\'Enter\')lookupManualUpc()">'
    + '<button type="button" class="scan-btn primary" onclick="lookupManualUpc()">Look up</button>'
    + '</div>'
    + '<div id="scan-result-area"></div>'
    + '</div>';
}

function lookupManualUpc() {
  const inp = document.getElementById('scan-manual-input');
  const raw = inp && inp.value.trim();
  if (!raw) return;
  showUpcLookupResult(raw, document.getElementById('scan-result-area'));
}

function stopBarcodeScan() {
  if (scanAnimationId != null) {
    cancelAnimationFrame(scanAnimationId);
    scanAnimationId = null;
  }
  const video = document.getElementById('scan-video');
  if (video && video.srcObject) {
    video.srcObject.getTracks().forEach(t => t.stop());
    video.srcObject = null;
  } else if (scanStream) {
    scanStream.getTracks().forEach(t => t.stop());
  }
  scanStream = null;
  const wrap = document.getElementById('scan-video-wrap');
  if (wrap) wrap.classList.remove('active');
  const startBtn = document.getElementById('scan-start-btn');
  const stopBtn = document.getElementById('scan-stop-btn');
  if (startBtn) startBtn.style.display = 'inline-block';
  if (stopBtn) stopBtn.style.display = 'none';
}

async function startBarcodeScan() {
  const resultEl = document.getElementById('scan-result-area');
  const wrap = document.getElementById('scan-video-wrap');
  const video = document.getElementById('scan-video');
  const startBtn = document.getElementById('scan-start-btn');
  const stopBtn = document.getElementById('scan-stop-btn');
  if (!video || !wrap) return;

  if (typeof BarcodeDetector === 'undefined') {
    if (resultEl) {
      resultEl.innerHTML = '<div class="scan-result">Live barcode scanning needs Chrome or Edge (BarcodeDetector API). Use <strong>Look up</strong> with the UPC typed in — that works in every browser.</div>';
    }
    return;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' } } });
    scanStream = stream;
    video.srcObject = stream;
    await video.play();
    wrap.classList.add('active');
    if (startBtn) startBtn.style.display = 'none';
    if (stopBtn) stopBtn.style.display = 'inline-block';

    const detector = new BarcodeDetector({ formats: ['upc_a', 'upc_e', 'ean_13', 'ean_8', 'code_128', 'code_39'] });

    function loop() {
      if (!scanStream) return;
      detector.detect(video).then(codes => {
        if (!scanStream) return;
        if (codes && codes.length) {
          const raw = codes[0].rawValue;
          stopBarcodeScan();
          const inp = document.getElementById('scan-manual-input');
          if (inp) inp.value = raw;
          showUpcLookupResult(raw, document.getElementById('scan-result-area'));
          return;
        }
        scanAnimationId = requestAnimationFrame(loop);
      }).catch(() => {
        if (scanStream) scanAnimationId = requestAnimationFrame(loop);
      });
    }
    scanAnimationId = requestAnimationFrame(loop);
  } catch (e) {
    if (resultEl) {
      resultEl.innerHTML = '<div class="scan-result">Could not open camera: ' + scanEscapeHtml(e.message || 'permission denied') + '</div>';
    }
  }
}

// ── UPC list view ─────────────────────────────────────────────────────────────
function toggleUpcList() {
  showUpcList = !showUpcList;
  render();
  switchTab('planograms');
}

function renderUpcList(bay) {
  if (!bay || !bay.shelves || !bay.shelves.length) return '';
  const shelves = [...bay.shelves].sort((a, b) => a.shelf - b.shelf).reverse();
  return shelves.map(shelf => `
    <div class="upc-list-shelf">
      <div class="upc-list-shelf-label">Shelf ${shelf.shelf} — ${shelf.products.length} products</div>
      ${shelf.products.map(p => `
        <div class="upc-list-item">
          <div class="upc-list-pos">${p.position}</div>
          <div class="upc-list-info">
            <div class="upc-list-code">${p.upc}</div>
            <div class="upc-list-name">${p.full_name || p.description} · ${p.size || ''} · ×${p.facings || 1}</div>
          </div>
          <div class="upc-list-badges">
            ${p.is_new ? '<span class="new-badge" style="position:static;font-size:9px;padding:2px 6px">NEW</span>' : ''}
            ${p.is_changed ? '<span class="changed-badge" style="position:static;font-size:9px;padding:2px 6px">CHG</span>' : ''}
          </div>
        </div>`).join('')}

}

// ── Photos (before/after) ─────────────────────────────────────────────────────
function getStorePhotos(storeId, phase) {
  if (!photoState[storeId]) photoState[storeId] = { before: {}, after: {} };
  if (!photoState[storeId][phase]) photoState[storeId][phase] = {};
  return photoState[storeId][phase];
}

function triggerCapture(storeId, coolerId, phase) {
  const input = document.getElementById(`photo-input-${phase}-${coolerId}`);
  if (input) input.click();
}

function handleCapture(input, storeId, coolerId, phase) {
  const file = input.files[0];
  if (!file) return;
  resizeImage(file, 1200, 0.60).then(dataUrl => {
    if (!photoState[storeId]) photoState[storeId] = { before: {}, after: {} };
    if (!photoState[storeId][phase]) photoState[storeId][phase] = {};
    photoState[storeId][phase][coolerId] = dataUrl;
    sendResult = null;
    render();
  });
}

function removePhoto(storeId, coolerId, phase) {
  if (photoState[storeId] && photoState[storeId][phase]) {
    delete photoState[storeId][phase][coolerId];
  }
  sendResult = null;
  render();
}

function resizeImage(file, maxDim, quality) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > maxDim || h > maxDim) {
          if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
          else { w = Math.round(w * maxDim / h); h = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function sendAndAdvance(storeId, phase, nextStep) {
  const s = STORES.find(x => x.id === storeId);
  if (!s) return;
  const photos = getStorePhotos(storeId, phase);
  sendingPhotos = true;
  sendResult = null;
  render();

  const phaseLabel = phase === 'before' ? 'Before' : 'After';
  const coolerPhotos = PHOTO_COOLERS.map(c => ({
    name: c.label,
    fileName: `FM${storeId}_${phase}_${c.fileName}.jpg`,
    base64: photos[c.id].split(',')[1]
  }));

  try {
    const res = await fetch('/api/send-photos', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        storeId: s.id,
        city: s.city,
        state: s.state,
        address: s.address,
        energySet: s.energySet,
        resetDate: kompassDisplay(s),
        phase,
        coolerPhotos
      })
    });
    const data = await res.json();
    if (res.ok && data.success) {
      sendResult = { ok: true, message: `✓ ${phaseLabel} photos emailed to April!` };
      sendingPhotos = false;
      render();
      setTimeout(() => {
        sendResult = null;
        advanceWorkflow(storeId, nextStep);
      }, 1500);
      return;
    } else {
      sendResult = { ok: false, message: data.error || 'Failed to send email. Please try again.' };
    }
  } catch (err) {
    sendResult = { ok: false, message: 'Network error. Make sure the server is running.' };
  }
  sendingPhotos = false;
  render();
}

// ── PDF Viewer ────────────────────────────────────────────────────────────────
let pdfDoc = null;
let pdfPageNum = 1;
let pdfScale = 1.5;

pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

function openPdfViewer(url, title) {
  pdfPageNum = 1;
  pdfScale = 1.5;
  pdfDoc = null;

  const overlay = document.createElement('div');
  overlay.className = 'pdf-viewer-overlay';
  overlay.id = 'pdf-viewer';
  overlay.innerHTML = `
    <div class="pdf-viewer-toolbar">
      <button class="pdf-close-btn" onclick="closePdfViewer()">&times;</button>
      <span class="pdf-title">${title}</span>
      <div class="pdf-zoom-controls">
        <button class="pdf-zoom-btn" onclick="pdfZoom(-0.25)">−</button>
        <button class="pdf-zoom-btn" onclick="pdfZoom(0.25)">+</button>
      </div>
    </div>
    <div class="pdf-page-controls" id="pdf-page-controls" style="display:none">
      <button class="pdf-page-btn" id="pdf-prev" onclick="pdfPrev()">‹</button>
      <span class="pdf-page-info" id="pdf-page-info"></span>
      <button class="pdf-page-btn" id="pdf-next" onclick="pdfNext()">›</button>
    </div>
    <div class="pdf-canvas-wrap" id="pdf-canvas-wrap">
      <div class="pdf-loading">Loading PDF...</div>
    </div>
  `;
  document.body.appendChild(overlay);

  pdfjsLib.getDocument(url).promise.then(doc => {
    pdfDoc = doc;
    const controls = document.getElementById('pdf-page-controls');
    if (controls) controls.style.display = 'flex';
    renderPdfPage();
  }).catch(err => {
    const wrap = document.getElementById('pdf-canvas-wrap');
    if (wrap) wrap.innerHTML = `<div class="pdf-loading" style="color:var(--red)">Failed to load PDF</div>`;
  });
}

function closePdfViewer() {
  const el = document.getElementById('pdf-viewer');
  if (el) el.remove();
  pdfDoc = null;
}

function renderPdfPage() {
  if (!pdfDoc) return;
  pdfDoc.getPage(pdfPageNum).then(page => {
    const viewport = page.getViewport({ scale: pdfScale });
    const canvas = document.createElement('canvas');
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    const ctx = canvas.getContext('2d');

    page.render({ canvasContext: ctx, viewport: viewport }).promise.then(() => {
      const wrap = document.getElementById('pdf-canvas-wrap');
      if (wrap) { wrap.innerHTML = ''; wrap.appendChild(canvas); }
    });

    const info = document.getElementById('pdf-page-info');
    if (info) info.textContent = `${pdfPageNum} / ${pdfDoc.numPages}`;
    const prev = document.getElementById('pdf-prev');
    const next = document.getElementById('pdf-next');
    if (prev) prev.disabled = pdfPageNum <= 1;
    if (next) next.disabled = pdfPageNum >= pdfDoc.numPages;
  });
}

function pdfPrev() { if (pdfPageNum > 1) { pdfPageNum--; renderPdfPage(); } }
function pdfNext() { if (pdfDoc && pdfPageNum < pdfDoc.numPages) { pdfPageNum++; renderPdfPage(); } }
function pdfZoom(delta) {
  pdfScale = Math.max(0.5, Math.min(4, pdfScale + delta));
  renderPdfPage();
}

// ── Swipe gesture for bay navigation ──────────────────────────────────────────
let _touchStartX = 0;
document.addEventListener('touchstart', e => {
  const frame = e.target.closest('.cooler-frame');
  if (frame) _touchStartX = e.touches[0].clientX;
}, { passive: true });
document.addEventListener('touchend', e => {
  if (!_touchStartX || !selectedCooler) return;
  const dx = e.changedTouches[0].clientX - _touchStartX;
  _touchStartX = 0;
  if (Math.abs(dx) < 50) return;
  const pog = PLANOGRAMS[selectedCooler];
  if (!pog || pog.bays.length < 2) return;
  if (dx < 0 && currentBayIdx < pog.bays.length - 1) switchBay(currentBayIdx + 1);
  else if (dx > 0 && currentBayIdx > 0) switchBay(currentBayIdx - 1);
}, { passive: true });

render();
</script>
