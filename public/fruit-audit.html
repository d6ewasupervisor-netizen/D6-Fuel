<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#07110b">
<title>District 8 Fruit Audit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="/auth.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
<style>
:root {
  --bg: #07110b;
  --panel: #0e1a12;
  --card: #14231a;
  --card-2: #192b20;
  --border: #294434;
  --text: #f4fff7;
  --sub: #bfd8c6;
  --muted: #7f9b89;
  --dim: #536b5c;
  --green: #53d86a;
  --green-2: #88f06f;
  --amber: #ffd166;
  --red: #ff5d6c;
  --blue: #68b7ff;
  --radius: 16px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  min-height: 100vh;
  min-height: 100dvh;
  background: radial-gradient(circle at 20% -10%, rgba(83,216,106,0.20), transparent 34%), var(--bg);
  color: var(--text);
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 15px;
  line-height: 1.45;
  padding: calc(12px + var(--safe-top)) 12px calc(18px + var(--safe-bottom));
  -webkit-font-smoothing: antialiased;
  overscroll-behavior-y: contain;
}
button, input, textarea, select { font: inherit; }
button { -webkit-tap-highlight-color: rgba(83,216,106,0.18); touch-action: manipulation; }
.app { width: 100%; max-width: 680px; margin: 0 auto; }
.hero {
  background: linear-gradient(135deg, #12351f, #172a1c 58%, #0c1a10);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px 20px;
  margin-bottom: 14px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.32);
}
.badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--green-2);
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.badge::before { content: ''; width: 9px; height: 9px; border-radius: 50%; background: var(--green); box-shadow: 0 0 14px rgba(83,216,106,0.7); }
.hero h1 { font-size: 27px; line-height: 1.1; margin-bottom: 8px; }
.hero p { color: var(--sub); }
.guide-link {
  display: block;
  text-align: center;
  text-decoration: none;
  background: var(--green);
  color: #061008;
  border-radius: 14px;
  padding: 14px 16px;
  font-weight: 900;
  margin: 0 0 14px;
}
.quick-steps {
  display: grid;
  gap: 8px;
  margin-bottom: 14px;
}
.quick-step {
  display: grid;
  grid-template-columns: 28px 1fr;
  gap: 10px;
  align-items: start;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 13px;
  padding: 11px 12px;
}
.quick-step .num {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: rgba(83,216,106,0.16);
  color: var(--green-2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  font-family: 'JetBrains Mono', monospace;
}
.quick-step .txt { color: var(--sub); font-size: 13px; }
.quick-step strong { color: var(--text); }
.user-row, .top-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 12px;
}
.pill, .back-btn, .secondary-btn {
  border: 1px solid var(--border);
  background: var(--panel);
  color: var(--sub);
  border-radius: 999px;
  padding: 9px 13px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
}
.pill strong { color: var(--text); }
.back-btn { border-radius: 12px; color: var(--green-2); min-height: 44px; }
.store-grid { display: grid; gap: 10px; margin: 14px 0 22px; }
.store-btn {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 13px;
  width: 100%;
  text-align: left;
  background: var(--card);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  cursor: pointer;
}
.store-btn:active, .set-card:active { transform: scale(0.99); }
.store-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 19px;
  font-weight: 800;
  background: rgba(83,216,106,0.13);
  border: 1px solid rgba(83,216,106,0.35);
  border-radius: 12px;
  padding: 8px 10px;
  min-width: 78px;
  text-align: center;
}
.store-meta { color: var(--sub); font-weight: 700; }
.store-status { color: var(--muted); font-size: 12px; margin-top: 3px; }
.chev { color: var(--dim); font-size: 24px; }
.store-header {
  background: linear-gradient(135deg, #12351f, #102017);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 12px;
}
.store-header h1 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 28px;
  margin-bottom: 5px;
}
.detail { color: var(--sub); font-size: 14px; }
.progress {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 14px;
}
.progress-bar { height: 9px; border-radius: 99px; background: #09140d; overflow: hidden; margin-bottom: 8px; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--green), var(--green-2)); border-radius: inherit; transition: width 0.2s; }
.progress-text { color: var(--sub); font-size: 13px; font-weight: 700; }
.notice {
  background: rgba(255,209,102,0.10);
  border: 1px solid rgba(255,209,102,0.35);
  border-left: 4px solid var(--amber);
  border-radius: var(--radius);
  color: var(--sub);
  padding: 13px 14px;
  font-size: 13px;
  margin-bottom: 14px;
}
.notice strong { color: var(--amber); }
.set-list { display: grid; gap: 12px; }
.set-card {
  --set-accent: var(--green);
  --set-accent-soft: rgba(83,216,106,0.13);
  background: var(--card);
  border: 2px solid var(--set-accent);
  border-radius: var(--radius);
  padding: 15px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.02), 0 10px 28px rgba(0,0,0,0.22);
  transition: transform 0.12s, border-color 0.12s;
}
.set-card::before {
  content: '';
  position: absolute;
  inset: 0 0 auto;
  height: 6px;
  background: var(--set-accent);
}
.set-card.commodity-apples { --set-accent: #ff5d6c; --set-accent-soft: rgba(255,93,108,0.14); }
.set-card.commodity-citrus { --set-accent: #ffd166; --set-accent-soft: rgba(255,209,102,0.16); }
.set-card.commodity-berries { --set-accent: #a78bfa; --set-accent-soft: rgba(167,139,250,0.16); }
.set-card.captured { border-color: rgba(255,209,102,0.60); }
.set-card.sent { border-color: rgba(83,216,106,0.60); }
.set-head {
  display: grid;
  grid-template-columns: 54px 1fr;
  gap: 12px;
  align-items: start;
  margin: 4px 0 12px;
  background: linear-gradient(135deg, var(--set-accent-soft), rgba(255,255,255,0.03));
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  padding: 12px;
}
.set-icon {
  width: 54px;
  height: 54px;
  border-radius: 13px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--set-accent);
  color: #061008;
  font-family: 'JetBrains Mono', monospace;
  font-size: 15px;
  font-weight: 950;
}
.set-kicker {
  color: var(--set-accent);
  font-size: 11px;
  font-weight: 950;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 3px;
}
.set-title {
  font-size: 21px;
  font-weight: 950;
  line-height: 1.1;
  margin-bottom: 5px;
  text-transform: uppercase;
}
.set-sub { color: var(--sub); font-size: 12px; font-family: 'JetBrains Mono', monospace; overflow-wrap: anywhere; }
.set-head .status {
  grid-column: 1 / -1;
  justify-self: start;
}
.set-target-callout {
  background: var(--set-accent-soft);
  border: 1px solid var(--set-accent);
  border-left: 6px solid var(--set-accent);
  border-radius: 14px;
  padding: 13px 14px;
  margin: 0 0 12px;
  color: var(--text);
  font-size: 15px;
  font-weight: 800;
}
.set-target-callout strong {
  display: block;
  color: var(--set-accent);
  font-size: 12px;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  margin-bottom: 3px;
}
.status {
  border-radius: 99px;
  padding: 5px 9px;
  font-size: 11px;
  font-weight: 800;
  color: var(--muted);
  background: #0b160f;
  border: 1px solid var(--border);
  white-space: nowrap;
}
.status.captured { color: var(--amber); border-color: rgba(255,209,102,0.45); background: rgba(255,209,102,0.10); }
.status.sent { color: var(--green-2); border-color: rgba(83,216,106,0.45); background: rgba(83,216,106,0.10); }
.facts {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
  margin: 10px 0 12px;
}
.fact {
  background: var(--panel);
  border: 1px solid #21382b;
  border-radius: 12px;
  padding: 9px 10px;
  min-width: 0;
}
.fact .k { color: var(--muted); font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.7px; }
.fact .v { color: var(--text); font-size: 13px; font-weight: 700; margin-top: 2px; overflow-wrap: anywhere; }
.desc { color: var(--sub); font-size: 13px; margin-bottom: 12px; }
.side-grid {
  display: grid;
  gap: 10px;
  margin: 12px 0;
}
.side-card {
  background: var(--panel);
  border: 1px solid #21382b;
  border-radius: 13px;
  padding: 11px;
}
.side-card.ready { border-color: rgba(255,209,102,0.50); }
.side-card.sent { border-color: rgba(83,216,106,0.50); }
.capture-flow {
  background: rgba(83,216,106,0.10);
  border: 1px solid rgba(83,216,106,0.35);
  border-radius: 13px;
  padding: 12px;
  margin: 12px 0;
}
.capture-flow p {
  color: var(--sub);
  font-size: 13px;
  margin-bottom: 10px;
}
.capture-flow-btn {
  width: 100%;
  min-height: 50px;
  border: 0;
  border-radius: 13px;
  background: var(--green);
  color: #061008;
  font-weight: 900;
  cursor: pointer;
}
.side-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}
.side-title { font-weight: 900; color: var(--text); font-size: 14px; }
.side-hint { color: var(--muted); font-size: 12px; margin-bottom: 8px; }
.side-status {
  border-radius: 999px;
  border: 1px solid var(--border);
  padding: 3px 8px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 900;
  white-space: nowrap;
}
.side-status.ready { color: var(--amber); border-color: rgba(255,209,102,0.45); }
.side-status.sent { color: var(--green-2); border-color: rgba(83,216,106,0.45); }
.gallery {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 2px 0 10px;
  margin-bottom: 2px;
  scrollbar-width: none;
}
.gallery::-webkit-scrollbar { display: none; }
.thumb {
  position: relative;
  width: 92px;
  height: 92px;
  border-radius: 12px;
  overflow: hidden;
  flex: 0 0 auto;
  background: #09140d;
  border: 1px solid var(--border);
}
.thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.thumb span {
  position: absolute;
  top: 5px;
  left: 5px;
  background: rgba(0,0,0,0.68);
  color: #fff;
  border-radius: 6px;
  padding: 2px 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 800;
}
.remove {
  position: absolute;
  top: 5px;
  right: 5px;
  width: 24px;
  height: 24px;
  border: 0;
  border-radius: 50%;
  background: var(--red);
  color: #fff;
  font-size: 13px;
  font-weight: 800;
  cursor: pointer;
}
.actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.action-btn {
  min-height: 48px;
  border: 1px solid var(--border);
  border-radius: 13px;
  background: var(--panel);
  color: var(--text);
  font-weight: 800;
  cursor: pointer;
}
.action-btn.primary { background: var(--green); border-color: var(--green); color: #061008; }
.action-btn:active, .submit-btn:active, .login-submit:active { transform: scale(0.98); }
.notes { margin: 16px 0 12px; }
.notes label { display: block; color: var(--sub); font-weight: 800; font-size: 13px; margin-bottom: 6px; }
.notes textarea {
  width: 100%;
  min-height: 82px;
  border: 1px solid var(--border);
  border-radius: 13px;
  background: var(--panel);
  color: var(--text);
  padding: 12px;
  resize: vertical;
  outline: none;
}
.notes textarea:focus { border-color: var(--green); }
.submit-btn {
  width: 100%;
  min-height: 58px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--card-2);
  color: var(--muted);
  font-size: 16px;
  font-weight: 800;
  cursor: not-allowed;
  margin-bottom: 18px;
}
.submit-btn.ready { cursor: pointer; background: linear-gradient(135deg, var(--green), var(--green-2)); border-color: var(--green); color: #061008; }
.submit-btn.sending { color: var(--blue); cursor: progress; }
.footer { color: var(--dim); text-align: center; font-size: 12px; margin: 18px 0 6px; }
.login-overlay, .confirm-overlay {
  position: fixed;
  inset: 0;
  z-index: 1000;
  background: rgba(7,17,11,0.96);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: calc(16px + var(--safe-top)) 12px calc(28px + var(--safe-bottom));
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.login-card, .confirm-card {
  width: 100%;
  max-width: 430px;
  max-height: calc(100dvh - var(--safe-top) - var(--safe-bottom) - 44px);
  overflow-y: auto;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 26px 22px;
  box-shadow: 0 14px 44px rgba(0,0,0,0.42);
}
.login-card h1, .confirm-card h1 { font-size: 24px; margin-bottom: 6px; }
.login-sub, .confirm-sub { color: var(--sub); margin-bottom: 18px; }
.confidence-emitter {
  width: 92px;
  height: 92px;
  border-radius: 50%;
  margin: 0 auto 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(83,216,106,0.16);
  border: 3px solid var(--green);
  color: var(--green-2);
  font-size: 48px;
  font-weight: 900;
  box-shadow: 0 0 0 0 rgba(83,216,106,0.55), 0 0 32px rgba(83,216,106,0.35);
  animation: confidencePulse 1.3s ease-out infinite;
}
@keyframes confidencePulse {
  0% { transform: scale(0.96); box-shadow: 0 0 0 0 rgba(83,216,106,0.55), 0 0 28px rgba(83,216,106,0.35); }
  70% { transform: scale(1); box-shadow: 0 0 0 18px rgba(83,216,106,0), 0 0 36px rgba(83,216,106,0.42); }
  100% { transform: scale(0.96); box-shadow: 0 0 0 0 rgba(83,216,106,0), 0 0 28px rgba(83,216,106,0.35); }
}
.confirm-card.success {
  text-align: center;
  border-color: rgba(83,216,106,0.70);
}
.confirm-card.success h1 {
  font-size: 30px;
  line-height: 1.08;
  margin-bottom: 10px;
}
.login-card label { display: block; color: var(--sub); font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 6px; }
.login-card input {
  width: 100%;
  min-height: 50px;
  border: 1px solid var(--border);
  border-radius: 13px;
  background: var(--panel);
  color: var(--text);
  padding: 12px;
  margin-bottom: 14px;
  outline: none;
}
.login-card input:focus { border-color: var(--green); }
.login-submit, .confirm-btn {
  width: 100%;
  min-height: 52px;
  border: 0;
  border-radius: 13px;
  background: var(--green);
  color: #061008;
  font-weight: 900;
  cursor: pointer;
}
.confirm-btn {
  position: sticky;
  bottom: 0;
  min-height: 56px;
  margin-top: 4px;
  box-shadow: 0 -10px 24px rgba(20,35,26,0.88);
}
.login-submit:disabled { background: #223629; color: var(--dim); cursor: not-allowed; }
.confirm-detail {
  border: 1px solid var(--border);
  border-radius: 13px;
  background: var(--panel);
  padding: 12px;
  margin-bottom: 14px;
}
.confirm-detail .row { display: flex; justify-content: space-between; gap: 10px; padding: 4px 0; color: var(--sub); font-size: 13px; }
.confirm-detail .row strong { color: var(--text); }
.loading, .error {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  color: var(--sub);
}
.error { border-color: rgba(255,93,108,0.55); color: #ffd8dc; }
.toast {
  position: fixed;
  left: 14px;
  right: 14px;
  bottom: calc(14px + var(--safe-bottom));
  z-index: 900;
  max-width: 640px;
  margin: 0 auto;
  background: #061008;
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 13px;
  padding: 12px 14px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.42);
  display: none;
}
.toast.show { display: block; }
.capture-overlay {
  position: fixed;
  inset: 0;
  z-index: 2000;
  background: #020604;
  display: flex;
  flex-direction: column;
  padding: calc(10px + var(--safe-top)) 10px calc(12px + var(--safe-bottom));
}
.capture-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.capture-close {
  min-height: 42px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: var(--panel);
  color: var(--sub);
  padding: 8px 12px;
  font-weight: 800;
}
.capture-title { flex: 1; min-width: 0; }
.capture-title h2 { font-size: 18px; line-height: 1.15; }
.capture-title p { color: var(--muted); font-size: 12px; overflow-wrap: anywhere; }
.capture-video-wrap {
  position: relative;
  flex: 1;
  min-height: 260px;
  border: 1px solid var(--border);
  border-radius: 18px;
  overflow: hidden;
  background: #000;
}
.capture-video-wrap video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.capture-prompt {
  position: absolute;
  left: 12px;
  right: 12px;
  bottom: 12px;
  background: rgba(0,0,0,0.72);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 14px;
  padding: 12px;
}
.capture-prompt .label {
  color: var(--green-2);
  font-weight: 900;
  font-size: 20px;
}
.capture-prompt .hint {
  color: #fff;
  font-size: 13px;
  margin-top: 3px;
}
.capture-steps {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  margin: 10px 0;
}
.capture-step {
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 7px 4px;
  text-align: center;
  color: var(--muted);
  font-size: 11px;
  font-weight: 900;
}
.capture-step.done { color: var(--green-2); border-color: rgba(83,216,106,0.55); background: rgba(83,216,106,0.12); }
.capture-step.active { color: #061008; background: var(--amber); border-color: var(--amber); }
.capture-actions {
  display: grid;
  gap: 8px;
}
.capture-button {
  min-height: 58px;
  border: 0;
  border-radius: 15px;
  background: var(--green);
  color: #061008;
  font-size: 16px;
  font-weight: 950;
}
.capture-button.secondary {
  background: var(--panel);
  color: var(--sub);
  border: 1px solid var(--border);
}
@media (max-width: 430px) {
  body { padding-left: 10px; padding-right: 10px; }
  .hero h1 { font-size: 23px; }
  .facts { grid-template-columns: 1fr; }
  .set-head { grid-template-columns: 42px 1fr; }
  .set-head .status { grid-column: 1 / -1; justify-self: start; }
  .login-card, .confirm-card { padding: 18px 16px; }
  .confidence-emitter { width: 72px; height: 72px; font-size: 38px; margin-bottom: 12px; }
  .confirm-card.success h1 { font-size: 24px; }
  .confirm-sub { margin-bottom: 12px; }
  .confirm-detail { margin-bottom: 10px; }
}
@media (max-height: 620px) {
  .confidence-emitter { width: 64px; height: 64px; font-size: 34px; margin-bottom: 10px; }
  .confirm-card.success h1 { font-size: 22px; }
  .confirm-detail .row { padding: 2px 0; }
}
</style>
</head>
<body>
<main id="app" class="app">
  <div class="loading">Loading District 8 fruit audit...</div>
</main>
<div id="toast" class="toast"></div>

<script>
const STATE_KEY = 'd8_fruit_audit_state_v2';
const SELECTED_STORE_KEY = 'd8_fruit_audit_selected_store';
const PHOTO_ACCEPT = 'image/*,.heic,.heif,image/heic,image/heif';
const REQUIRED_SIDES = [
  { id: 'front', label: 'Front', hint: 'Stand on the main customer-facing side and capture the full side.' },
  { id: 'right', label: 'Right Side', hint: 'Move clockwise. Capture the full right side from edge to edge.' },
  { id: 'back', label: 'Back', hint: 'Stand opposite the front. Capture the full back side.' },
  { id: 'left', label: 'Left Side', hint: 'Complete the 360 view with the full left side.' },
];
const PHOTO_DB_NAME = 'd8_fruit_audit_photos_v1';
const PHOTO_DB_STORE = 'photos';
const MAX_PHOTO_BYTES = 190 * 1024;

let manifest = null;
let currentUser = null;
let approvedEmails = new Set();
let selectedStoreId = localStorage.getItem(SELECTED_STORE_KEY) || null;
let sending = false;
let statusMessage = '';
let photoDb = null;
let captureStream = null;
let captureFlow = null;
let captureSaving = false;
let state = {
  photos: {},
  sent: {},
  comments: {},
};

function escapeHtml(value) {
  return String(value || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function normalizeEmail(email) {
  return String(email || '').trim().toLowerCase();
}

function isApprovedUser(user) {
  return !!(user && approvedEmails.has(normalizeEmail(user.email)));
}

function loadState() {
  try {
    const raw = localStorage.getItem(STATE_KEY);
    if (!raw) return;
    const parsed = JSON.parse(raw);
    if (parsed && typeof parsed === 'object') {
      state.photos = parsed.photos && typeof parsed.photos === 'object' ? parsed.photos : {};
      state.sent = parsed.sent && typeof parsed.sent === 'object' ? parsed.sent : {};
      state.comments = parsed.comments && typeof parsed.comments === 'object' ? parsed.comments : {};
    }
  } catch (err) {}
}

function saveState() {
  try {
    localStorage.setItem(STATE_KEY, JSON.stringify({
      sent: state.sent,
      comments: state.comments,
    }));
  } catch (err) {
    showToast('Could not save photos on this device. Try sending now if possible.');
  }
}

function openPhotoDb() {
  if (photoDb) return Promise.resolve(photoDb);
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(PHOTO_DB_NAME, 1);
    request.onupgradeneeded = event => {
      const db = event.target.result;
      const store = db.createObjectStore(PHOTO_DB_STORE, { keyPath: 'id' });
      store.createIndex('storeId', 'storeId', { unique: false });
    };
    request.onsuccess = event => {
      photoDb = event.target.result;
      resolve(photoDb);
    };
    request.onerror = () => reject(new Error('Could not open local photo storage.'));
  });
}

function dbRequest(request) {
  return new Promise((resolve, reject) => {
    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error || new Error('Local photo storage failed.'));
  });
}

async function loadPhotosFromDb() {
  const db = await openPhotoDb();
  const tx = db.transaction(PHOTO_DB_STORE, 'readonly');
  const records = await dbRequest(tx.objectStore(PHOTO_DB_STORE).getAll());
  state.photos = {};
  records.forEach(record => {
    if (!record || !record.storeId || !record.setId || !record.sideId || !record.dataUrl) return;
    ensureStoreState(record.storeId);
    if (!state.photos[record.storeId][record.setId]) state.photos[record.storeId][record.setId] = {};
    if (!Array.isArray(state.photos[record.storeId][record.setId][record.sideId])) {
      state.photos[record.storeId][record.setId][record.sideId] = [];
    }
    state.photos[record.storeId][record.setId][record.sideId].push(record);
  });
}

async function savePhotoRecord(record) {
  const db = await openPhotoDb();
  const tx = db.transaction(PHOTO_DB_STORE, 'readwrite');
  await dbRequest(tx.objectStore(PHOTO_DB_STORE).put(record));
}

async function deletePhotoRecord(id) {
  const db = await openPhotoDb();
  const tx = db.transaction(PHOTO_DB_STORE, 'readwrite');
  await dbRequest(tx.objectStore(PHOTO_DB_STORE).delete(id));
}

async function clearSetPhotoRecords(storeId, setId) {
  const db = await openPhotoDb();
  const readTx = db.transaction(PHOTO_DB_STORE, 'readonly');
  const records = await dbRequest(readTx.objectStore(PHOTO_DB_STORE).getAll());
  const writeTx = db.transaction(PHOTO_DB_STORE, 'readwrite');
  const store = writeTx.objectStore(PHOTO_DB_STORE);
  await Promise.all(records
    .filter(record => record.storeId === storeId && record.setId === setId)
    .map(record => dbRequest(store.delete(record.id))));
}

function getStore(storeId) {
  return (manifest && manifest.stores || []).find(store => store.id === storeId) || null;
}

function ensureStoreState(storeId) {
  if (!state.photos[storeId]) state.photos[storeId] = {};
  if (!state.sent[storeId]) state.sent[storeId] = {};
}

function getSetPhotos(storeId, setId) {
  ensureStoreState(storeId);
  if (!state.photos[storeId][setId] || typeof state.photos[storeId][setId] !== 'object' || Array.isArray(state.photos[storeId][setId])) {
    state.photos[storeId][setId] = {};
  }
  return state.photos[storeId][setId];
}

function getSidePhotos(storeId, setId, sideId) {
  const setPhotos = getSetPhotos(storeId, setId);
  if (!Array.isArray(setPhotos[sideId])) setPhotos[sideId] = [];
  return setPhotos[sideId];
}

function isSetSent(storeId, setId) {
  return !!(state.sent[storeId] && state.sent[storeId][setId]);
}

function markSetUnsent(storeId, setId) {
  ensureStoreState(storeId);
  delete state.sent[storeId][setId];
}

function setStatus(storeId, setId) {
  if (isSetSent(storeId, setId)) return { key: 'sent', label: 'Sent' };
  const missing = REQUIRED_SIDES.filter(side => getSidePhotos(storeId, setId, side.id).length === 0).length;
  if (missing === 0) return { key: 'captured', label: '360 Captured' };
  if (missing < REQUIRED_SIDES.length) return { key: 'captured', label: `${missing} side${missing === 1 ? '' : 's'} needed` };
  return { key: 'needed', label: 'Needed' };
}

function storeCounts(store) {
  let captured = 0;
  let sent = 0;
  let needed = 0;
  let setsComplete = 0;
  store.sets.forEach(set => {
    if (isSetSent(store.id, set.id)) {
      sent += REQUIRED_SIDES.length;
      setsComplete += 1;
      return;
    }
    const capturedSides = REQUIRED_SIDES.filter(side => getSidePhotos(store.id, set.id, side.id).length > 0).length;
    captured += capturedSides;
    needed += REQUIRED_SIDES.length - capturedSides;
    if (capturedSides === REQUIRED_SIDES.length) setsComplete += 1;
  });
  return {
    captured,
    sent,
    needed,
    setsComplete,
    total: store.sets.length * REQUIRED_SIDES.length,
    totalSets: store.sets.length,
  };
}

function hasAllRequiredSets(store) {
  return store.sets.every(set => (
    isSetSent(store.id, set.id)
    || REQUIRED_SIDES.every(side => getSidePhotos(store.id, set.id, side.id).length > 0)
  ));
}

function unsentSetCount(store) {
  return store.sets.filter(set => REQUIRED_SIDES.some(side => getSidePhotos(store.id, set.id, side.id).length > 0)).length;
}

function unsentPhotoCount(store) {
  return store.sets.reduce((sum, set) => {
    return sum + REQUIRED_SIDES.reduce((sideSum, side) => sideSum + getSidePhotos(store.id, set.id, side.id).length, 0);
  }, 0);
}

function firstMissingSideIndex(storeId, setId) {
  const idx = REQUIRED_SIDES.findIndex(side => getSidePhotos(storeId, setId, side.id).length === 0);
  return idx >= 0 ? idx : 0;
}

function nextMissingSideIndex(storeId, setId, currentIdx) {
  for (let idx = currentIdx + 1; idx < REQUIRED_SIDES.length; idx++) {
    if (getSidePhotos(storeId, setId, REQUIRED_SIDES[idx].id).length === 0) return idx;
  }
  return -1;
}

function categoryShort(set) {
  if (set.commodity === '600') return 'APL';
  if (set.commodity === '602') return 'CIT';
  if (set.commodity === '604') return 'BER';
  return set.commodity || 'SET';
}

function commodityName(set) {
  const group = String(set.commodityGroup || '').split('-').slice(1).join('-').trim();
  if (group) return group;
  if (set.commodity === '600') return 'APPLES';
  if (set.commodity === '602') return 'CITRUS';
  if (set.commodity === '604') return 'BERRIES';
  return `C${set.commodity || 'FRUIT'}`;
}

function commodityClass(set) {
  if (set.commodity === '600') return 'commodity-apples';
  if (set.commodity === '602') return 'commodity-citrus';
  if (set.commodity === '604') return 'commodity-berries';
  return 'commodity-fruit';
}

function setHeaderTitle(set) {
  return `${commodityName(set)} - ${set.aisleDesc}`;
}

function displaySetName(set) {
  return `${set.commodityGroup} - ${set.aisleDesc}`;
}

function renderUserRow() {
  if (!currentUser) return '';
  return `
    <div class="user-row">
      <button class="pill" onclick="showStorePicker()"><strong>${escapeHtml(currentUser.name)}</strong></button>
      <button class="pill" onclick="signOut()">Switch user</button>
    </div>`;
}

function renderStorePicker() {
  const stores = manifest.stores || [];
  const totalSets = stores.reduce((sum, store) => sum + store.sets.length, 0);
  return `
    ${renderUserRow()}
    <section class="hero">
      <div class="badge">District 8 Fruit Audit</div>
      <h1>Select a store</h1>
      <p>Pick the FM store you are auditing today. The app will show only the fruit sets that need photos for that store.</p>
    </section>
    <a class="guide-link" href="/fruit-audit-guide">Open User Guide</a>
    <div class="quick-steps">
      <div class="quick-step"><div class="num">1</div><div class="txt"><strong>Select your store.</strong> Make sure the FM number matches where you are working.</div></div>
      <div class="quick-step"><div class="num">2</div><div class="txt"><strong>Complete every set.</strong> Each set needs Front, Right Side, Back, and Left Side photos.</div></div>
      <div class="quick-step"><div class="num">3</div><div class="txt"><strong>Submit once.</strong> Use the green Submit button after all required side views are captured.</div></div>
    </div>
    <div class="store-grid">
      ${stores.map(store => {
        const counts = storeCounts(store);
        const status = counts.sent === counts.total
          ? `Sent ${counts.sent}/${counts.total} side views`
          : `Captured ${counts.captured} | Needed ${counts.needed} | Sent ${counts.sent}`;
        return `
          <button class="store-btn" onclick="openStore('${store.id}')">
            <div class="store-num">FM ${store.id}</div>
            <div>
              <div class="store-meta">${store.sets.length} fruit set${store.sets.length === 1 ? '' : 's'}</div>
              <div class="store-status">${status}</div>
            </div>
            <div class="chev">&gt;</div>
          </button>`;
      }).join('')}
    </div>
    <div class="footer">District 8 fruit audit photo capture</div>
  `;
}

function renderStore(store) {
  const counts = storeCounts(store);
  const pct = Math.round(((counts.captured + counts.sent) / counts.total) * 100);
  const canSubmit = hasAllRequiredSets(store) && unsentPhotoCount(store) > 0 && !sending;
  const submitLabel = sending
    ? (statusMessage || 'Submitting photos...')
    : !hasAllRequiredSets(store)
      ? `${counts.needed} side view${counts.needed === 1 ? '' : 's'} still needed`
      : unsentPhotoCount(store) === 0
        ? `Submitted ${counts.sent}. No unsent photos.`
        : `Submit ${unsentPhotoCount(store)} photo${unsentPhotoCount(store) === 1 ? '' : 's'}`;

  return `
    <div class="top-nav">
      <button class="back-btn" onclick="showStorePicker()">&lt; Stores</button>
      <a class="pill" href="/fruit-audit-guide">Guide</a>
      <button class="pill" onclick="signOut()">${escapeHtml(currentUser.name)}</button>
    </div>
    <section class="store-header">
      <div class="badge">Fruit Audit</div>
      <h1>FM ${store.id}</h1>
      <div class="detail">District 8 - source store ${escapeHtml(store.sourceStore)} - ${store.sets.length} listed set${store.sets.length === 1 ? '' : 's'}</div>
    </section>
    <section class="progress">
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-text">Captured ${counts.captured} | Needed ${counts.needed} | Sent ${counts.sent}</div>
    </section>
    <div class="quick-steps">
      <div class="quick-step"><div class="num">1</div><div class="txt"><strong>Match the set card</strong> to the correct fruit table or fixture using POG, table, and bay range.</div></div>
      <div class="quick-step"><div class="num">2</div><div class="txt"><strong>Tap Start 360 Capture.</strong> The camera stays open and prompts Front, Right Side, Back, then Left Side.</div></div>
      <div class="quick-step"><div class="num">3</div><div class="txt"><strong>Add extra photos</strong> for blocked, wide, or unclear sides. Then submit the store once.</div></div>
    </div>
    <div class="set-list">
      ${store.sets.map((set, idx) => renderSetCard(store, set, idx)).join('')}
    </div>
    <div class="notes">
      <label for="notes-${store.id}">Notes for the project administrator (optional)</label>
      <textarea id="notes-${store.id}" oninput="saveComment('${store.id}')" placeholder="Missing table, wrong POG, blocked view, extra photos, etc.">${escapeHtml(state.comments[store.id] || '')}</textarea>
    </div>
    <button class="submit-btn ${canSubmit ? 'ready' : ''} ${sending ? 'sending' : ''}" ${canSubmit ? `onclick="submitStore('${store.id}')"` : 'disabled'}>
      ${submitLabel}
    </button>
    <div class="footer">Photos are saved on this device until they send successfully.</div>
  `;
}

function renderSetCard(store, set, idx) {
  const status = setStatus(store.id, set.id);
  const sideCards = REQUIRED_SIDES.map(side => renderSideCard(store, set, side, idx)).join('');
  const missingSides = REQUIRED_SIDES.filter(side => getSidePhotos(store.id, set.id, side.id).length === 0);
  const flowLabel = missingSides.length === REQUIRED_SIDES.length
    ? 'Start 360 Capture'
    : missingSides.length > 0
      ? `Continue 360 Capture (${missingSides.length} side${missingSides.length === 1 ? '' : 's'} left)`
      : 'Add Extra 360 Photo';

  return `
    <article class="set-card ${commodityClass(set)} ${status.key}" id="set-${set.id}" data-set-id="${set.id}">
      <div class="set-head">
        <div class="set-icon">${categoryShort(set)}</div>
        <div>
          <div class="set-kicker">Photo target</div>
          <div class="set-title">${escapeHtml(setHeaderTitle(set))}</div>
          <div class="set-sub">C${escapeHtml(set.commodity)} | POG ${escapeHtml(set.pogDbKey)} | Bays ${escapeHtml(set.bayRange)}</div>
        </div>
        <div class="status ${status.key}">${status.label}</div>
      </div>
      <div class="set-target-callout">
        <strong>Take pictures of this set</strong>
        ${escapeHtml(commodityName(set))} on ${escapeHtml(set.aisleDesc)} - bays ${escapeHtml(set.bayRange)}
      </div>
      <div class="facts">
        <div class="fact"><div class="k">Aisle/Table</div><div class="v">${escapeHtml(set.aisle)} - ${escapeHtml(set.aisleDesc)}</div></div>
        <div class="fact"><div class="k">Bays</div><div class="v">${escapeHtml(set.bayRange)}</div></div>
        <div class="fact"><div class="k">Set Type</div><div class="v">${escapeHtml(set.pogType)}</div></div>
        <div class="fact"><div class="k">Items</div><div class="v">${set.items}</div></div>
      </div>
      <div class="desc">${escapeHtml(set.description)}</div>
      <div class="capture-flow">
        <p>Tap once to open the camera. It will guide you through Front, Right Side, Back, and Left Side without returning here between photos.</p>
        <button class="capture-flow-btn" onclick="start360Capture('${store.id}','${set.id}',${idx})">${flowLabel}</button>
      </div>
      <div class="side-grid">${sideCards}</div>
    </article>
  `;
}

function renderSideCard(store, set, side, setIndex) {
  const photos = getSidePhotos(store.id, set.id, side.id);
  const sent = isSetSent(store.id, set.id);
  const statusKey = sent ? 'sent' : photos.length ? 'ready' : 'needed';
  const statusLabel = sent ? 'Sent' : photos.length ? `Captured (${photos.length})` : 'Needed';
  const thumbs = photos.map((photo, photoIdx) => `
    <div class="thumb">
      <img src="${photo.dataUrl}" alt="${escapeHtml(displaySetName(set))} ${escapeHtml(side.label)} ${photoIdx + 1}">
      <span>${escapeHtml(side.label)} ${photoIdx + 1}</span>
      <button class="remove" onclick="removePhoto('${store.id}','${set.id}','${side.id}',${photoIdx})" title="Remove">x</button>
    </div>`).join('');

  return `
    <section class="side-card ${statusKey}" id="set-${set.id}-${side.id}">
      <div class="side-head">
        <div class="side-title">${escapeHtml(side.label)}</div>
        <div class="side-status ${statusKey}">${statusLabel}</div>
      </div>
      <div class="side-hint">${escapeHtml(side.hint)}</div>
      ${photos.length ? `<div class="gallery">${thumbs}</div>` : ''}
      <div class="actions">
        <button class="action-btn primary" onclick="start360CaptureAtSide('${store.id}','${set.id}','${side.id}',${setIndex})">Take Photo</button>
        <button class="action-btn" onclick="triggerPhoto('${store.id}','${set.id}','${side.id}','gallery')">Load Photo</button>
      </div>
      <input type="file" id="input-camera-${set.id}-${side.id}" accept="${PHOTO_ACCEPT}" capture="environment" style="display:none" onchange="handleFiles(this,'${store.id}','${set.id}','${side.id}',${setIndex},'camera')">
      <input type="file" id="input-gallery-${set.id}-${side.id}" accept="${PHOTO_ACCEPT}" multiple style="display:none" onchange="handleFiles(this,'${store.id}','${set.id}','${side.id}',${setIndex},'gallery')">
    </section>
  `;
}

function render() {
  const app = document.getElementById('app');
  if (!manifest) {
    app.innerHTML = '<div class="loading">Loading District 8 fruit audit...</div>';
    return;
  }
  if (!currentUser) {
    app.innerHTML = '';
    renderLogin();
    return;
  }
  if (!isApprovedUser(currentUser)) {
    app.innerHTML = '';
    renderLogin('That email is not approved for the District 8 fruit audit app.');
    return;
  }
  const store = selectedStoreId ? getStore(selectedStoreId) : null;
  app.innerHTML = store ? renderStore(store) : renderStorePicker();
}

function renderLogin(errorMessage) {
  let overlay = document.getElementById('fruit-login-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'fruit-login-overlay';
    overlay.className = 'login-overlay';
    document.body.appendChild(overlay);
  }
  overlay.style.display = 'flex';
  const existing = window.D6Auth ? D6Auth.getUser() : null;
  overlay.innerHTML = `
    <div class="login-card">
      <div class="badge">District 8 Fruit Audit</div>
      <h1>Sign in</h1>
      <p class="login-sub">Enter your approved name and email so photo submissions show who captured them.</p>
      ${errorMessage ? `<div class="error" style="margin-bottom:14px;padding:12px;font-size:13px">${escapeHtml(errorMessage)}</div>` : ''}
      <label for="login-name">Full name</label>
      <input id="login-name" autocomplete="name" placeholder="Jane Smith" value="${existing ? escapeHtml(existing.name) : ''}">
      <label for="login-email">Email address</label>
      <input id="login-email" type="email" autocomplete="email" placeholder="jane.smith@retailodyssey.com" value="${existing ? escapeHtml(existing.email) : ''}">
      <button class="login-submit" id="login-submit" disabled onclick="submitLogin()">Continue</button>
    </div>`;
  const nameInput = document.getElementById('login-name');
  const emailInput = document.getElementById('login-email');
  const btn = document.getElementById('login-submit');
  const validate = () => {
    btn.disabled = !(nameInput.value.trim().length >= 2 && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailInput.value.trim()));
  };
  nameInput.addEventListener('input', validate);
  emailInput.addEventListener('input', validate);
  nameInput.addEventListener('keydown', event => { if (event.key === 'Enter') emailInput.focus(); });
  emailInput.addEventListener('keydown', event => { if (event.key === 'Enter' && !btn.disabled) submitLogin(); });
  validate();
  setTimeout(() => nameInput.focus(), 100);
}

function submitLogin() {
  const name = document.getElementById('login-name').value.trim();
  const email = document.getElementById('login-email').value.trim();
  if (!approvedEmails.has(normalizeEmail(email))) {
    renderLogin('That email is not approved for the District 8 fruit audit app.');
    return;
  }
  currentUser = D6Auth.saveUser(name, email);
  const overlay = document.getElementById('fruit-login-overlay');
  if (overlay) overlay.style.display = 'none';
  render();
}

function signOut() {
  D6Auth.clearUser();
  currentUser = null;
  selectedStoreId = null;
  localStorage.removeItem(SELECTED_STORE_KEY);
  render();
}

function openStore(storeId) {
  selectedStoreId = storeId;
  localStorage.setItem(SELECTED_STORE_KEY, storeId);
  render();
  window.scrollTo(0, 0);
}

function showStorePicker() {
  selectedStoreId = null;
  localStorage.removeItem(SELECTED_STORE_KEY);
  render();
  window.scrollTo(0, 0);
}

function saveComment(storeId) {
  const el = document.getElementById(`notes-${storeId}`);
  if (!el) return;
  state.comments[storeId] = el.value;
  saveState();
}

function triggerPhoto(storeId, setId, sideId, source) {
  const input = document.getElementById(`input-${source}-${setId}-${sideId}`);
  if (input) {
    input.value = '';
    input.click();
  }
}

function start360Capture(storeId, setId, setIndex) {
  start360CaptureAtIndex(storeId, setId, firstMissingSideIndex(storeId, setId), setIndex);
}

function start360CaptureAtSide(storeId, setId, sideId, setIndex) {
  const sideIndex = Math.max(0, REQUIRED_SIDES.findIndex(side => side.id === sideId));
  start360CaptureAtIndex(storeId, setId, sideIndex, setIndex);
}

async function start360CaptureAtIndex(storeId, setId, sideIndex, setIndex) {
  const store = getStore(storeId);
  if (!store) return;
  const set = store.sets.find(item => item.id === setId);
  if (!set) return;

  captureFlow = { storeId, setId, setIndex, sideIndex };
  try {
    captureStream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: 'environment' },
        width: { ideal: 1280 },
        height: { ideal: 720 },
      },
      audio: false,
    });
    renderCaptureOverlay();
  } catch (err) {
    showToast('Could not keep camera open. Opening phone camera for this side.');
    const side = REQUIRED_SIDES[sideIndex] || REQUIRED_SIDES[0];
    triggerPhoto(storeId, setId, side.id, 'camera');
  }
}

function stopCaptureStream() {
  if (captureStream) {
    captureStream.getTracks().forEach(track => track.stop());
    captureStream = null;
  }
}

function closeCaptureOverlay(shouldRender = true) {
  stopCaptureStream();
  captureFlow = null;
  captureSaving = false;
  const overlay = document.getElementById('capture-overlay');
  if (overlay) overlay.remove();
  if (shouldRender) render();
}

function renderCaptureOverlay() {
  if (!captureFlow || !captureStream) return;
  const store = getStore(captureFlow.storeId);
  const set = store && store.sets.find(item => item.id === captureFlow.setId);
  const side = REQUIRED_SIDES[captureFlow.sideIndex] || REQUIRED_SIDES[0];
  if (!store || !set || !side) {
    closeCaptureOverlay();
    return;
  }

  let overlay = document.getElementById('capture-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'capture-overlay';
    overlay.className = 'capture-overlay';
    document.body.appendChild(overlay);
  }

  overlay.innerHTML = `
    <div class="capture-top">
      <div class="capture-title">
        <h2>Take ${escapeHtml(side.label)}</h2>
        <p>FM ${escapeHtml(store.id)} - ${escapeHtml(displaySetName(set))}</p>
      </div>
      <button class="capture-close" onclick="closeCaptureOverlay()">Close</button>
    </div>
    <div class="capture-video-wrap">
      <video id="capture-video" autoplay playsinline muted></video>
      <div class="capture-prompt">
        <div class="label">${escapeHtml(side.label)}</div>
        <div class="hint">${escapeHtml(side.hint)}</div>
      </div>
    </div>
    <div class="capture-steps">
      ${REQUIRED_SIDES.map((step, idx) => {
        const done = getSidePhotos(captureFlow.storeId, captureFlow.setId, step.id).length > 0;
        const cls = idx === captureFlow.sideIndex ? 'active' : done ? 'done' : '';
        return `<div class="capture-step ${cls}">${escapeHtml(step.label)}</div>`;
      }).join('')}
    </div>
    <div class="capture-actions">
      <button class="capture-button" onclick="captureCurrentSide()">Capture ${escapeHtml(side.label)}</button>
      <button class="capture-button secondary" onclick="closeCaptureOverlay()">Pause 360 Capture</button>
    </div>
  `;

  const video = document.getElementById('capture-video');
  if (video) {
    video.srcObject = captureStream;
    video.play().catch(() => {});
  }
}

async function captureCurrentSide() {
  if (!captureFlow || captureSaving) return;
  const video = document.getElementById('capture-video');
  const side = REQUIRED_SIDES[captureFlow.sideIndex] || REQUIRED_SIDES[0];
  if (!video || !video.videoWidth || !video.videoHeight) {
    showToast('Camera is still starting. Try again in a second.');
    return;
  }

  captureSaving = true;
  try {
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
    const dataUrl = compressCanvasToJpegDataUrl(canvas, 0.62, MAX_PHOTO_BYTES);
    const record = {
      id: `${captureFlow.storeId}-${captureFlow.setId}-${side.id}-${Date.now()}-${Math.random().toString(16).slice(2)}`,
      storeId: captureFlow.storeId,
      setId: captureFlow.setId,
      sideId: side.id,
      dataUrl,
      createdAt: new Date().toISOString(),
    };
    await savePhotoRecord(record);
    getSidePhotos(captureFlow.storeId, captureFlow.setId, side.id).push(record);
    markSetUnsent(captureFlow.storeId, captureFlow.setId);
    saveState();

    const nextIdx = nextMissingSideIndex(captureFlow.storeId, captureFlow.setId, captureFlow.sideIndex);
    if (nextIdx >= 0) {
      captureFlow.sideIndex = nextIdx;
      captureSaving = false;
      showToast(`${side.label} captured. Next: ${REQUIRED_SIDES[nextIdx].label}.`);
      renderCaptureOverlay();
      return;
    }

    const completedSetIndex = captureFlow.setIndex;
    const completedStoreId = captureFlow.storeId;
    closeCaptureOverlay(false);
    render();
    showToast('All four side views captured for this set.');
    scrollToNextNeeded(completedStoreId, completedSetIndex, REQUIRED_SIDES[REQUIRED_SIDES.length - 1].id);
  } catch (err) {
    captureSaving = false;
    showToast('Could not save this photo. Try again.');
  }
}

async function handleFiles(input, storeId, setId, sideId, setIndex, source) {
  const files = Array.from(input.files || []);
  if (!files.length) return;
  saveComment(storeId);
  showToast(`Saving ${files.length} photo${files.length === 1 ? '' : 's'}...`);
  try {
    const records = [];
    for (const file of files) {
      const dataUrl = await imageFileToJpegDataUrl(file);
      const record = {
        id: `${storeId}-${setId}-${sideId}-${Date.now()}-${Math.random().toString(16).slice(2)}`,
        storeId,
        setId,
        sideId,
        dataUrl,
        createdAt: new Date().toISOString(),
      };
      await savePhotoRecord(record);
      records.push(record);
    }
    const photos = getSidePhotos(storeId, setId, sideId);
    records.forEach(record => photos.push(record));
    markSetUnsent(storeId, setId);
    saveState();
    render();
    showToast(`Captured ${records.length} photo${records.length === 1 ? '' : 's'}.`);
    scrollToNextNeeded(storeId, setIndex, sideId);
    if (source === 'camera') promptNextNativeCamera(storeId, setId, setIndex, sideId);
  } catch (err) {
    showToast(err.message || 'Could not read image. Try another photo.');
  }
}

function promptNextNativeCamera(storeId, setId, setIndex, sideId) {
  const currentIdx = REQUIRED_SIDES.findIndex(side => side.id === sideId);
  const nextIdx = nextMissingSideIndex(storeId, setId, currentIdx);
  if (nextIdx < 0) return;
  const nextSide = REQUIRED_SIDES[nextIdx];
  setTimeout(() => {
    showToast(`Next: ${nextSide.label}. Opening camera...`);
    const input = document.getElementById(`input-camera-${setId}-${nextSide.id}`);
    if (input) {
      input.value = '';
      input.click();
    }
  }, 700);
}

async function removePhoto(storeId, setId, sideId, photoIndex) {
  saveComment(storeId);
  const photos = getSidePhotos(storeId, setId, sideId);
  if (photoIndex >= 0 && photoIndex < photos.length) {
    const [removed] = photos.splice(photoIndex, 1);
    if (removed && removed.id) {
      try { await deletePhotoRecord(removed.id); } catch (err) {}
    }
  }
  saveState();
  render();
}

function scrollToNextNeeded(storeId, setIndex, sideId) {
  const store = getStore(storeId);
  if (!store) return;
  const currentSideIdx = REQUIRED_SIDES.findIndex(side => side.id === sideId);
  let targetSet = null;
  let targetSide = null;
  let targetSetIndex = -1;

  for (let s = setIndex; s < store.sets.length && !targetSet; s++) {
    const startSide = s === setIndex ? currentSideIdx + 1 : 0;
    for (let i = startSide; i < REQUIRED_SIDES.length; i++) {
      const side = REQUIRED_SIDES[i];
      if (!isSetSent(storeId, store.sets[s].id) && getSidePhotos(storeId, store.sets[s].id, side.id).length === 0) {
        targetSet = store.sets[s];
        targetSide = side;
        targetSetIndex = s;
        break;
      }
    }
  }
  if (!targetSet) {
    for (let s = 0; s < store.sets.length; s++) {
      const set = store.sets[s];
      for (const side of REQUIRED_SIDES) {
        if (!isSetSent(storeId, set.id) && getSidePhotos(storeId, set.id, side.id).length === 0) {
          targetSet = set;
          targetSide = side;
          targetSetIndex = s;
          break;
        }
      }
      if (targetSet) break;
    }
  }
  if (!targetSet || !targetSide) return;
  setTimeout(() => {
    const targetId = targetSetIndex !== setIndex
      ? `set-${targetSet.id}`
      : `set-${targetSet.id}-${targetSide.id}`;
    const el = document.getElementById(targetId);
    if (el) {
      el.scrollIntoView({
        behavior: 'smooth',
        block: targetSetIndex !== setIndex ? 'start' : 'center',
      });
    }
  }, 80);
}

function imageFileToJpegDataUrl(file) {
  return resizeImage(file, 1280, 0.62, MAX_PHOTO_BYTES).catch(async err => {
    const isHeic = /\.hei[cf]$/i.test(file.name || '') || /hei[cf]/i.test(file.type || '');
    if (!isHeic || !window.heic2any) throw err;
    const converted = await window.heic2any({ blob: file, toType: 'image/jpeg', quality: 0.9 });
    const jpegBlob = Array.isArray(converted) ? converted[0] : converted;
    return resizeImage(jpegBlob, 1280, 0.62, MAX_PHOTO_BYTES);
  });
}

function dataUrlBytes(dataUrl) {
  const base64 = String(dataUrl || '').split(',').pop() || '';
  return Math.ceil(base64.length * 3 / 4);
}

function compressCanvasToJpegDataUrl(canvas, quality, maxBytes) {
  let output = canvas.toDataURL('image/jpeg', quality);
  let nextQuality = quality;
  let nextWidth = canvas.width;
  let nextHeight = canvas.height;
  const source = document.createElement('canvas');
  source.width = canvas.width;
  source.height = canvas.height;
  source.getContext('2d').drawImage(canvas, 0, 0);

  while (maxBytes && dataUrlBytes(output) > maxBytes && (nextWidth > 720 || nextQuality > 0.42)) {
    if (nextQuality > 0.42) {
      nextQuality = Math.max(0.42, nextQuality - 0.08);
    } else {
      nextWidth = Math.round(nextWidth * 0.86);
      nextHeight = Math.round(nextHeight * 0.86);
      canvas.width = nextWidth;
      canvas.height = nextHeight;
      canvas.getContext('2d').drawImage(source, 0, 0, nextWidth, nextHeight);
    }
    output = canvas.toDataURL('image/jpeg', nextQuality);
  }

  return output;
}

function resizeImage(fileOrBlob, maxDim, quality, maxBytes) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('Could not read image file.'));
    reader.onload = event => {
      const img = new Image();
      img.onerror = () => reject(new Error('Could not decode image. If this is HEIC, try loading again with signal.'));
      img.onload = () => {
        let width = img.width;
        let height = img.height;
        if (width > maxDim || height > maxDim) {
          if (width > height) {
            height = Math.round(height * maxDim / width);
            width = maxDim;
          } else {
            width = Math.round(width * maxDim / height);
            height = maxDim;
          }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        let output = canvas.toDataURL('image/jpeg', quality);
        let nextWidth = width;
        let nextHeight = height;
        let nextQuality = quality;

        while (maxBytes && dataUrlBytes(output) > maxBytes && (nextWidth > 720 || nextQuality > 0.42)) {
          if (nextQuality > 0.42) {
            nextQuality = Math.max(0.42, nextQuality - 0.08);
          } else {
            nextWidth = Math.round(nextWidth * 0.86);
            nextHeight = Math.round(nextHeight * 0.86);
            canvas.width = nextWidth;
            canvas.height = nextHeight;
            ctx.drawImage(img, 0, 0, nextWidth, nextHeight);
          }
          output = canvas.toDataURL('image/jpeg', nextQuality);
        }
        resolve(output);
      };
      img.src = event.target.result;
    };
    reader.readAsDataURL(fileOrBlob);
  });
}

async function submitStore(storeId) {
  if (sending) return;
  const store = getStore(storeId);
  if (!store) return;
  saveComment(storeId);
  if (!hasAllRequiredSets(store)) {
    showToast('Capture front, right, back, and left for every set before submitting.');
    return;
  }
  const setPhotos = store.sets.map(set => ({
    setId: set.id,
    photos: REQUIRED_SIDES.flatMap(side => getSidePhotos(storeId, set.id, side.id).map(photo => ({
      sideId: side.id,
      sideLabel: side.label,
      base64: photo.dataUrl.split(',')[1],
    }))).filter(photo => photo.base64),
  })).filter(entry => entry.photos.length > 0);
  if (!setPhotos.length) {
    showToast('No unsent photos.');
    return;
  }

  sending = true;
  statusMessage = `Submitting ${setPhotos.length} set${setPhotos.length === 1 ? '' : 's'}...`;
  render();

  try {
    const res = await fetch('/api/fruit-audit/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        storeId,
        setPhotos,
        comment: (state.comments[storeId] || '').trim() || null,
        userName: currentUser.name,
        userEmail: currentUser.email,
      }),
    });
    const data = await res.json();
    if (res.status === 403) {
      D6Auth.clearUser();
      currentUser = null;
      throw new Error((data && data.error) || 'This email is not approved for the District 8 fruit audit app.');
    }
    if (!res.ok || !data.success) {
      throw new Error((data && data.error) || 'Photo send failed.');
    }
    ensureStoreState(storeId);
    await Promise.all(setPhotos.map(entry => clearSetPhotoRecords(storeId, entry.setId)));
    setPhotos.forEach(entry => {
      state.sent[storeId][entry.setId] = true;
      delete state.photos[storeId][entry.setId];
    });
    saveState();
    sending = false;
    statusMessage = '';
    render();
    showConfirm(data);
  } catch (err) {
    sending = false;
    statusMessage = '';
    render();
    showToast(err.message || 'Send failed. Photos are still saved here.');
  }
}

function showConfirm(data) {
  let overlay = document.getElementById('fruit-confirm-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'fruit-confirm-overlay';
    overlay.className = 'confirm-overlay';
    document.body.appendChild(overlay);
  }
  overlay.innerHTML = `
    <div class="confirm-card success">
      <div class="confidence-emitter" aria-hidden="true">✓</div>
      <div class="badge">Submission Complete</div>
      <h1>Your photos have been successfully submitted</h1>
      <p class="confirm-sub">FM ${escapeHtml(data.storeId)} is complete. You can close this screen after reviewing the confirmation below.</p>
      <div class="confirm-detail">
        <div class="row"><span>Store</span><strong>FM ${escapeHtml(data.storeId)}</strong></div>
        <div class="row"><span>Sets included</span><strong>${data.setCount}</strong></div>
        <div class="row"><span>Photos submitted</span><strong>${data.photoCount}</strong></div>
      </div>
      <button class="confirm-btn" onclick="closeConfirm()">Done</button>
    </div>`;
}

function closeConfirm() {
  const overlay = document.getElementById('fruit-confirm-overlay');
  if (overlay) overlay.remove();
}

function showToast(message) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.classList.add('show');
  clearTimeout(showToast.timer);
  showToast.timer = setTimeout(() => toast.classList.remove('show'), 2800);
}

async function boot() {
  loadState();
  currentUser = D6Auth.getUser();
  try {
    await loadPhotosFromDb();
    const [manifestRes, approvedRes] = await Promise.all([
      fetch('/api/fruit-audit/manifest', { cache: 'no-store' }),
      fetch('/api/fruit-audit/approved-users', { cache: 'no-store' }),
    ]);
    const approvedData = approvedRes.ok ? await approvedRes.json() : { approvedEmails: [] };
    approvedEmails = new Set((approvedData.approvedEmails || []).map(normalizeEmail));
    const res = manifestRes;
    if (!res.ok) throw new Error('Could not load manifest.');
    manifest = await res.json();
    if (selectedStoreId && !getStore(selectedStoreId)) selectedStoreId = null;
    render();
  } catch (err) {
    document.getElementById('app').innerHTML = `<div class="error">${escapeHtml(err.message || 'Could not load District 8 fruit audit.')}</div>`;
  }
}

boot();
</script>
